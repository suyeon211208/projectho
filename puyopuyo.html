<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>뿌요뿌요</title>
<style>
  :root{
    --accent:#8be9ff;
    --text:#e8e8f0;
    --sub:#8a8aa0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%; margin:0; overflow:hidden; touch-action:none; -ms-touch-action:none;}
  body{
    background:
      radial-gradient(circle at 18% 78%, rgba(255,182,213,0.55), transparent 55%),
      radial-gradient(circle at 85% 15%, rgba(179,229,252,0.55), transparent 55%),
      radial-gradient(circle at 50% 100%, rgba(255,240,179,0.4), transparent 60%),
      linear-gradient(160deg, #fff3e6 0%, #fde9f2 45%, #e8f3ff 100%);
    color:var(--text);
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    -webkit-user-select:none; user-select:none;
  }

  .jelly-blob{
    position:fixed;
    pointer-events:none;
    z-index:0;
    animation: jiggle 7s ease-in-out infinite;
  }
  .jelly-blob::before{
    content:'';
    position:absolute; inset:0;
    background: var(--jelly-color, #ffb3d1);
    border-radius: 58% 42% 55% 45% / 45% 55% 45% 55%;
    filter: blur(0.5px);
    box-shadow:
      inset -10px -14px 26px rgba(0,0,0,0.08),
      inset 10px 12px 20px rgba(255,255,255,0.75),
      0 18px 34px -12px rgba(0,0,0,0.12);
  }
  .jelly-blob::after{
    content:'';
    position:absolute;
    top:16%; left:20%;
    width:32%; height:22%;
    border-radius:50%;
    background: rgba(255,255,255,0.8);
    filter: blur(3px);
  }
  @keyframes jiggle{
    0%,100%{ transform: translateY(0) scale(1,1) rotate(0deg); }
    30%{ transform: translateY(-14px) scale(1.04,0.96) rotate(-3deg); }
    60%{ transform: translateY(6px) scale(0.97,1.04) rotate(2deg); }
  }

  #screen{
    position:relative;
    z-index:1;
    height:100%;
    width:100%;
    display:flex;
    flex-direction:column;
  }

  /* ---------- HUD (floats over the game screen) ---------- */
  #hud{
    position:absolute;
    top:0; left:0; right:0;
    z-index:3;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    padding: max(10px, env(safe-area-inset-top)) 20px 16px 20px;
    background: linear-gradient(to bottom, rgba(6,6,11,0.8), rgba(6,6,11,0.35) 65%, transparent);
    pointer-events:none;
  }
  .hud-block{ display:flex; flex-direction:column; }
  .hud-block.right{ align-items:flex-end; }
  .hud-block.center{ align-items:center; }
  .level-val{
    font-size:22px;
    font-weight:700;
    font-variant-numeric: tabular-nums;
    color:var(--accent);
    line-height:1;
    transition: transform 0.25s ease, text-shadow 0.25s ease;
  }
  .level-val.pop{
    transform: scale(1.4);
    text-shadow: 0 0 20px rgba(139,233,255,0.85);
  }
  .time-val{
    font-size:11px;
    font-weight:600;
    color:var(--sub);
    font-variant-numeric: tabular-nums;
    margin-top:3px;
    letter-spacing:0.04em;
  }
  .level-up-toast{
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-50%) scale(0.7);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
    padding:14px 34px;
    border-radius:16px;
    background: linear-gradient(135deg, rgba(139,233,255,0.16), rgba(139,139,255,0.1));
    border:1px solid rgba(139,233,255,0.4);
    box-shadow: 0 0 40px rgba(139,233,255,0.35);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.28s ease, transform 0.28s cubic-bezier(.34,1.56,.64,1);
    z-index:6;
    white-space:nowrap;
  }
  .level-up-toast .lu-title{
    font-size:26px;
    font-weight:800;
    letter-spacing:0.08em;
    color:#fff;
    text-shadow: 0 0 24px rgba(139,233,255,0.9);
  }
  .level-up-toast .lu-sub{
    font-size:13px;
    font-weight:600;
    letter-spacing:0.15em;
    color:var(--accent);
  }
  .level-up-toast.show{ opacity:1; transform: translate(-50%,-50%) scale(1); }
  .level-up-toast.stage{
    padding:18px 42px;
    background: linear-gradient(135deg, rgba(255,214,120,0.22), rgba(255,140,180,0.14));
    border-color: rgba(255,214,120,0.5);
    box-shadow: 0 0 50px rgba(255,214,120,0.4);
  }
  .level-up-toast.stage .lu-title{
    font-size:32px;
    color:#ffd166;
    text-shadow: 0 0 26px rgba(255,209,102,0.9);
  }
  .level-up-toast.stage .lu-sub{ color:#ffe9b8; }

  .zenkeshi-toast{
    position:absolute;
    top:42%; left:50%;
    transform: translate(-50%,-50%) scale(0.6) rotate(-2deg);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    padding:18px 40px;
    border-radius:18px;
    background: linear-gradient(120deg, rgba(255,140,180,0.22), rgba(139,233,255,0.2), rgba(255,214,120,0.22));
    background-size:220% 220%;
    border:1px solid rgba(255,255,255,0.55);
    box-shadow: 0 0 60px rgba(255,255,255,0.35);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index:7;
    white-space:nowrap;
  }
  .zenkeshi-toast .zk-title{
    font-size:30px;
    font-weight:800;
    letter-spacing:0.06em;
    background: linear-gradient(90deg, #ff8bd6, #8be9ff, #ffe98b, #ff8bd6);
    background-size:300% auto;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: rainbowShift 2.2s linear infinite;
    text-shadow: 0 0 24px rgba(255,255,255,0.5);
  }
  .zenkeshi-toast .zk-sub{
    font-size:14px;
    font-weight:700;
    letter-spacing:0.1em;
    color:#fff;
  }
  .zenkeshi-toast.show{ opacity:1; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
  @keyframes rainbowShift{
    0%{ background-position:0% 50%; }
    100%{ background-position:300% 50%; }
  }
  .label{
    font-size:10px;
    letter-spacing:0.22em;
    color:var(--sub);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .score-val{
    font-size:26px;
    font-weight:700;
    font-variant-numeric: tabular-nums;
    color:#fff;
    text-shadow: 0 0 18px rgba(139,233,255,0.35);
    line-height:1;
  }
  .next-box{
    border:1px solid rgba(139,233,255,0.25);
    border-radius:12px;
    padding:8px;
    background:rgba(139,233,255,0.04);
    box-shadow: 0 0 16px rgba(139,233,255,0.08) inset;
  }
  #nextCanvas{ display:block; }

  .chain-val{
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%,-40%) scale(0.85);
    font-size:30px;
    font-weight:800;
    color:#ffd166;
    text-shadow: 0 0 22px rgba(255,209,102,0.6);
    opacity:0;
    pointer-events:none;
    transition: all 0.25s ease;
    z-index:5;
    white-space:nowrap;
  }
  .chain-val.show{ opacity:1; transform: translate(-50%,-50%) scale(1); }

  /* ---------- Board ---------- */
  #boardWrap{
    position:relative;
    flex:1;
    min-height:0;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding-top:76px;
    touch-action:none;
  }
  #board{
    display:block;
    border:1px solid rgba(139,233,255,0.25);
    border-radius:14px;
    background:rgba(139,233,255,0.02);
    box-shadow: 0 0 24px rgba(139,233,255,0.08) inset, 0 20px 50px -20px rgba(0,0,0,0.6);
  }

  .hint{
    text-align:center;
    font-size:10px;
    color:#8a7a95;
    letter-spacing:0.06em;
    padding: 4px 16px max(8px, env(safe-area-inset-bottom)) 16px;
    flex-shrink:0;
  }
  .hint b{ color:#4a3f5c; }

  @media (min-width: 760px){
    .hint{ font-size:11px; }
  }

  /* ---------- Overlay ---------- */
  .overlay{
    position:absolute; inset:0;
    background:rgba(4,4,9,0.88);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s;
    z-index:10;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay-title{
    font-size:26px;
    font-weight:800;
    letter-spacing:0.08em;
  }
  .clear-overlay{
    background: radial-gradient(circle at 50% 30%, rgba(255,214,120,0.16), rgba(4,4,9,0.9) 70%);
  }
  .clear-title{
    font-size:32px;
    color:#ffd166;
    text-shadow: 0 0 30px rgba(255,209,102,0.7);
  }
  .btn{
    padding:12px 28px;
    border-radius:999px;
    border:none;
    background: linear-gradient(135deg, #6ee7ff, #8b8bff);
    color:#0a0b14;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.05em;
    cursor:pointer;
  }
  .btn.ghost{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,255,255,0.25);
  }
  .btn:active{ transform: scale(0.96); }

  #restartTop{
    position:absolute;
    top: 82px;
    right:14px;
    z-index:4;
    width:30px;
    height:30px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:var(--sub);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    padding:0;
    z-index:4;
  }
</style>
</head>
<body>

<div class="jelly-blob" style="--jelly-color:#ffb3c6; width:150px;height:130px; top:6%; left:4%; animation-delay:0s; opacity:0.8;"></div>
<div class="jelly-blob" style="--jelly-color:#a8d8ff; width:120px;height:105px; top:64%; left:2%; animation-delay:1.4s; opacity:0.75;"></div>
<div class="jelly-blob" style="--jelly-color:#ffe9a8; width:100px;height:88px; top:10%; right:5%; animation-delay:2.6s; opacity:0.75;"></div>
<div class="jelly-blob" style="--jelly-color:#b8f2c9; width:130px;height:112px; bottom:16%; right:4%; animation-delay:3.8s; opacity:0.75;"></div>
<div class="jelly-blob" style="--jelly-color:#dcc2ff; width:90px;height:78px; bottom:6%; left:38%; animation-delay:5s; opacity:0.65;"></div>

<div id="screen">
  <div id="hud">
    <div class="hud-block">
      <div class="label">SCORE</div>
      <div class="score-val" id="scoreVal">0</div>
    </div>
    <div class="hud-block center">
      <div class="label">LEVEL</div>
      <div class="level-val" id="levelVal">1</div>
      <div class="time-val" id="timeVal">0:00</div>
    </div>
    <div class="hud-block right">
      <div class="label">NEXT</div>
      <div class="next-box">
        <canvas id="nextCanvas" width="64" height="64"></canvas>
      </div>
    </div>
  </div>

  <button id="restartTop" title="다시 시작">⟳</button>

  <div id="boardWrap">
    <canvas id="board"></canvas>
    <div class="chain-val" id="chainVal">2 CHAIN!</div>
    <div class="level-up-toast" id="levelUpToast">
      <div class="lu-title" id="levelUpTitle">LEVEL UP!</div>
      <div class="lu-sub" id="levelUpSub">LV.2</div>
    </div>

    <div class="zenkeshi-toast" id="zenkeshiToast">
      <div class="zk-title" id="zenkeshiTitle">ALL CLEAR!</div>
      <div class="zk-sub" id="zenkeshiSub">BONUS +0</div>
    </div>

    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">GAME OVER</div>
      <div class="label" id="overlaySub">최종 점수 0</div>
      <button class="btn" id="restartBtn">다시 시작</button>
    </div>

    <div class="overlay clear-overlay" id="clearOverlay">
      <div class="overlay-title clear-title" id="clearTitle">ALL CLEAR!</div>
      <div class="label" id="clearSub">최종 점수 0</div>
      <div style="display:flex; gap:10px;">
        <button class="btn ghost" id="continueBtn">이어서 플레이</button>
        <button class="btn" id="clearRestartBtn">다시 시작</button>
      </div>
    </div>
  </div>

  <div class="hint"><b>←→</b> 이동 &nbsp; <b>↑/X</b> 회전 &nbsp; <b>Z</b> 반대회전 &nbsp; <b>↓</b> 소프트 &nbsp; <b>Space</b> 하드드롭</div>
</div>

    { key:'purple', glow:'rgba(190,120,255,0.55)'},
  ];
  const N_COLORS = COLORS.length;

  const puyoImg = {};
  function loadPuyoImages(onDone){
    const keys = Object.keys(PUYO_SPRITE_B64);
    let remaining = keys.length;
    keys.forEach(k => {
      const img = new Image();
      img.onload = () => { remaining--; if(remaining<=0) onDone(); };
      img.onerror = () => { remaining--; if(remaining<=0) onDone(); };
      img.src = 'data:image/png;base64,' + PUYO_SPRITE_B64[k];
      puyoImg[k] = img;
    });
  }

  const board = document.getElementById('board');
  const ctx = board.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');

  const nextCanvas = document.getElementById('nextCanvas');
  const nctx = nextCanvas.getContext('2d');

  const scoreVal = document.getElementById('scoreVal');
  const levelVal = document.getElementById('levelVal');
  const timeVal = document.getElementById('timeVal');
  const levelUpToast = document.getElementById('levelUpToast');
  const levelUpSub = document.getElementById('levelUpSub');
  const levelUpTitle = document.getElementById('levelUpTitle');
  const zenkeshiToast = document.getElementById('zenkeshiToast');
  const zenkeshiTitle = document.getElementById('zenkeshiTitle');
  const zenkeshiSub = document.getElementById('zenkeshiSub');
  const chainVal = document.getElementById('chainVal');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const clearOverlay = document.getElementById('clearOverlay');
  const clearTitle = document.getElementById('clearTitle');
  const clearSub = document.getElementById('clearSub');

  // ---------- Responsive board sizing ----------
  const BOARD_TOP_PAD = 76; // must match #boardWrap padding-top in CSS
  function resizeBoard(){
    const availW = boardWrap.clientWidth - 4;
    const availH = boardWrap.clientHeight - BOARD_TOP_PAD - 8;
    const cellByW = Math.floor(availW / COLS);
    const cellByH = Math.floor(availH / VISIBLE);
    CELL = Math.max(20, Math.min(cellByW, cellByH));
    board.width = COLS * CELL;
    board.height = VISIBLE * CELL;
    render();
  }
  window.addEventListener('resize', resizeBoard);
  window.addEventListener('orientationchange', resizeBoard);

  // ---------- State ----------
  let grid;
  let popping;
  let particles = [];
  let piece;
  let nextColors;
  let score = 0;
  let totalScore = 0;
  let level = 1;
  let elapsedMs = 0;
  const LEVEL_BASE_STEP = 800;   // score needed to reach level 2
  const LEVEL_STEP_INCREMENT = 150; // each further level needs this much more than the previous
  const MAX_LEVEL = 500;
  const STAGE_SIZE = 5;      // every 5 levels = 1 stage clear
  let dropTimer = 0;
  let dropInterval = 700;
  let softDrop = false;
  let busy = false;
  let gameOver = false;
  let stageCleared = false;
  let lastTime = 0;
  let animT = 0;

  function emptyGrid(){
    const g = [];
    for(let r=0;r<ROWS;r++){ g.push(new Array(COLS).fill(null)); }
    return g;
  }

  function randColor(){ return Math.floor(Math.random()*N_COLORS); }

  function newPieceFromColors(colors){
    return {
      axis:{ r:HIDDEN-1, c:2, color: colors[0] },
      sub:{ r:HIDDEN-2, c:2, color: colors[1] },
      rot: 0
    };
  }

  function subOffset(rot){
    switch(rot){
      case 0: return {dr:-1, dc:0};
      case 1: return {dr:0, dc:1};
      case 2: return {dr:1, dc:0};
      case 3: return {dr:0, dc:-1};
    }
  }

  function syncSub(p){
    const off = subOffset(p.rot);
    p.sub.r = p.axis.r + off.dr;
    p.sub.c = p.axis.c + off.dc;
  }

  function cellFree(r,c){
    if(c<0||c>=COLS||r>=ROWS) return false;
    if(r<0) return true;
    return grid[r][c]===null;
  }

  function pieceFits(p){
    return cellFree(p.axis.r,p.axis.c) && cellFree(p.sub.r,p.sub.c);
  }

  function resetGame(){
    grid = emptyGrid();
    popping = new Set();
    particles = [];
    score = 0;
    totalScore = 0;
    level = 1;
    elapsedMs = 0;
    timeVal.textContent = '0:00';
    dropInterval = 700;
    gameOver = false;
    stageCleared = false;
    busy = false;
    clearedAnythingThisTurn = false;
    comboStreak = 0;
    puddingActive = null;
    scoreVal.textContent = '0';
    levelVal.textContent = '1';
    levelUpToast.classList.remove('show');
    zenkeshiToast.classList.remove('show');
    chainVal.classList.remove('show');
    overlay.classList.remove('show');
    clearOverlay.classList.remove('show');
    nextColors = [randColor(), randColor()];
    spawnPiece();
  }

  function spawnPiece(){
    piece = newPieceFromColors(nextColors);
    nextColors = [randColor(), randColor()];
    drawNext();
    if(!pieceFits(piece)){
      triggerGameOver();
    }
  }

  function spawnStageBurst(){
    const w = board.width, h = board.height;
    for(let i=0;i<26;i++){
      const col = COLORS[Math.floor(Math.random()*N_COLORS)];
      particles.push({
        x: Math.random()*w,
        y: -10 - Math.random()*40,
        vx: (Math.random()-0.5)*1.2,
        vy: 1.5 + Math.random()*1.8,
        life: 1,
        decay: 0.006 + Math.random()*0.006,
        radius: 2.5 + Math.random()*3,
        color: col.glow
      });
    }
  }

  function isGridEmpty(){
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(grid[r][c]!==null) return false;
      }
    }
    return true;
  }

  function spawnZenkeshiBurst(){
    const w = board.width, h = board.height;
    const cx = w/2, cy = h*0.4;
    for(let i=0;i<44;i++){
      const col = COLORS[Math.floor(Math.random()*N_COLORS)];
      const angle = Math.random()*Math.PI*2;
      const speed = 2 + Math.random()*4;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 1,
        life: 1,
        decay: 0.01 + Math.random()*0.012,
        radius: 2.5 + Math.random()*3.5,
        color: col.glow
      });
    }
  }

  function startPuddingDrop(){
    busy = true;
    const col = Math.floor(COLS/2);
    puddingActive = {
      x: col*CELL + CELL/2,
      y: -CELL*1.2,
      landingY: (VISIBLE-1)*CELL + CELL/2
    };

    zenkeshiTitle.textContent = 'PUDDING BOMB!';
    zenkeshiSub.textContent = '콤보 3연속!';
    zenkeshiToast.classList.remove('show');
    void zenkeshiToast.offsetWidth;
    zenkeshiToast.classList.add('show');
    setTimeout(()=>zenkeshiToast.classList.remove('show'), 1200);
  }

  function spawnPuddingBurst(){
    const w = board.width, h = board.height;
    const cx = w/2, cy = (VISIBLE-1)*CELL + CELL/2;
    const puddingColors = ['rgba(200,140,70,0.6)','rgba(255,214,120,0.6)','rgba(160,100,50,0.6)'];
    for(let i=0;i<50;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = 2 + Math.random()*4.5;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 2,
        life: 1,
        decay: 0.009 + Math.random()*0.011,
        radius: 2.5 + Math.random()*3.8,
        color: puddingColors[i % puddingColors.length]
      });
    }
  }

  function landPudding(){
    puddingActive = null;
    grid = emptyGrid();
    popping = new Set();
    const bonus = Math.max(2000, level * 300);
    score += bonus;
    totalScore += bonus;
    scoreVal.textContent = score.toLocaleString();
    updateLevel();
    spawnPuddingBurst();
    render();
    busy = false;
    if(!gameOver && !stageCleared) spawnPiece();
  }

  function triggerZenkeshi(){
    const bonus = Math.max(1500, level * 250);
    score += bonus;
    totalScore += bonus;
    scoreVal.textContent = score.toLocaleString();
    updateLevel();

    zenkeshiTitle.textContent = 'ALL CLEAR!';
    zenkeshiSub.textContent = '+' + bonus.toLocaleString() + ' BONUS';
    zenkeshiToast.classList.remove('show');
    void zenkeshiToast.offsetWidth;
    zenkeshiToast.classList.add('show');
    setTimeout(()=>zenkeshiToast.classList.remove('show'), 1500);

    spawnZenkeshiBurst();
  }

  function spawnFinalConfetti(){
    const w = board.width, h = board.height;
    for(let i=0;i<60;i++){
      const col = COLORS[Math.floor(Math.random()*N_COLORS)];
      particles.push({
        x: Math.random()*w,
        y: -10 - Math.random()*h*0.6,
        vx: (Math.random()-0.5)*1.6,
        vy: 1.4 + Math.random()*2.2,
        life: 1,
        decay: 0.004 + Math.random()*0.005,
        radius: 2.5 + Math.random()*3.5,
        color: col.glow
      });
    }
  }

  function triggerAllClear(){
    stageCleared = true;
    busy = true;
    clearTitle.textContent = 'ALL CLEAR!';
    clearSub.textContent = '최종 점수 ' + totalScore.toLocaleString() + ' · ' + formatTime(elapsedMs);
    clearOverlay.classList.add('show');
    spawnFinalConfetti();
  }

  function triggerGameOver(){
    gameOver = true;
    busy = true;
    overlayTitle.textContent = 'GAME OVER';
    overlaySub.textContent = '최종 점수 ' + totalScore.toLocaleString() + ' · LV.' + level + ' · ' + formatTime(elapsedMs);
    overlay.classList.add('show');
  }

  // ---------- Movement ----------
  function tryMove(dc){
    if(busy||gameOver||stageCleared) return;
    const p2 = { axis:{...piece.axis}, sub:{...piece.sub}, rot:piece.rot };
    p2.axis.c += dc; p2.sub.c += dc;
    if(pieceFits(p2)){ piece = p2; }
  }

  function tryRotate(dir){
    if(busy||gameOver||stageCleared) return;
    let newRot = (piece.rot + dir + 4) % 4;
    const p2 = { axis:{...piece.axis}, sub:{r:0,c:0,color:piece.sub.color}, rot:newRot };
    syncSub(p2);
    if(pieceFits(p2)){ piece = p2; return; }
    const kicks = [ -1, 1, -2, 2 ];
    for(const k of kicks){
      const p3 = { axis:{...p2.axis, c:p2.axis.c+k}, sub:{r:0,c:0,color:piece.sub.color}, rot:newRot };
      syncSub(p3);
      if(pieceFits(p3)){ piece = p3; return; }
    }
  }

  function softDropStep(){
    if(busy||gameOver||stageCleared) return false;
    const p2 = { axis:{...piece.axis, r:piece.axis.r+1}, sub:{...piece.sub, r:piece.sub.r+1}, rot:piece.rot };
    if(pieceFits(p2)){ piece = p2; return true; }
    return false;
  }

  function hardDrop(){
    if(busy||gameOver||stageCleared) return;
    while(softDropStep()){}
    lockPiece();
  }

  // ---------- Locking & resolving ----------
  function lockPiece(){
    busy = true;
    clearedAnythingThisTurn = false;
    const cells = [piece.axis, piece.sub];
    for(const cell of cells){
      if(cell.r>=0 && cell.r<ROWS) grid[cell.r][cell.c] = cell.color;
    }
    setTimeout(resolveBoard, 90);
  }

  function applyGravity(){
    let moved = false;
    for(let c=0;c<COLS;c++){
      let write = ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(grid[r][c]!==null){
          if(write!==r){
            grid[write][c] = grid[r][c];
            grid[r][c] = null;
            moved = true;
          }
          write--;
        }
      }
    }
    return moved;
  }

  function findGroups(){
    const visited = Array.from({length:ROWS}, ()=>new Array(COLS).fill(false));
    const groups = [];
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(grid[r][c]===null || visited[r][c]) continue;
        const color = grid[r][c];
        const stack = [[r,c]];
        const group = [];
        visited[r][c] = true;
        while(stack.length){
          const [cr,cc] = stack.pop();
          group.push([cr,cc]);
          const neighbors = [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]];
          for(const [nr,nc] of neighbors){
            if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
            if(visited[nr][nc]) continue;
            if(grid[nr][nc]===color){
              visited[nr][nc]=true;
              stack.push([nr,nc]);
            }
          }
        }
        if(group.length>=4) groups.push(group);
      }
    }
    return groups;
  }

  function formatTime(ms){
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    const ss = s % 60;
    return m + ':' + String(ss).padStart(2,'0');
  }

  function computeDropInterval(){
    const timeFactor = Math.floor(elapsedMs / 15000) * 25; // every 15s, speed up a bit more
    dropInterval = Math.max(140, 700 - (level-1) * 32 - timeFactor);
  }

  function thresholdForLevel(lvl){
    return LEVEL_BASE_STEP + LEVEL_STEP_INCREMENT * (lvl - 1);
  }

  function updateLevel(){
    if(level < MAX_LEVEL && score >= thresholdForLevel(level)){
      level++;
      score = 0;
      comboStreak = 0;
      scoreVal.textContent = '0';
      levelVal.textContent = level;
      levelVal.classList.remove('pop');
      void levelVal.offsetWidth;
      levelVal.classList.add('pop');
      setTimeout(()=>levelVal.classList.remove('pop'), 260);

      const isStage = (level % STAGE_SIZE === 0);
      const isFinal = (level >= MAX_LEVEL);

      levelUpTitle.textContent = isStage ? ('STAGE ' + (level/STAGE_SIZE) + ' CLEAR!') : 'LEVEL UP!';
      levelUpSub.textContent = 'LV.' + level;
      levelUpToast.classList.toggle('stage', isStage);
      levelUpToast.classList.remove('show');
      void levelUpToast.offsetWidth;
      levelUpToast.classList.add('show');
      const showMs = isStage ? 1500 : 1100;
      setTimeout(()=>levelUpToast.classList.remove('show'), showMs);

      if(isStage){
        spawnStageBurst();
      }
      if(isFinal){
        stageCleared = true;
        busy = true;
        setTimeout(triggerAllClear, showMs + 150);
      }
    }
    computeDropInterval();
  }

  let chainCount = 0;
  let clearedAnythingThisTurn = false;
  let comboStreak = 0;
  let puddingActive = null;
  const PUDDING_FALL_SPEED = 7; // px per ~16.67ms frame
  const chainPower = [0,8,16,32,64,96,128,160,192,224,256,288,320,352,384,416,448];

  function resolveBoard(){
    applyGravity();
    const groups = findGroups();
    if(groups.length===0){
      chainCount = 0;
      chainVal.classList.remove('show');
      let puddingTriggered = false;
      if(clearedAnythingThisTurn){
        if(isGridEmpty()){
          triggerZenkeshi();
        }
        comboStreak++;
        if(comboStreak >= 3){
          comboStreak = 0;
          puddingTriggered = true;
        }
      } else {
        comboStreak = 0;
      }
      clearedAnythingThisTurn = false;
      render();
      busy = false;
      if(puddingTriggered){
        startPuddingDrop();
      } else if(!gameOver && !stageCleared){
        spawnPiece();
      }
      return;
    }

    chainCount++;
    clearedAnythingThisTurn = true;
    let totalCleared = 0;
    const colorsInvolved = new Set();
    popping = new Set();
    for(const g of groups){
      totalCleared += g.length;
      for(const [r,c] of g){
        popping.add(r+','+c);
        colorsInvolved.add(grid[r][c]);
        spawnPopParticles(r, c, grid[r][c]);
      }
    }
    render();

    if(chainCount>=2){
      chainVal.textContent = chainCount + ' CHAIN!';
      chainVal.classList.remove('show');
      void chainVal.offsetWidth;
      chainVal.classList.add('show');
    }

    setTimeout(()=>{
      for(const key of popping){
        const [r,c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      popping = new Set();
      const power = chainPower[Math.min(chainCount, chainPower.length-1)];
      const colorBonus = colorsInvolved.size>=2 ? (colorsInvolved.size-1)*3 : 0;
      const groupBonus = groups.reduce((s,g)=> s + Math.max(0, g.length-4), 0);
      const multiplier = Math.max(1, power + colorBonus + groupBonus);
      const gained = totalCleared * 10 * multiplier;
      score += gained;
      totalScore += gained;
      scoreVal.textContent = score.toLocaleString();
      updateLevel();
      render();
      setTimeout(()=>{ chainVal.classList.remove('show'); resolveBoard(); }, 160);
    }, 340);
  }

  // ---------- Rendering ----------
  function spawnPopParticles(r, c, colorIndex){
    const col = COLORS[colorIndex];
    if(!col) return;
    const cx = c*CELL + CELL/2;
    const cy = (r-HIDDEN)*CELL + CELL/2;
    const n = 9;
    for(let i=0;i<n;i++){
      const angle = (Math.PI*2*i)/n + (Math.random()-0.5)*0.6;
      const speed = 1.6 + Math.random()*2.6;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - 1.8,
        life: 1,
        decay: 0.022 + Math.random()*0.016,
        radius: 2 + Math.random()*3.2,
        color: col.glow
      });
    }
    // small burst ring
    particles.push({
      ring:true, x:cx, y:cy, r:CELL*0.1, maxR: CELL*0.75,
      life:1, decay:0.06, color: col.glow
    });
  }

  function updateParticles(dt){
    const k = Math.min(3, dt/16.67);
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      if(p.ring){
        p.r += (p.maxR - p.r) * 0.35 * k;
        p.life -= p.decay * k;
      } else {
        p.x += p.vx * k;
        p.y += p.vy * k;
        p.vy += 0.14 * k;
        p.vx *= 0.985;
        p.life -= p.decay * k;
      }
      if(p.life <= 0) particles.splice(i,1);
    }
  }

  function drawParticles(){
    for(const p of particles){
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      if(p.ring){
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.stroke();
      } else {
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawPuyo(c, cx, cy, radius, colorIndex, isPopping, scale){
    scale = scale===undefined?1:scale;
    const col = COLORS[colorIndex];
    const img = puyoImg[col.key];
    c.save();
    c.translate(cx,cy);
    c.scale(scale,scale);

    c.shadowColor = col.glow;
    c.shadowBlur = isPopping ? 28 : 12;

    if(img && img.complete && img.naturalWidth){
      const w = radius * 2.35;
      const h = w * IMG_ASPECT;
      c.drawImage(img, -w/2, -h/2, w, h);
    } else {
      // fallback while sprite loads
      c.fillStyle = col.glow;
      c.beginPath();
      c.arc(0,0,radius,0,Math.PI*2);
      c.fill();
    }
    c.restore();
  }

  function drawPudding(){
    if(!puddingImgReady) return;
    const w = CELL * 1.6;
    const h = w * PUDDING_ASPECT;
    ctx.save();
    ctx.shadowColor = 'rgba(200,140,70,0.7)';
    ctx.shadowBlur = 20;
    ctx.drawImage(puddingImgEl, puddingActive.x - w/2, puddingActive.y - h/2, w, h);
    ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,board.width,board.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.035)';
    ctx.lineWidth = 1;
    for(let c=1;c<COLS;c++){
      ctx.beginPath();
      ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL, VISIBLE*CELL);
      ctx.stroke();
    }
    for(let r=1;r<VISIBLE;r++){
      ctx.beginPath();
      ctx.moveTo(0,r*CELL); ctx.lineTo(COLS*CELL, r*CELL);
      ctx.stroke();
    }

    for(let r=HIDDEN;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const v = grid[r][c];
        if(v===null) continue;
        const isPop = popping.has(r+','+c);
        const cx = c*CELL + CELL/2;
        const cy = (r-HIDDEN)*CELL + CELL/2;
        const pulse = isPop ? 1.15 + Math.sin(animT/40)*0.05 : 1;
        drawPuyo(ctx, cx, cy, CELL*0.42, v, isPop, pulse);
      }
    }

    if(!busy && !gameOver && piece){
      for(const cell of [piece.axis, piece.sub]){
        if(cell.r < HIDDEN) continue;
        const cx = cell.c*CELL + CELL/2;
        const cy = (cell.r-HIDDEN)*CELL + CELL/2;
        drawPuyo(ctx, cx, cy, CELL*0.42, cell.color, false, 1);
      }
    }

    if(puddingActive){
      drawPudding();
    }

    drawParticles();
  }

  function drawNext(){
    nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
    const cx = nextCanvas.width/2;
    drawPuyo(nctx, cx, 46, 16, nextColors[0], false, 1);
    drawPuyo(nctx, cx, 18, 16, nextColors[1], false, 1);
  }

  // ---------- Main loop ----------
  let timeDisplayAccum = 0;

  function loop(t){
    const dt = t - lastTime;
    lastTime = t;
    animT += dt;
    updateParticles(dt);

    if(puddingActive){
      const k = Math.min(3, dt/16.67);
      puddingActive.y += PUDDING_FALL_SPEED * k;
      if(puddingActive.y >= puddingActive.landingY){
        landPudding();
      }
    }

    if(!gameOver && !stageCleared){
      elapsedMs += dt;
      timeDisplayAccum += dt;
      if(timeDisplayAccum >= 250){
        timeDisplayAccum = 0;
        timeVal.textContent = formatTime(elapsedMs);
        computeDropInterval();
      }
    }

    if(!busy && !gameOver && !stageCleared){
      dropTimer += dt;
      const interval = softDrop ? Math.min(60, dropInterval/8) : dropInterval;
      if(dropTimer >= interval){
        dropTimer = 0;
        if(!softDropStep()){
          lockPiece();
        }
      }
    }
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Prevent mobile zoom gestures ----------
  document.addEventListener('gesturestart', (e)=> e.preventDefault());
  document.addEventListener('gesturechange', (e)=> e.preventDefault());
  document.addEventListener('touchmove', (e)=>{
    if(e.touches.length > 1) e.preventDefault(); // block pinch-zoom
  }, {passive:false});
  let lastTapTime = 0;
  document.addEventListener('touchend', (e)=>{
    const now = Date.now();
    if(now - lastTapTime < 350) e.preventDefault(); // block double-tap zoom
    lastTapTime = now;
  }, {passive:false});

  // ---------- Input ----------
  window.addEventListener('keydown', (e)=>{
    switch(e.key){
      case 'ArrowLeft': tryMove(-1); e.preventDefault(); break;
      case 'ArrowRight': tryMove(1); e.preventDefault(); break;
      case 'ArrowDown': softDrop = true; e.preventDefault(); break;
      case 'ArrowUp': case 'x': case 'X': tryRotate(1); e.preventDefault(); break;
      case 'z': case 'Z': tryRotate(-1); e.preventDefault(); break;
      case ' ': hardDrop(); e.preventDefault(); break;
    }
  });
  window.addEventListener('keyup', (e)=>{
    if(e.key==='ArrowDown') softDrop = false;
  });

  document.getElementById('restartBtn').addEventListener('click', resetGame);
  document.getElementById('restartTop').addEventListener('click', resetGame);
  document.getElementById('clearRestartBtn').addEventListener('click', resetGame);
  document.getElementById('continueBtn').addEventListener('click', ()=>{
    clearOverlay.classList.remove('show');
    stageCleared = false;
    busy = false;
  });

  // ---------- Mobile: swipe to move, tap to rotate, drag down to drop ----------
  let gestureActive = false;
  let gestureStartX = 0, gestureStartY = 0, gestureLastX = 0, gestureMoved = false;
  let gestureHardFired = false;
  const SOFT_DROP_DIST = 22;   // px dragged down before soft drop kicks in
  const HARD_DROP_DIST = 130;  // px dragged down before it snaps to a hard drop

  boardWrap.addEventListener('pointerdown', (e)=>{
    gestureActive = true;
    gestureStartX = gestureLastX = e.clientX;
    gestureStartY = e.clientY;
    gestureMoved = false;
    gestureHardFired = false;
  });

  boardWrap.addEventListener('pointermove', (e)=>{
    if(!gestureActive) return;
    const dx = e.clientX - gestureLastX;
    const totalDx = e.clientX - gestureStartX;
    const totalDy = e.clientY - gestureStartY;
    if(Math.abs(totalDx) > 8 || Math.abs(totalDy) > 8) gestureMoved = true;

    const threshold = Math.max(26, CELL * 0.62);
    if(Math.abs(dx) >= threshold){
      tryMove(dx > 0 ? 1 : -1);
      gestureLastX = e.clientX;
    }

    // Vertical drag distance controls drop: a short drag = soft drop,
    // dragging far enough snaps straight into a hard drop.
    if(!gestureHardFired){
      if(totalDy >= HARD_DROP_DIST){
        gestureHardFired = true;
        softDrop = false;
        hardDrop();
      } else if(totalDy >= SOFT_DROP_DIST){
        softDrop = true;
      } else {
        softDrop = false;
      }
    }
  });

  function endGesture(e){
    if(!gestureActive) return;
    gestureActive = false;
    softDrop = false;
    if(!gestureMoved){
      tryRotate(1); // tap the board = rotate
    }
  }
  boardWrap.addEventListener('pointerup', endGesture);
  boardWrap.addEventListener('pointercancel', endGesture);
  boardWrap.addEventListener('pointerleave', endGesture);

  // ---------- Start ----------
  loadPuyoImages(()=>{
    resetGame();
    resizeBoard();
    requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>
