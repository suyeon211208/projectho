<!DOCTYPE html>
  <html lang="ko">
<head>

    <title>말랑말랑 카드 매칭</title>
    <link rel="stylesheet" href="css/cardgame_style.css">
</head>
<body>
    <div id="ripple-container"></div>
    <button id="close-btn" onclick="goBack()">×</button>
    <div id="game-container">
        <h1>말랑말랑 카드 매칭</h1>

        <div id="card-board"></div>
        <div id="history">
            <h3>나의 기록</h3>
            <ul id="history-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>

</html>
