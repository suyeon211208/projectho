<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지뢰 찾기 - 100단계</title>
<style>
:root {
  --bg: #c0c0c0;
  --border-light: #ffffff;
  --border-dark: #7b7b7b;
  --key-face: #fff6da;
  --key-face-dark: #f0dfa6;
  --key-shadow: #c9a962;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at top, #f3e2b3 0%, #d8bd7d 70%);
  font-family: 'Courier New', Courier, monospace;
  padding: 16px;
}

.game-container {
  background: linear-gradient(160deg, #f0dfa8 0%, #d3b170 100%);
  padding: 16px;
  border: 3px solid #8a6d3b;
  border-radius: 16px;
  box-shadow: 0 14px 28px rgba(90, 65, 20, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3);
  max-width: 96vw;
}

.title {
  text-align: center;
  margin: 4px 0 2px;
  font-size: 22px;
  letter-spacing: 1px;
  color: #4a3b1f;
  text-shadow: 0 1px 0 #fff8e1, 0 0 8px rgba(255, 214, 110, 0.4);
}

.rule-text {
  text-align: center;
  margin: 0 0 10px;
  font-size: 12px;
  color: #6b5a35;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #4a3b1f;
  border: 1px solid #2e2410;
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 10px;
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
}

.label-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.label {
  font-size: 10px;
  font-weight: bold;
  color: #d8bd7d;
  margin-bottom: 2px;
  letter-spacing: 1px;
}

.counter {
  background: #2b210f;
  color: #ffd54f;
  font-weight: bold;
  font-size: 18px;
  padding: 2px 8px;
  border: 2px solid #6b5a35;
  border-radius: 4px;
  min-width: 46px;
  text-align: center;
  letter-spacing: 2px;
  font-family: 'Courier New', monospace;
  text-shadow: 0 0 6px rgba(255, 213, 79, 0.6);
}

.header {
  flex-wrap: wrap;
  row-gap: 6px;
}

.smiley {
  width: 44px;
  height: 44px;
  font-size: 20px;
  background: linear-gradient(180deg, var(--key-face) 0%, var(--key-face-dark) 100%);
  border: 1px solid #b7965a;
  border-radius: 8px;
  box-shadow: 0 3px 0 var(--key-shadow), 0 5px 6px rgba(90, 65, 20, 0.4);
  cursor: pointer;
  transition: transform 0.05s ease, box-shadow 0.05s ease;
}

.smiley:active {
  transform: translateY(3px);
  box-shadow: 0 0 0 var(--key-shadow), 0 1px 2px rgba(90, 65, 20, 0.4);
}

.message {
  text-align: center;
  min-height: 20px;
  font-weight: bold;
  font-size: 14px;
  color: #a8451a;
  margin-bottom: 8px;
  text-shadow: 0 0 6px rgba(255, 152, 0, 0.3);
}

.board-wrapper {
  display: flex;
  justify-content: center;
}

.board {
  display: grid;
  gap: 6px;
  background: #4a3b1f;
  border: 1px solid #2e2410;
  border-radius: 12px;
  padding: 12px;
  box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.5), 0 2px 0 rgba(255, 255, 255, 0.08);
}

.cell {
  background: linear-gradient(180deg, var(--key-face) 0%, var(--key-face-dark) 100%);
  border: 1px solid #b7965a;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
  font-family: 'Courier New', Courier, monospace;
  user-select: none;
  touch-action: none;
  box-shadow: 0 3px 0 var(--key-shadow), 0 5px 5px rgba(90, 65, 20, 0.35);
  transition: transform 0.06s ease, box-shadow 0.06s ease, background 0.1s ease;
}

.cell:hover:not(.revealed) {
  transform: translateY(-1px);
  box-shadow: 0 4px 0 var(--key-shadow), 0 7px 8px rgba(90, 65, 20, 0.4);
}

.cell:active:not(.revealed) {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--key-shadow), 0 2px 3px rgba(90, 65, 20, 0.35);
}

.cell.revealed {
  background: linear-gradient(180deg, #ecd9a4 0%, #dcc383 100%);
  border: 1px solid #a3813f;
  box-shadow: inset 0 2px 4px rgba(90, 65, 20, 0.3);
  transform: translateY(2px);
  cursor: pointer;
}

.cell.mine-found {
  background: linear-gradient(180deg, #ecd9a4 0%, #dcc383 100%);
}

.cell.mine-exploded-safe {
  background: linear-gradient(180deg, #ffd54f 0%, #ffb300 100%);
  border: 1px solid #d18f00;
  box-shadow: inset 0 2px 4px rgba(90, 65, 20, 0.3);
}

.cell.mine-revealed-other {
  background: linear-gradient(180deg, #f5e8c2 0%, #e3cd97 100%);
  border: 1px solid #b7965a;
  box-shadow: inset 0 2px 4px rgba(90, 65, 20, 0.25);
}

.cell.flagged {
  background: linear-gradient(180deg, #fff1c9 0%, #f2dc9a 100%);
  border: 1px solid #c0392b;
}

.cell.n1 { color: #0000ff; }
.cell.n2 { color: #008000; }
.cell.n3 { color: #ff0000; }
.cell.n4 { color: #000080; }
.cell.n5 { color: #800000; }
.cell.n6 { color: #008080; }
.cell.n7 { color: #000000; }
.cell.n8 { color: #808080; }

.cell.highlight {
  outline: 3px solid #e65100;
  outline-offset: -3px;
  box-shadow: 0 0 8px 2px rgba(230, 81, 0, 0.8);
  z-index: 2;
}
</style>
</head>
<body>
  <div class="game-container">
    <h1 class="title">🦆 지뢰 찾기 챌린지 🦆</h1>
    <p class="rule-text">단계가 오를수록 지뢰가 늘어나요! 숫자는 주변 8칸의 지뢰 개수, 길게 누르면 🚩 깃발 표시</p>

    <div class="header">
      <div class="label-box">
        <span class="label">LEVEL</span>
        <div class="counter" id="level-counter">001</div>
      </div>

      <div class="label-box">
        <span class="label">MINES</span>
        <div class="counter" id="mines-total-counter">5</div>
      </div>

      <button class="smiley" id="smiley-btn" title="다시 시작">🙂</button>

      <div class="label-box">
        <span class="label">MISS</span>
        <div class="counter" id="mine-counter">0/5</div>
      </div>
    </div>

    <div class="message" id="message">&nbsp;</div>

    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
  </div>

<script>
// ===== 게임 설정 =====
const BASE_CELLS = 25;       // 1단계 기본 칸 수
const CELLS_PER_LEVEL = 2;   // 단계마다 늘어나는 칸 수 (2의 배수 증가)
const MAX_LEVEL = 100;       // 최대 단계
const BASE_MINE_COUNT = 5;   // 1단계 기본 지뢰 개수
const LEVELS_PER_MINE_STEP = 5; // 이 단계 수마다 지뢰가 1개씩 늘어남
const MAX_MISSES = 5;        // 실수(지뢰 밟기) 허용 횟수는 항상 고정

// ===== DOM =====
const boardEl = document.getElementById('board');
const levelCounterEl = document.getElementById('level-counter');
const minesTotalCounterEl = document.getElementById('mines-total-counter');
const mineCounterEl = document.getElementById('mine-counter');
const smileyBtn = document.getElementById('smiley-btn');
const messageEl = document.getElementById('message');

// ===== 상태 =====
let level = 1;
let missCount = 0;        // 지뢰를 밟은 횟수 (5번 되면 게임 오버)
let safeRevealed = 0;     // 안전한 칸을 연 개수
let mines = new Set();
let revealed = new Set();
let flags = new Set();    // 깃발 표시된 칸
let gameOver = false;
let columns = 0;
let rows = 0;
let totalCells = 0;
let currentMineCount = BASE_MINE_COUNT; // 이번 단계의 지뢰 개수

function initLevel() {
  gameOver = false;
  missCount = 0;
  safeRevealed = 0;
  revealed = new Set();
  flags = new Set();
  messageEl.innerHTML = '&nbsp;';
  smileyBtn.textContent = '🙂';

  // 단계별 칸 수 계산 (2씩 증가)
  totalCells = BASE_CELLS + (level - 1) * CELLS_PER_LEVEL;
  columns = Math.ceil(Math.sqrt(totalCells));
  rows = Math.ceil(totalCells / columns);
  totalCells = columns * rows;

  // 단계가 오를수록 지뢰 개수 증가 (LEVELS_PER_MINE_STEP 단계마다 +1)
  currentMineCount = BASE_MINE_COUNT + Math.floor((level - 1) / LEVELS_PER_MINE_STEP);
  // 안전 칸이 최소 몇 개는 남도록 상한 적용
  currentMineCount = Math.min(currentMineCount, Math.floor(totalCells * 0.4));

  // 지뢰 배치
  mines = new Set();
  while (mines.size < currentMineCount) {
    mines.add(Math.floor(Math.random() * totalCells));
  }

  render();
  updateCounters();
}

function render() {
  boardEl.innerHTML = '';

  // 화면 크기에 맞춰 셀 크기 조정
  const maxBoardWidth = Math.min(window.innerWidth * 0.9, 640);
  const cellSize = Math.max(14, Math.min(32, Math.floor(maxBoardWidth / columns)));

  boardEl.style.gridTemplateColumns = `repeat(${columns}, ${cellSize}px)`;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.width = cellSize + 'px';
    cell.style.height = cellSize + 'px';
    cell.style.fontSize = Math.max(10, cellSize - 8) + 'px';
    cell.dataset.index = i;
    cell.addEventListener('click', onCellClick);
    cell.addEventListener('pointerdown', onCellPointerDown);
    cell.addEventListener('pointerup', onCellPointerUp);
    cell.addEventListener('pointerleave', onCellPointerUp);
    cell.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      toggleFlag(Number(e.currentTarget.dataset.index));
    });
    boardEl.appendChild(cell);
  }
}

function updateCounters() {
  levelCounterEl.textContent = String(level).padStart(3, '0');
  minesTotalCounterEl.textContent = currentMineCount;
  mineCounterEl.textContent = `${missCount}/${MAX_MISSES}`;
}

function getNeighbors(idx) {
  const row = Math.floor(idx / columns);
  const col = idx % columns;
  const result = [];

  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const r = row + dr;
      const c = col + dc;
      if (r < 0 || r >= rows || c < 0 || c >= columns) continue;
      result.push(r * columns + c);
    }
  }

  return result;
}

function countAdjacentMines(idx) {
  return getNeighbors(idx).filter((n) => mines.has(n)).length;
}

const NUMBER_CLASS = ['', 'n1', 'n2', 'n3', 'n4', 'n5', 'n6', 'n7', 'n8'];

function revealCell(idx) {
  if (revealed.has(idx) || mines.has(idx)) return;

  revealed.add(idx);
  safeRevealed++;

  const cellEl = boardEl.children[idx];
  cellEl.classList.add('revealed', 'mine-found');

  const count = countAdjacentMines(idx);
  if (count > 0) {
    cellEl.textContent = count;
    cellEl.classList.add(NUMBER_CLASS[count]);
  } else {
    cellEl.textContent = '';
    // 인접 지뢰가 0개면 주변 칸을 자동으로 연다 (플러드 필)
    getNeighbors(idx).forEach((n) => {
      if (!revealed.has(n) && !mines.has(n)) {
        revealCell(n);
      }
    });
  }
}

let highlightTimeout = null;

function highlightNeighbors(idx) {
  const neighbors = getNeighbors(idx);

  clearTimeout(highlightTimeout);
  // 이전 하이라이트 제거
  [...boardEl.children].forEach((el) => el.classList.remove('highlight'));

  neighbors.forEach((n) => {
    boardEl.children[n].classList.add('highlight');
  });

  highlightTimeout = setTimeout(() => {
    neighbors.forEach((n) => {
      boardEl.children[n].classList.remove('highlight');
    });
  }, 800);
}

const LONG_PRESS_MS = 450;
let pressTimer = null;
let longPressTriggered = false;

function onCellPointerDown(e) {
  if (gameOver) return;

  const idx = Number(e.currentTarget.dataset.index);
  if (revealed.has(idx)) return;

  longPressTriggered = false;
  clearTimeout(pressTimer);

  pressTimer = setTimeout(() => {
    longPressTriggered = true;
    toggleFlag(idx);
  }, LONG_PRESS_MS);
}

function onCellPointerUp() {
  clearTimeout(pressTimer);
}

function toggleFlag(idx) {
  if (gameOver || revealed.has(idx)) return;

  const cellEl = boardEl.children[idx];

  if (flags.has(idx)) {
    flags.delete(idx);
    cellEl.classList.remove('flagged');
    cellEl.textContent = '';
  } else {
    flags.add(idx);
    cellEl.classList.add('flagged');
    cellEl.textContent = '🚩';
  }
}

function onCellClick(e) {
  if (gameOver) return;

  if (longPressTriggered) {
    // 길게 눌러 플래그를 방금 토글한 경우, 뒤이어 발생하는 클릭(오픈)은 무시
    longPressTriggered = false;
    return;
  }

  const idx = Number(e.currentTarget.dataset.index);

  if (flags.has(idx)) {
    // 플래그가 꽂힌 칸은 일반 클릭으로 열리지 않음 (길게 눌러야 해제됨)
    return;
  }

  if (revealed.has(idx)) {
    // 이미 열린 안전한 칸(숫자 포함)을 다시 클릭하면 해당 숫자가 세는 주변 영역을 표시
    if (!mines.has(idx)) {
      highlightNeighbors(idx);
    }
    return;
  }

  if (mines.has(idx)) {
    // 지뢰를 밟음 -> 실수 카운트 증가, 게임은 계속 진행
    revealed.add(idx);
    missCount++;
    const cellEl = e.currentTarget;
    cellEl.classList.add('revealed', 'mine-exploded-safe');
    cellEl.textContent = '🦆';
    updateCounters();

    if (missCount >= MAX_MISSES) {
      triggerGameOver();
    }
  } else {
    // 안전한 칸 -> 진행 (숫자 힌트 표시, 0이면 주변 자동 오픈)
    revealCell(idx);

    const safeTotal = totalCells - currentMineCount;
    if (safeRevealed >= safeTotal) {
      levelClear();
    }
  }
}

function levelClear() {
  gameOver = true;
  smileyBtn.textContent = '😎';

  if (level >= MAX_LEVEL) {
    messageEl.textContent = '🎉 축하합니다! 100단계를 모두 클리어했습니다! 🎉';
    disableBoard();
    return;
  }

  messageEl.textContent = `레벨 ${level} 클리어! 다음 단계로 이동합니다...`;
  disableBoard();

  setTimeout(() => {
    level++;
    initLevel();
  }, 1100);
}

function triggerGameOver() {
  gameOver = true;
  smileyBtn.textContent = '😵';
  messageEl.textContent = `GAME OVER — 레벨 ${level}에서 지뢰를 ${MAX_MISSES}번 밟았습니다.`;

  // 남은 지뢰 모두 표시
  [...boardEl.children].forEach((el, idx) => {
    if (mines.has(idx) && !revealed.has(idx)) {
      el.classList.add('mine-revealed-other');
      el.textContent = '🦆';
    }
  });

  disableBoard();
}

function disableBoard() {
  [...boardEl.children].forEach((c) => c.classList.add('revealed'));
}

smileyBtn.addEventListener('click', () => {
  level = 1;
  initLevel();
});

window.addEventListener('resize', () => {
  if (!gameOver) render();
});

// 시작
initLevel();
</script>
</body>
</html>
