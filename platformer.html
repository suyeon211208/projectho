<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>점프 어드벤처</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overscroll-behavior:none; }
  body {
    font-family:'Courier New', monospace; color:#fff;
    touch-action:none; overflow:hidden;
    background:#000;
  }
  #gameContainer {
    position:fixed; inset:0;
    width:100%; height:100%;
  }
  canvas {
    background:#5c94fc;
    image-rendering: pixelated;
    display:block;
    width:100%; height:100%;
  }
  #hud {
    position:absolute; top:clamp(8px,2vh,16px); left:clamp(8px,3vw,20px); right:clamp(8px,3vw,20px);
    display:flex; justify-content:space-between;
    font-size:clamp(12px,3.2vw,18px); text-shadow:2px 2px 0 #000;
    pointer-events:none; font-weight:bold;
  }
  #objective {
    position:absolute; top:clamp(34px,7vh,52px); left:50%; transform:translateX(-50%);
    font-size:clamp(11px,2.8vw,15px); text-shadow:2px 2px 0 #000;
    pointer-events:none; font-weight:bold; color:#ffe27a;
    display:none; white-space:nowrap;
  }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.6); text-align:center;
    padding:16px; z-index:20;
  }
  #overlay h1 { font-size:clamp(20px,5vw,32px); margin-bottom:16px; text-shadow:3px 3px 0 #000; }
  #overlay button {
    margin-top:16px; padding:10px 24px; font-size:16px; font-family:inherit;
    background:#ffcb05; border:3px solid #2b2b2b; border-radius:4px; cursor:pointer;
    font-weight:bold;
  }
  #overlay button:active { transform:scale(0.96); }

  /* Mobile joystick + jump button, overlaid on the game screen */
  #joystickBase {
    position:absolute; left:clamp(16px,4vw,32px); bottom:clamp(16px,4vh,32px);
    width:clamp(84px,24vw,120px); height:clamp(84px,24vw,120px);
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    border:3px solid rgba(255,255,255,0.35);
    touch-action:none; -webkit-user-select:none; user-select:none;
    display:flex; align-items:center; justify-content:center;
  }
  #joystickKnob {
    width:44%; height:44%;
    border-radius:50%;
    background:rgba(255,255,255,0.55);
    border:2px solid rgba(0,0,0,0.3);
    pointer-events:none;
  }
  #btnJump {
    position:absolute; right:clamp(20px,5vw,40px); bottom:clamp(24px,5vh,40px);
    width:clamp(72px,20vw,96px); height:clamp(72px,20vw,96px);
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    border:3px solid rgba(255,255,255,0.4);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(24px,7vw,32px); color:#fff;
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  #btnJump:active, #joystickBase.active { background-color:rgba(255,255,255,0.35); }
</style>
</head>

  <canvas id="game"></canvas>

    <div>점수: <span id="score">0</span></div>
  </div>
  <div id="objective"></div>
  <div id="overlay">
    <h1 id="overlayText">점프 어드벤처</h1>
    <button id="overlayBtn">시작하기</button>
  </div>
  <div id="joystickBase">
    <div id="joystickKnob"></div>
  </div>
  <div id="btnJump">⤴</div>
</div>

}

// ---- Joystick (left/right movement) ----
const joyBase = document.getElementById('joystickBase');
const joyKnob = document.getElementById('joystickKnob');
const JOY_RADIUS = 40;
let joyTouchId = null;

function joyReset(){
  joyKnob.style.transform = 'translate(0px,0px)';
  joyBase.classList.remove('active');
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
}
function joyMoveTo(clientX, clientY){
  const rect = joyBase.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  let dx = clientX - cx, dy = clientY - cy;
  const dist = Math.min(JOY_RADIUS, Math.hypot(dx,dy));
  const angle = Math.atan2(dy,dx);
  const kx = Math.cos(angle)*dist, ky = Math.sin(angle)*dist;
  joyKnob.style.transform = `translate(${kx}px, ${ky}px)`;
  keys['ArrowLeft'] = dx < -14;
  keys['ArrowRight'] = dx > 14;
}
joyBase.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joyTouchId = t.identifier;
  joyBase.classList.add('active');
  joyMoveTo(t.clientX, t.clientY);
});
joyBase.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === joyTouchId) joyMoveTo(t.clientX, t.clientY);
  }
});
function joyEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier === joyTouchId){ joyTouchId = null; joyReset(); }
  }
}
joyBase.addEventListener('touchend', joyEnd);
joyBase.addEventListener('touchcancel', joyEnd);
// Mouse fallback for testing on desktop
let joyMouseDown = false;
joyBase.addEventListener('mousedown', e => { joyMouseDown = true; joyBase.classList.add('active'); joyMoveTo(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => { if(joyMouseDown) joyMoveTo(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { if(joyMouseDown){ joyMouseDown = false; joyReset(); } });

// ---- Jump button ----
function bindTouch(id, code){
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e=>{ e.preventDefault(); keys[code]=true; });
  el.addEventListener('touchend', e=>{ e.preventDefault(); keys[code]=false; });
  el.addEventListener('mousedown', ()=> keys[code]=true);
  el.addEventListener('mouseup', ()=> keys[code]=false);
  el.addEventListener('mouseleave', ()=> keys[code]=false);
}
bindTouch('btnJump','Space');

// Level map: 0 empty, 1 ground, 2 brick, 3 question block, 4 pipe, 5 flagpole
const TOTAL_LEVELS = 100;
const LEVEL_ROWS = 13;
const GROUND_ROW = 11; // first ground row (11 & 12 are both ground)

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Builds a full level definition (tiles + enemy/coin spawns) for a given level number (1-100)
function generateLevel(levelNum){
  const rand = mulberry32(levelNum * 7919 + 12345);
  const width = 56 + Math.round(levelNum * 1.4); // steadily grows across all 100 levels
  const grid = [];
  for(let r=0; r<LEVEL_ROWS; r++) grid.push(new Array(width).fill('.'));

  // ---- Ground with jump-safe gaps ----
  const solid = new Array(width).fill(true);
  const gapChanceBase = 0.18 + Math.min(levelNum, 90) * 0.0035; // more gaps at higher levels
  let col = 6; // safe starting stretch
  while(col < width - 10){
    if(rand() < gapChanceBase){
      const gapW = 2 + (rand() < 0.35 ? 1 : 0); // 2-3 tiles wide (always jumpable)
      for(let i=0; i<gapW && col+i < width-8; i++) solid[col+i] = false;
      col += gapW + 3 + Math.floor(rand()*4);
    } else {
      col += 2 + Math.floor(rand()*4);
    }
  }
  for(let c=0; c<width; c++){
    grid[GROUND_ROW][c] = solid[c] ? '1' : '.';
    grid[GROUND_ROW+1][c] = solid[c] ? '1' : '.';
  }

  // ---- Floating blocks (brick / question) at reachable height ----
  const blockCount = 4 + Math.floor(levelNum/6);
  for(let i=0; i<blockCount; i++){
    const c = 8 + Math.floor(rand()*(width-18));
    if(!solid[c]) continue;
    const r = 6 + Math.floor(rand()*2); // rows 6-7, always within jump reach
    grid[r][c] = rand() < 0.55 ? '3' : '2';
  }

  // ---- Hidden blocks: invisible & non-solid until jumped into from below ----
  // Kept rare and only ever placed over empty ground/air so they never block
  // movement or land somewhere the player wasn't already free to jump.
  const hiddenBlockCount = 2 + Math.floor(levelNum/25);
  for(let i=0; i<hiddenBlockCount; i++){
    let tries = 0;
    while(tries < 15){
      tries++;
      const c = 8 + Math.floor(rand()*(width-18));
      const r = 6 + Math.floor(rand()*2);
      if(!solid[c]) continue;
      if(grid[r][c] !== '.') continue; // don't overlap an existing block
      grid[r][c] = '7';
      break;
    }
  }

  // ---- Pipes (2-tile tall, easy to hop over) ----
  const pipeCount = Math.floor(levelNum/10);
  for(let i=0; i<pipeCount; i++){
    const c = 10 + Math.floor(rand()*(width-22));
    if(!solid[c] || grid[GROUND_ROW-1][c] !== '.') continue;
    grid[GROUND_ROW-2][c] = '4';
    grid[GROUND_ROW-1][c] = '4';
  }

  // ---- One special pipe that warps to an underground area (level 15+) ----
  let warpPipeCol = -1;
  if(levelNum >= 15){
    let tries = 0;
    while(tries < 40){
      const c = 15 + Math.floor(rand()*Math.max(1, width-34));
      tries++;
      if(!solid[c]) continue;
      if(Math.abs(c - (width-4)) < 6) continue; // keep clear of the flag
      if(grid[GROUND_ROW-1][c] !== '.' || grid[GROUND_ROW-2][c] !== '.') continue;
      warpPipeCol = c;
      grid[GROUND_ROW-2][c] = '6';
      grid[GROUND_ROW-1][c] = '6';
      break;
    }
  }

  // ---- Single flag near the end ----
  const flagCol = width - 4;
  for(let c=flagCol-3; c<width; c++){
    solid[c] = true;
    grid[GROUND_ROW][c] = '1';
    grid[GROUND_ROW+1][c] = '1';
  }
  for(let r=GROUND_ROW-6; r<GROUND_ROW; r++) grid[r][flagCol] = '5';

  // ---- Enemies ----
  const enemyCount = 3 + Math.floor(levelNum/5);
  const enemies = [];
  const usedCols = [];
  for(let i=0; i<enemyCount; i++){
    let tries = 0;
    while(tries < 25){
      const c = 10 + Math.floor(rand()*(width-24));
      tries++;
      if(!solid[c]) continue;
      if(usedCols.some(u => Math.abs(u-c) < 4)) continue;
      usedCols.push(c);
      enemies.push({
        x: c*TILE, y: GROUND_ROW*TILE - 39, w:39, h:39,
        vx: rand() < 0.5 ? -1 : 1, alive:true, type:'goomba'
      });
      break;
    }
  }

  // ---- Coins ----
  const coinCount = 6 + Math.floor(levelNum/4);
  const coins = [];
  for(let i=0; i<coinCount; i++){
    const c = 8 + Math.floor(rand()*(width-16));
    const r = 5 + Math.floor(rand()*3);
    if(grid[r][c] !== '.') continue;
    coins.push({col:c, row:r, collected:false, bob: rand()*Math.PI*2});
  }

  // ---- Quest requirements: gets more demanding at higher levels ----
  let reqCoins = 0, reqEnemies = 0;
  if(levelNum > 15) reqCoins = Math.max(1, Math.ceil(coins.length * 0.4));
  if(levelNum > 40) reqCoins = Math.max(1, Math.ceil(coins.length * 0.6));
  if(levelNum > 35) reqEnemies = Math.max(1, Math.ceil(enemies.length * 0.4));
  if(levelNum > 70) reqEnemies = Math.max(1, Math.ceil(enemies.length * 0.6));

  return {
    rows: grid.map(row => row.join('')),
    enemies,
    coins,
    requirements: { coins: reqCoins, enemies: reqEnemies },
    warpPipeCol
  };
}

// Builds an underground bonus room reached via a warp pipe (only exists for level 15+).
// Difficulty scales with how far past level 15 we are, mirroring the surface level's growth.
// Deterministic per level so revisiting the same level gives the same room.
function generateSubLevel(levelNum){
  const rand = mulberry32(levelNum * 104729 + 555);
  const diff = Math.max(0, levelNum - 14); // 1 at level15, grows from there
  const width = 22 + Math.min(Math.round(diff * 1.1), 55);
  const grid = [];
  for(let r=0; r<LEVEL_ROWS; r++) grid.push(new Array(width).fill('.'));

  // Ceiling (row 2) is solid across the whole room
  for(let c=0; c<width; c++) grid[2][c] = '2';

  // Floor with jump-safe gaps (more/wider as difficulty rises, same safety rule as the surface)
  const solid = new Array(width).fill(true);
  const gapChanceBase = 0.15 + Math.min(diff, 70) * 0.003;
  let col = 5;
  while(col < width - 8){
    if(rand() < gapChanceBase){
      const gapW = 2 + (rand() < 0.35 ? 1 : 0); // always jumpable (2-3 tiles)
      for(let i=0; i<gapW && col+i < width-6; i++) solid[col+i] = false;
      col += gapW + 3 + Math.floor(rand()*4);
    } else {
      col += 2 + Math.floor(rand()*4);
    }
  }
  // keep the exit area solid
  for(let c=width-6; c<width; c++) solid[c] = true;
  for(let c=0; c<width; c++){
    grid[GROUND_ROW][c] = solid[c] ? '1' : '.';
    grid[GROUND_ROW+1][c] = solid[c] ? '1' : '.';
  }

  // Floating blocks with coins/power-ups
  const blockCount = 3 + Math.floor(diff/4);
  for(let i=0; i<blockCount; i++){
    const c = 5 + Math.floor(rand()*(width-14));
    if(!solid[c]) continue;
    const r = 6 + Math.floor(rand()*2);
    grid[r][c] = rand() < 0.5 ? '3' : '2';
  }

  // A rare hidden block or two, same rules as the surface: invisible & non-solid
  // until hit from below, and never placed where it could overlap anything else.
  const hiddenBlockCount = 1 + Math.floor(diff/20);
  for(let i=0; i<hiddenBlockCount; i++){
    let tries = 0;
    while(tries < 12){
      tries++;
      const c = 5 + Math.floor(rand()*(width-14));
      const r = 6 + Math.floor(rand()*2);
      if(!solid[c]) continue;
      if(grid[r][c] !== '.') continue;
      grid[r][c] = '7';
      break;
    }
  }

  // Scattered coins
  const coins = [];
  const coinCount = 6 + Math.floor(diff/2.5);
  for(let i=0; i<coinCount; i++){
    const c = 4 + Math.floor(rand()*(width-8));
    const r = 5 + Math.floor(rand()*4);
    if(grid[r][c] !== '.') continue;
    coins.push({col:c, row:r, collected:false, bob: rand()*Math.PI*2});
  }

  // Enemies, scaling with difficulty
  const enemyCount = 1 + Math.floor(diff/5);
  const enemies = [];
  const usedCols = [];
  for(let i=0; i<enemyCount; i++){
    let tries = 0;
    while(tries < 20){
      const c = 8 + Math.floor(rand()*(width-16));
      tries++;
      if(!solid[c]) continue;
      if(usedCols.some(u => Math.abs(u-c) < 4)) continue;
      usedCols.push(c);
      enemies.push({
        x: c*TILE, y: GROUND_ROW*TILE - 39, w:39, h:39,
        vx: rand() < 0.5 ? -1 : 1, alive:true, type:'goomba'
      });
      break;
    }
  }

  // Exit pipe back to the surface, near the far end
  const exitCol = width - 4;
  grid[GROUND_ROW-2][exitCol] = '6';
  grid[GROUND_ROW-1][exitCol] = '6';

  return {
    rows: grid.map(row => row.join('')),
    enemies,
    coins
  };
}

let level = [];
let ROWS = LEVEL_ROWS;
let COLS = 0;
let LEVEL_WIDTH = 0;
let LEVEL_HEIGHT = LEVEL_ROWS * TILE;

function tileAt(col, row){
  if(row < 0 || row >= ROWS || col < 0 || col >= COLS) return 0;
  return level[row][col] === '.' ? 0 : parseInt(level[row][col]);
}
function setTile(col, row, val){
  if(row<0||row>=ROWS||col<0||col>=COLS) return;
  let r = level[row].split('');
  r[col] = val===0? '.' : String(val);
  level[row] = r.join('');
}

// Entities
const SMALL_W = 38, SMALL_H = 46;
const BIG_W = 49, BIG_H = 59; // same aspect ratio as SMALL, scaled ~1.3x
const player = {
  x: 60, y: 300, w: SMALL_W, h: SMALL_H,
  vx:0, vy:0, onGround:false, facing:1,
  big:false, invincible:0, alive:true, jumpHeld:false,
  walkCycle: 0, growPulse: 0
};
let growParticles = [];

function spawnGrowImpact(){
  player.growPulse = 20;
  const centerX = player.x + player.w/2, centerY = player.y + player.h/2;
  const count = 14;
  for(let i=0; i<count; i++){
    const angle = (Math.PI*2/count)*i + Math.random()*0.25;
    const speed = 2.8 + Math.random()*2.2;
    growParticles.push({
      x: centerX, y: centerY,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 26, maxLife: 26
    });
  }
}

function growBig(){
  if(player.big) return;
  player.big = true;
  let dw = BIG_W - SMALL_W, dh = BIG_H - SMALL_H;
  player.x -= dw/2;
  player.y -= dh;
  player.w = BIG_W;
  player.h = BIG_H;
  spawnGrowImpact();
}

function shrinkSmall(){
  if(!player.big) return;
  player.big = false;
  let dw = BIG_W - SMALL_W, dh = BIG_H - SMALL_H;
  player.x += dw/2;
  player.y += dh;
  player.w = SMALL_W;
  player.h = SMALL_H;
}

let lives = 5, coins = 0, score = 0;
let currentLevelNum = 1;
let cameraX = 0;
let gameState = 'ready'; // ready, playing, levelComplete, dead, win
let bounceBlocks = []; // {col,row,timer}
let popups = []; // floating text/score
let enemies = [];
let coinList = [];
let items = []; // powerup mushrooms popped from blocks
let levelRequirements = { coins: 0, enemies: 0 };
let levelCoinsCollected = 0;
let levelEnemiesDefeated = 0;
let flagBlockedCooldown = 0;
let inSubLevel = false;
let mainSnapshot = null;
let warpCooldown = 0;
let prevOnGround = false;

function resetPlayer(){
  player.vx=0; player.vy=0;
  player.w = SMALL_W; player.h = SMALL_H;
  player.big=false; player.invincible=0; player.alive=true;
  player.walkCycle = 0;
  player.growPulse = 0;
  growParticles = [];
  if(inSubLevel){
    player.x = 96; player.y = GROUND_ROW*TILE - player.h;
  } else {
    player.x = 90; player.y = 450;
    // Center the camera on the player right away instead of starting at the world's left edge
    cameraX = player.x - canvas.width/2 + player.w/2;
  }
}

function loadLevel(n){
  currentLevelNum = Math.max(1, Math.min(TOTAL_LEVELS, n));
  const gen = generateLevel(currentLevelNum);
  level = gen.rows;
  ROWS = level.length;
  COLS = level[0].length;
  LEVEL_WIDTH = COLS * TILE;
  LEVEL_HEIGHT = ROWS * TILE;
  enemies = gen.enemies;
  coinList = gen.coins;
  items = [];
  bounceBlocks = [];
  popups = [];
  levelRequirements = gen.requirements;
  levelCoinsCollected = 0;
  levelEnemiesDefeated = 0;
  flagBlockedCooldown = 0;
  inSubLevel = false;
  mainSnapshot = null;
  warpCooldown = 0;
  resetPlayer();
  updateHUD();
}

function enterSubLevel(){
  if(inSubLevel) return;
  mainSnapshot = {
    level, ROWS, COLS, LEVEL_WIDTH, LEVEL_HEIGHT,
    enemies, coinList, items, bounceBlocks,
    cameraX, playerX: player.x, playerY: player.y
  };
  const sub = generateSubLevel(currentLevelNum);
  level = sub.rows;
  ROWS = level.length;
  COLS = level[0].length;
  LEVEL_WIDTH = COLS * TILE;
  LEVEL_HEIGHT = ROWS * TILE;
  enemies = sub.enemies;
  coinList = sub.coins;
  items = [];
  bounceBlocks = [];
  cameraX = 0;
  inSubLevel = true;
  player.vx = 0; player.vy = 0;
  player.x = 96;
  player.y = GROUND_ROW*TILE - player.h;
  warpCooldown = 30;
  popups.push({x:player.x, y:player.y-30, text:'지하 세계 진입!', life:60});
}

function exitSubLevel(){
  if(!inSubLevel || !mainSnapshot) return;
  level = mainSnapshot.level;
  ROWS = mainSnapshot.ROWS;
  COLS = mainSnapshot.COLS;
  LEVEL_WIDTH = mainSnapshot.LEVEL_WIDTH;
  LEVEL_HEIGHT = mainSnapshot.LEVEL_HEIGHT;
  enemies = mainSnapshot.enemies;
  coinList = mainSnapshot.coinList;
  items = mainSnapshot.items;
  bounceBlocks = mainSnapshot.bounceBlocks;
  cameraX = mainSnapshot.cameraX;
  player.vx = 0; player.vy = 0;
  player.x = mainSnapshot.playerX;
  player.y = mainSnapshot.playerY - 6;
  inSubLevel = false;
  warpCooldown = 30;
  mainSnapshot = null;
  popups.push({x:player.x, y:player.y-30, text:'지상으로 복귀!', life:60});
}

function tryWarp(){
  if(warpCooldown > 0) return;
  const footCol = Math.floor((player.x + player.w/2) / TILE);
  const footRow = Math.floor((player.y + player.h) / TILE);
  if(tileAt(footCol, footRow) === 6){
    if(inSubLevel) exitSubLevel(); else enterSubLevel();
  }
}

function fullReset(){
  lives = 5; coins = 0; score = 0;
  loadLevel(1);
}

function updateHUD(){
  document.getElementById('lives').textContent = lives;
  document.getElementById('coins').textContent = coins;
  document.getElementById('score').textContent = score;
  document.getElementById('levelNum').textContent = currentLevelNum;
  const objEl = document.getElementById('objective');
  const needCoins = levelRequirements.coins > 0;
  const needEnemies = levelRequirements.enemies > 0;
  if(!needCoins && !needEnemies){
    objEl.style.display = 'none';
  } else {
    objEl.style.display = 'block';
    let parts = [];
    if(needCoins) parts.push(`🪙 ${levelCoinsCollected}/${levelRequirements.coins}`);
    if(needEnemies) parts.push(`👾 ${levelEnemiesDefeated}/${levelRequirements.enemies}`);
    objEl.textContent = '목표: ' + parts.join('  ·  ');
  }
}

function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function tileSolid(t){ return t===1 || t===2 || t===3 || t===4 || t===6; }

function collideWithTiles(entity){
  entity.onGround = false;
  // Horizontal
  entity.x += entity.vx;
  let left = Math.floor(entity.x / TILE);
  let right = Math.floor((entity.x + entity.w) / TILE);
  let top = Math.floor(entity.y / TILE);
  let bottom = Math.floor((entity.y + entity.h - 1) / TILE);
  for(let r = top; r <= bottom; r++){
    if(entity.vx > 0){
      if(tileSolid(tileAt(right, r))){
        entity.x = right * TILE - entity.w;
        entity.vx = 0;
      }
    } else if(entity.vx < 0){
      if(tileSolid(tileAt(left, r))){
        entity.x = (left+1) * TILE;
        entity.vx = 0;
      }
    }
  }
  // Vertical
  entity.y += entity.vy;
  left = Math.floor(entity.x / TILE);
  right = Math.floor((entity.x + entity.w) / TILE);
  top = Math.floor(entity.y / TILE);
  bottom = Math.floor((entity.y + entity.h) / TILE);
  for(let c = left; c <= right; c++){
    if(entity.vy > 0){
      if(tileSolid(tileAt(c, bottom))){
        entity.y = bottom * TILE - entity.h;
        entity.vy = 0;
        entity.onGround = true;
      }
    } else if(entity.vy < 0){
      let t = tileAt(c, top);
      if(tileSolid(t)){
        entity.y = (top+1) * TILE;
        entity.vy = 0;
        if(t === 3 && entity === player){
          hitBlock(c, top);
        } else if(t === 2 && entity === player && player.big){
          setTile(c, top, 0);
          score += 20;
          popups.push({x:c*TILE, y:top*TILE, text:'+20', life:40});
        }
      } else if(t === 7 && entity === player){
        // Hidden block: invisible and non-solid until jumped into from below
        hitBlock(c, top);
      }
    }
  }
}

function hitBlock(col, row){
  setTile(col, row, 0);
  bounceBlocks.push({col, row, timer:8});
  if(Math.random() < 0.4){
    items.push({x:col*TILE, y:row*TILE - TILE, w:39, h:39, vx: 1.8, vy:-4.5, type:'mushroom', landed:false});
  } else {
    coins++;
    levelCoinsCollected++;
    score += 50;
    popups.push({x:col*TILE, y:row*TILE, text:'+50', life:40});
    updateHUD();
  }
}

function updatePlayer(){
  if(!player.alive) return;

  if(keys['ArrowLeft']){ player.vx -= 0.9; player.facing = -1; }
  if(keys['ArrowRight']){ player.vx += 0.9; player.facing = 1; }
  player.vx *= FRICTION;
  if(Math.abs(player.vx) > MOVE_SPEED) player.vx = MOVE_SPEED * Math.sign(player.vx);
  if(Math.abs(player.vx) < 0.05) player.vx = 0;

  if((keys['Space'] || keys['ArrowUp'])){
    if(player.onGround && !player.jumpHeld){
      player.vy = JUMP_FORCE;
      player.jumpHeld = true;
    } else if(!player.onGround && player.jumpHeld && player.vy < -4.5){
      player.vy -= 0.225; // slight boost while held for variable jump feel
    }
  } else {
    player.jumpHeld = false;
    if(player.vy < -6) player.vy = -6; // cut jump short
  }
  if(player.onGround) player.jumpHeld = keys['Space']||keys['ArrowUp'] ? player.jumpHeld : false;

  player.vy += GRAVITY;
  if(player.vy > 21) player.vy = 21;

  collideWithTiles(player);

  // Running animation cycle: advances while moving on the ground,
  // eases back to a neutral pose (nearest full cycle) when idle.
  if(player.onGround && Math.abs(player.vx) > 0.3){
    player.walkCycle += Math.abs(player.vx) * 0.3;
  } else if(player.onGround){
    const target = Math.round(player.walkCycle / (Math.PI*2)) * Math.PI*2;
    player.walkCycle += (target - player.walkCycle) * 0.2;
  }

  if(player.x < 0) player.x = 0;
  if(player.x + player.w > LEVEL_WIDTH) player.x = LEVEL_WIDTH - player.w;
  if(player.invincible > 0) player.invincible--;

  // Fall off world
  if(player.y > LEVEL_HEIGHT + 100){
    die();
  }

  if(flagBlockedCooldown > 0) flagBlockedCooldown--;
  if(warpCooldown > 0) warpCooldown--;
  if(player.growPulse > 0) player.growPulse--;

  if(player.onGround && !prevOnGround){
    tryWarp();
  }
  prevOnGround = player.onGround;

  // Reach flag
  let col = Math.floor((player.x+player.w/2)/TILE);
  let row = Math.floor((player.y+player.h/2)/TILE);
  if(level[row] && level[row][col] === '5'){
    const coinsOk = levelCoinsCollected >= levelRequirements.coins;
    const enemiesOk = levelEnemiesDefeated >= levelRequirements.enemies;
    if(coinsOk && enemiesOk){
      winGame();
    } else if(flagBlockedCooldown <= 0){
      flagBlockedCooldown = 90;
      let msg = [];
      if(!coinsOk) msg.push(`코인 ${levelCoinsCollected}/${levelRequirements.coins}`);
      if(!enemiesOk) msg.push(`적 처치 ${levelEnemiesDefeated}/${levelRequirements.enemies}`);
      popups.push({x:player.x, y:player.y-24, text:msg.join(' · ')+' 필요!', life:70});
      player.vx = -Math.abs(player.vx) - 1; // gentle push back from the pole
    }
  }
}

function die(){
  if(!player.alive) return;
  player.alive = false;
  lives--;
  updateHUD();
  setTimeout(()=>{
    if(lives <= 0){
      gameState = 'dead';
      showOverlay('게임 오버', '다시 시작');
    } else {
      loadLevel(currentLevelNum); // fresh level: enemies, coins, blocks all reset
    }
  }, 700);
}

function winGame(){
  if(gameState !== 'playing') return;
  score += 500;
  updateHUD();
  if(currentLevelNum >= TOTAL_LEVELS){
    gameState = 'win';
    showOverlay('🎉 100개 레벨 모두 클리어! 🎉', '처음부터 다시');
  } else {
    gameState = 'levelComplete';
    showOverlay(`레벨 ${currentLevelNum} 클리어!`, `레벨 ${currentLevelNum+1} 시작`);
  }
}

function updateEnemies(){
  enemies.forEach(en => {
    if(!en.alive) return;
    en.vy = (en.vy||0) + GRAVITY;
    if(en.vy > 21) en.vy = 21;
    let prevVx = en.vx;
    collideWithTiles(en);
    if(en.vx === 0) en.vx = -prevVx || -1; // bounced off wall, reverse
    // Check ledge ahead to avoid walking off (simple check)
    let aheadCol = Math.floor((en.x + (en.vx>0? en.w+2 : -2)) / TILE);
    let belowRow = Math.floor((en.y + en.h + 2) / TILE);
    if(!tileSolid(tileAt(aheadCol, belowRow))){
      en.vx *= -1;
    }

    // collide with player
    if(player.alive && rectsOverlap(player, en)){
      if(player.vy > 1 && player.y + player.h - en.y < 16){
        en.alive = false;
        levelEnemiesDefeated++;
        player.vy = JUMP_FORCE * 0.6;
        score += 100;
        popups.push({x:en.x, y:en.y, text:'+100', life:40});
        updateHUD();
      } else if(player.invincible <= 0){
        if(player.big){
          shrinkSmall();
          player.invincible = 90;
        } else {
          die();
        }
      }
    }
  });
}

function updateItems(){
  items.forEach(it => {
    if(it.type !== 'mushroom') return;
    it.vy += GRAVITY;
    if(it.vy > 10) it.vy = 10;
    let tempEntity = {x:it.x, y:it.y, w:it.w, h:it.h, vx:it.vx, vy:it.vy, onGround:false};
    collideWithTiles(tempEntity);
    if(tempEntity.vx === 0) it.vx *= -1; else it.vx = tempEntity.vx;
    it.x = tempEntity.x; it.y = tempEntity.y; it.vy = tempEntity.vy;

    if(rectsOverlap(player, it) && !it.collected){
      it.collected = true;
      growBig();
      score += 200;
      popups.push({x:it.x, y:it.y, text:'+200', life:40});
      updateHUD();
    }
  });
  items = items.filter(it => !it.collected);
}

function updateCoins(){
  coinList.forEach(c => {
    if(c.collected) return;
    c.bob += 0.1;
    let cx = c.col*TILE + TILE/2;
    let cy = c.row*TILE + TILE/2 + Math.sin(c.bob)*3;
    let coinRect = {x:cx-17, y:cy-17, w:34, h:34};
    if(rectsOverlap(player, coinRect)){
      c.collected = true;
      coins++;
      levelCoinsCollected++;
      score += 10;
      updateHUD();
    }
  });
}

function updateBounceBlocks(){
  bounceBlocks.forEach(b => b.timer--);
  bounceBlocks = bounceBlocks.filter(b => b.timer > 0);
}

function updatePopups(){
  popups.forEach(p => p.life--);
  popups = popups.filter(p => p.life > 0);
}

function updateGrowParticles(){
  growParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.93;
    p.vy *= 0.93;
    p.life--;
  });
  growParticles = growParticles.filter(p => p.life > 0);
}

function updateCamera(){
  let target = player.x - canvas.width/2 + player.w/2;
  cameraX += (target - cameraX) * 0.12;
  const maxCameraX = Math.max(0, LEVEL_WIDTH - canvas.width);
  if(cameraX > maxCameraX) cameraX = maxCameraX;
}

// ---------- DRAWING ----------
function drawTile(t, x, y){
  switch(t){
    case 1:
      if(groundTexture.complete && groundTexture.naturalWidth > 0){
        ctx.drawImage(groundTexture, x, y, TILE, TILE);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.strokeRect(x,y,TILE,TILE);
      } else {
        ctx.fillStyle = '#8b5a2b';
        ctx.fillRect(x,y,TILE,TILE);
        ctx.fillStyle = '#6b4423';
        ctx.fillRect(x,y,TILE,4);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.strokeRect(x,y,TILE,TILE);
      }
      break;
    case 2:
      if(groundTexture.complete && groundTexture.naturalWidth > 0){
        ctx.drawImage(groundTexture, x, y, TILE, TILE);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.strokeRect(x,y,TILE,TILE);
      } else {
        ctx.fillStyle = '#c0522d';
        ctx.fillRect(x,y,TILE,TILE);
        ctx.strokeStyle = '#8a3a1f';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1,y+1,TILE-2,TILE-2);
        ctx.beginPath();
        ctx.moveTo(x,y+TILE/2); ctx.lineTo(x+TILE,y+TILE/2);
        ctx.moveTo(x+TILE/2,y); ctx.lineTo(x+TILE/2,y+TILE/2);
        ctx.stroke();
      }
      break;
    case 3:
      if(giftBoxTexture.complete && giftBoxTexture.naturalWidth > 0){
        const iw = giftBoxTexture.naturalWidth, ih = giftBoxTexture.naturalHeight;
        const scale = Math.min(TILE/iw, TILE/ih);
        const dw = iw*scale, dh = ih*scale;
        ctx.drawImage(giftBoxTexture, x+(TILE-dw)/2, y+(TILE-dh)/2, dw, dh);
      } else {
        ctx.fillStyle = '#ffcb05';
        ctx.fillRect(x,y,TILE,TILE);
        ctx.strokeStyle = '#c99a00';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1,y+1,TILE-2,TILE-2);
        ctx.fillStyle = '#c99a00';
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('?', x+TILE/2, y+TILE/2+7);
      }
      break;
    case 4:
    case 6:
      ctx.fillStyle = '#2e8b3d';
      ctx.fillRect(x,y,TILE,TILE);
      ctx.fillStyle = '#1f6b2b';
      ctx.fillRect(x,y,TILE,6);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.strokeRect(x,y,TILE,TILE);
      break;
    case 5:
      ctx.fillStyle = '#999';
      ctx.fillRect(x+TILE/2-2, y, 4, TILE);
      break;
    case 7:
      // Hidden block: intentionally invisible until jumped into from below
      break;
  }
}

function drawLevel(){
  let startCol = Math.floor(cameraX / TILE);
  let endCol = Math.ceil((cameraX + canvas.width) / TILE);
  for(let row=0; row<ROWS; row++){
    for(let col=startCol; col<=endCol; col++){
      let t = tileAt(col,row);
      if(t === 0) continue;
      let skip = bounceBlocks.some(b => b.col===col && b.row===row);
      if(skip) continue;
      drawTile(t, col*TILE - cameraX, row*TILE - cameraY);
    }
  }
  // Flag pole top
  for(let row=0; row<ROWS; row++){
    for(let col=startCol; col<=endCol; col++){
      if(level[row][col] === '5' && (row===0 || level[row-1][col] !== '5')){
        let x = col*TILE - cameraX;
        let y = row*TILE - cameraY;
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath();
        ctx.moveTo(x+TILE/2+2, y);
        ctx.lineTo(x+TILE/2+2, y+20);
        ctx.lineTo(x+TILE/2-16, y+10);
        ctx.closePath();
        ctx.fill();
      }
    }
  }
}

function drawBouncingBlocks(){
  bounceBlocks.forEach(b => {
    let offset = Math.sin((8-b.timer)/8*Math.PI) * 12;
    drawTile(3, b.col*TILE - cameraX, b.row*TILE - cameraY - offset);
  });
}

function starPath(cx, cy, points, outerR, innerR, rotation){
  ctx.beginPath();
  for(let i=0; i<points*2; i++){
    const r = i%2===0 ? outerR : innerR;
    const a = (Math.PI/points)*i - Math.PI/2 + rotation;
    const px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

function drawCoin(x, y){
  const r = 16;

  // gold coin body with a soft gradient for a rounded, metallic look
  const bodyG = ctx.createRadialGradient(x-r*0.35, y-r*0.45, r*0.1, x, y, r*1.15);
  bodyG.addColorStop(0, '#fff6c4');
  bodyG.addColorStop(0.45, '#ffd84d');
  bodyG.addColorStop(0.78, '#f2a900');
  bodyG.addColorStop(1, '#b9770e');
  ctx.fillStyle = bodyG;
  ctx.beginPath(); ctx.ellipse(x, y, r, r*1.06, 0, 0, Math.PI*2); ctx.fill();

  // ridged inner rim ring
  ctx.strokeStyle = 'rgba(150,95,10,0.55)';
  ctx.lineWidth = Math.max(0.8, r*0.14);
  ctx.beginPath(); ctx.ellipse(x, y, r*0.8, r*0.85, 0, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,240,180,0.5)';
  ctx.lineWidth = Math.max(0.6, r*0.07);
  ctx.beginPath(); ctx.ellipse(x, y, r*0.9, r*0.95, 0, 0, Math.PI*2); ctx.stroke();

  // embossed star: a soft dark shadow offset, then the lit star face on top
  starPath(x+r*0.06, y+r*0.08, 5, r*0.58, r*0.24, 0);
  ctx.fillStyle = 'rgba(150,95,5,0.55)';
  ctx.fill();
  starPath(x, y, 5, r*0.56, r*0.23, 0);
  const starG = ctx.createLinearGradient(x, y-r*0.56, x, y+r*0.56);
  starG.addColorStop(0, '#fff3b0');
  starG.addColorStop(1, '#e8a800');
  ctx.fillStyle = starG;
  ctx.fill();
  ctx.strokeStyle = 'rgba(150,95,5,0.4)';
  ctx.lineWidth = Math.max(0.5, r*0.05);
  ctx.stroke();

  // glossy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(x-r*0.38, y-r*0.42, r*0.28, r*0.16, -0.5, 0, Math.PI*2); ctx.fill();
}

function drawCoins(){
  coinList.forEach(c => {
    if(c.collected) return;
    let cx = c.col*TILE + TILE/2 - cameraX;
    let cy = c.row*TILE + TILE/2 + Math.sin(c.bob)*3 - cameraY;
    drawCoin(cx, cy);
  });
}

function drawEnemy(en){
  if(!en.alive) return;
  let x = en.x - cameraX, y = en.y - cameraY;
  const w = en.w, h = en.h;
  const cx = x + w/2;

  const gelCY = y + h*0.4, gelRX = w*0.46, gelRY = h*0.38;
  const bodyCY = y + h*0.78, bodyRX = w*0.3, bodyRY = h*0.2;
  const domeCY = y + h*0.32, domeRX = w*0.55, domeRY = h*0.42;

  // small gel body (legs area), drawn first so the dome/head overlaps it
  const tealBody = ctx.createRadialGradient(cx-bodyRX*0.3, bodyCY-bodyRY*0.4, bodyRX*0.1, cx, bodyCY, bodyRX*1.3);
  tealBody.addColorStop(0, 'rgba(210,245,240,0.9)');
  tealBody.addColorStop(0.6, 'rgba(94,200,196,0.85)');
  tealBody.addColorStop(1, 'rgba(40,140,150,0.85)');
  ctx.fillStyle = tealBody;
  ctx.beginPath(); ctx.ellipse(cx, bodyCY, bodyRX, bodyRY, 0, 0, Math.PI*2); ctx.fill();

  // glossy dark brown shoes
  const shoeY = y + h*0.94;
  [cx-w*0.2, cx+w*0.2].forEach(sx => {
    const shoeG = ctx.createRadialGradient(sx-w*0.05, shoeY-h*0.04, w*0.01, sx, shoeY, w*0.14);
    shoeG.addColorStop(0, '#6b4a35');
    shoeG.addColorStop(1, '#2e1c12');
    ctx.fillStyle = shoeG;
    ctx.beginPath(); ctx.ellipse(sx, shoeY, w*0.16, h*0.08, 0, 0, Math.PI*2); ctx.fill();
  });

  // teal gel head (mushroom-cap shaped blob)
  const tealHead = ctx.createRadialGradient(cx-gelRX*0.35, gelCY-gelRY*0.5, gelRX*0.1, cx, gelCY, gelRX*1.3);
  tealHead.addColorStop(0, 'rgba(220,250,245,0.95)');
  tealHead.addColorStop(0.5, 'rgba(94,205,200,0.88)');
  tealHead.addColorStop(1, 'rgba(30,130,140,0.88)');
  ctx.fillStyle = tealHead;
  ctx.beginPath(); ctx.ellipse(cx, gelCY, gelRX, gelRY, 0, 0, Math.PI*2); ctx.fill();

  // a few tiny bubbles inside the gel for texture
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(cx-gelRX*0.4, gelCY+gelRY*0.3, w*0.045, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+gelRX*0.45, gelCY-gelRY*0.1, w*0.035, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+gelRX*0.15, gelCY+gelRY*0.55, w*0.03, 0, Math.PI*2); ctx.fill();

  // eyes (dark blue ovals with a highlight)
  const eyeDX = gelRX*0.36, eyeY = gelCY - gelRY*0.05;
  [cx-eyeDX, cx+eyeDX].forEach(eyeX => {
    ctx.fillStyle = '#1c3a66';
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, w*0.075, h*0.11, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(180,220,255,0.8)';
    ctx.beginPath(); ctx.ellipse(eyeX-w*0.02, eyeY-h*0.03, w*0.025, h*0.035, 0, 0, Math.PI*2); ctx.fill();
  });

  // open mouth (dark blue)
  const mouthG = ctx.createLinearGradient(cx, gelCY+gelRY*0.25, cx, gelCY+gelRY*0.55);
  mouthG.addColorStop(0, '#0e2c52');
  mouthG.addColorStop(1, '#2a5c99');
  ctx.fillStyle = mouthG;
  ctx.beginPath();
  ctx.ellipse(cx, gelCY+gelRY*0.42, w*0.19, h*0.1, 0, 0, Math.PI*2);
  ctx.fill();

  // glass dome helmet (semi-transparent, drawn over the head)
  const domeG = ctx.createRadialGradient(cx-domeRX*0.4, domeCY-domeRY*0.6, domeRX*0.1, cx, domeCY, domeRX*1.3);
  domeG.addColorStop(0, 'rgba(255,255,255,0.35)');
  domeG.addColorStop(0.6, 'rgba(200,205,210,0.16)');
  domeG.addColorStop(1, 'rgba(140,145,150,0.22)');
  ctx.fillStyle = domeG;
  ctx.beginPath(); ctx.ellipse(cx, domeCY, domeRX, domeRY, 0, Math.PI, 0); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = Math.max(0.8, w*0.02);
  ctx.beginPath(); ctx.ellipse(cx, domeCY, domeRX, domeRY, 0, Math.PI, 0); ctx.stroke();

  // dome rim (base ring)
  ctx.fillStyle = '#c9cdd1';
  ctx.beginPath(); ctx.ellipse(cx, y+h*0.6, domeRX*1.02, h*0.06, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(120,120,120,0.4)';
  ctx.lineWidth = Math.max(0.6, w*0.015);
  ctx.stroke();

  // glare highlight on the dome
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(cx-domeRX*0.4, domeCY-domeRY*0.35, w*0.08, h*0.1, -0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawItem(it){
  let x = it.x - cameraX, y = it.y - cameraY;
  const w = it.w, h = it.h;
  const cx = x + w/2;

  const capCY = y + h*0.36, capRX = w*0.52, capRY = h*0.4;
  const faceCY = y + h*0.62, faceRX = w*0.46, faceRY = h*0.42;

  // face (cream/peach) drawn first, the cap overlaps the top of it
  const faceG = ctx.createRadialGradient(cx-faceRX*0.3, faceCY-faceRY*0.4, faceRX*0.1, cx, faceCY, faceRX*1.2);
  faceG.addColorStop(0, '#fff3e6');
  faceG.addColorStop(0.6, '#ffd9c2');
  faceG.addColorStop(1, '#f2a98a');
  ctx.fillStyle = faceG;
  ctx.beginPath(); ctx.ellipse(cx, faceCY, faceRX, faceRY, 0, 0, Math.PI*2); ctx.fill();

  // gold metallic cap (dome)
  const capG = ctx.createRadialGradient(cx-capRX*0.4, capCY-capRY*0.5, capRX*0.1, cx, capCY, capRX*1.2);
  capG.addColorStop(0, '#fff2c2');
  capG.addColorStop(0.4, '#e8c04a');
  capG.addColorStop(0.75, '#c99a1f');
  capG.addColorStop(1, '#a67a10');
  ctx.fillStyle = capG;
  ctx.beginPath(); ctx.ellipse(cx, capCY, capRX, capRY, 0, Math.PI, 0); ctx.fill();

  // cap rim (thin darker line at the base)
  ctx.strokeStyle = 'rgba(140,100,10,0.5)';
  ctx.lineWidth = Math.max(0.8, w*0.035);
  ctx.beginPath(); ctx.ellipse(cx, capCY, capRX, capRY, 0, Math.PI, 0); ctx.stroke();

  // white polka dots on the cap
  ctx.fillStyle = '#fdfdfa';
  ctx.beginPath(); ctx.ellipse(cx, capCY-capRY*0.35, w*0.16, h*0.13, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx-capRX*0.82, capCY-capRY*0.05, w*0.09, h*0.11, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+capRX*0.82, capCY-capRY*0.05, w*0.09, h*0.11, 0, 0, Math.PI*2); ctx.fill();

  // eyes (dark navy ovals with a small highlight)
  const eyeDX = faceRX*0.4, eyeY = faceCY-faceRY*0.05;
  [cx-eyeDX, cx+eyeDX].forEach(eyeX => {
    ctx.fillStyle = '#12122a';
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, w*0.06, h*0.075, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(eyeX-w*0.02, eyeY-h*0.02, w*0.018, 0, Math.PI*2); ctx.fill();
  });

  // smile
  ctx.strokeStyle = '#3a2e26';
  ctx.lineWidth = Math.max(1, w*0.035);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, faceCY+faceRY*0.25, w*0.1, 0.15*Math.PI, 0.85*Math.PI);
  ctx.stroke();
}

function drawPlayer(){
  if(!player.alive) return;
  if(player.invincible > 0 && Math.floor(player.invincible/4)%2===0) return;
  let x = player.x - cameraX, y = player.y - cameraY;
  const w = player.w, h = player.h;

  // Soft contact shadow on the ground beneath the character
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(w/2, h+2, w*0.42, w*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Expanding flash ring when the growth impact triggers
  if(player.growPulse > 0){
    const t = player.growPulse / 20;
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.strokeStyle = `rgba(255,240,150,${t*0.85})`;
    ctx.lineWidth = Math.max(1.5, w*0.06) * t;
    ctx.beginPath();
    ctx.ellipse(0, 0, w*(1.1 - t*0.3) + (1-t)*w*0.9, h*(0.6 - t*0.15) + (1-t)*h*0.6, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  if(player.facing < 0){
    ctx.translate(x+w, y);
    ctx.scale(-1,1);
  } else {
    ctx.translate(x,y);
  }

  // Pop/impact scale: overshoots bigger on growth, then eases back to normal
  if(player.growPulse > 0){
    const t = player.growPulse / 20;
    const pop = 1 + t*t*0.35;
    ctx.translate(w/2, h/2);
    ctx.scale(pop, pop);
    ctx.translate(-w/2, -h/2);
  }

  const cx = w/2;
  const headCY = h*0.34, headRX = w*0.5, headRY = h*0.36;
  const bodyCY = h*0.78, bodyRX = w*0.34, bodyRY = h*0.22;
  const legY = h*0.95, legRX = w*0.14, legRY = h*0.07;

  // Running pose: legs/arms swing through a cycle while moving,
  // and spread into a fixed "hop" pose while airborne.
  const cyc = player.walkCycle;
  const legSwing = player.onGround ? Math.sin(cyc) : 0.9;
  const armSwing = player.onGround ? Math.sin(cyc + Math.PI) : -0.7;
  const bounce = player.onGround ? Math.abs(Math.sin(cyc)) * h*0.045 : 0;
  const bodyLift = -bounce;

  const legDX = w*0.17;
  const leg1X = cx - legDX + legSwing * w*0.16;
  const leg2X = cx + legDX - legSwing * w*0.16;
  const leg1Y = legY + bodyLift - Math.max(0, legSwing) * h*0.05;
  const leg2Y = legY + bodyLift - Math.max(0, -legSwing) * h*0.05;

  // Soft glossy "vinyl toy" gradient: bright highlight, warm mid, soft rosy shadow
  function softGradient(gcx, gcy, r){
    const g = ctx.createRadialGradient(gcx-r*0.45, gcy-r*0.55, r*0.08, gcx, gcy, r*1.25);
    g.addColorStop(0, '#fffdf5');
    g.addColorStop(0.35, '#fef4d2');
    g.addColorStop(0.7, '#fce8b4');
    g.addColorStop(1, '#e9c988');
    return g;
  }
  function limbGradient(gcx, gcy, r){
    const g = ctx.createRadialGradient(gcx-r*0.3, gcy-r*0.4, r*0.05, gcx, gcy, r*1.2);
    g.addColorStop(0, '#fbeecb');
    g.addColorStop(1, '#e7c583');
    return g;
  }

  // legs (tiny stubs, drawn first so the body covers the tops)
  ctx.fillStyle = limbGradient(leg1X, leg1Y, legRX);
  ctx.beginPath(); ctx.ellipse(leg1X, leg1Y, legRX, legRY, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = limbGradient(leg2X, leg2Y, legRX);
  ctx.beginPath(); ctx.ellipse(leg2X, leg2Y, legRX, legRY, 0, 0, Math.PI*2); ctx.fill();

  // body
  ctx.fillStyle = softGradient(cx, bodyCY+bodyLift, bodyRX);
  ctx.beginPath(); ctx.ellipse(cx, bodyCY+bodyLift, bodyRX, bodyRY, 0, 0, Math.PI*2); ctx.fill();

  // soft contact shading where the head meets the shoulders
  ctx.fillStyle = 'rgba(210,160,100,0.22)';
  ctx.beginPath();
  ctx.ellipse(cx, bodyCY+bodyLift-bodyRY*0.85, bodyRX*0.75, bodyRY*0.4, 0, 0, Math.PI*2);
  ctx.fill();

  // arm stubs (swing opposite to the legs) — bigger arc for a livelier run
  const armAngle1 = 0.35 + armSwing*0.55, armAngle2 = -0.35 + armSwing*0.55;
  const armLift1 = Math.max(0, -armSwing) * h*0.06, armLift2 = Math.max(0, armSwing) * h*0.06;
  const arm1X = cx-bodyRX*1.08, arm1Y = bodyCY+bodyLift-bodyRY*0.1-armLift1;
  const arm2X = cx+bodyRX*1.08, arm2Y = bodyCY+bodyLift-bodyRY*0.1-armLift2;
  ctx.fillStyle = limbGradient(arm1X, arm1Y, w*0.135);
  ctx.beginPath(); ctx.ellipse(arm1X, arm1Y, w*0.135, h*0.095, armAngle1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = limbGradient(arm2X, arm2Y, w*0.135);
  ctx.beginPath(); ctx.ellipse(arm2X, arm2Y, w*0.135, h*0.095, armAngle2, 0, Math.PI*2); ctx.fill();

  // saturn belly badge (with a touch of gloss)
  const beltY = bodyCY + bodyLift - bodyRY*0.05;
  const saturnG = ctx.createRadialGradient(cx-w*0.05,beltY-w*0.05,w*0.02,cx,beltY,w*0.14);
  saturnG.addColorStop(0, '#ffd066');
  saturnG.addColorStop(1, '#f5a623');
  ctx.fillStyle = saturnG;
  ctx.beginPath(); ctx.arc(cx, beltY, w*0.13, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#e8890c';
  ctx.lineWidth = Math.max(1, w*0.045);
  ctx.beginPath();
  ctx.ellipse(cx, beltY, w*0.22, w*0.07, -0.25, 0, Math.PI*2);
  ctx.stroke();

  // head (big, round, drawn over the body/shoulders)
  const headCYB = headCY + bodyLift*0.5;
  ctx.fillStyle = softGradient(cx, headCYB, headRX);
  ctx.beginPath(); ctx.ellipse(cx, headCYB, headRX, headRY, 0, 0, Math.PI*2); ctx.fill();

  // rim light along the upper-left silhouette for a glossy toy pop
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = Math.max(1, w*0.035);
  ctx.beginPath();
  ctx.ellipse(cx, headCYB, headRX-ctx.lineWidth, headRY-ctx.lineWidth, 0, Math.PI*1.05, Math.PI*1.65);
  ctx.stroke();

  // pink "M" bow, centered on top of the head (matches the original artwork)
  const bowCX = cx;
  const bowY = headCYB - headRY*0.92, bowW = w*0.17, bowH = h*0.13;
  const bowG = ctx.createRadialGradient(bowCX-bowW*0.3, bowY-bowH*0.3, bowW*0.05, bowCX, bowY, bowW*1.1);
  bowG.addColorStop(0, '#ffd6ea');
  bowG.addColorStop(1, '#f28ebd');
  ctx.fillStyle = bowG;
  ctx.beginPath(); ctx.ellipse(bowCX-bowW*0.55, bowY, bowW*0.6, bowH*0.55, 0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bowCX+bowW*0.55, bowY, bowW*0.6, bowH*0.55, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bowCX, bowY+bowH*0.12, bowW*0.32, bowH*0.5, 0, 0, Math.PI*2); ctx.fill();

  // cheeks (symmetric, soft blush on both sides — matches the original artwork)
  const cheekDX = headRX*0.62, cheekY = headCYB+headRY*0.2;
  [cx-cheekDX, cx+cheekDX].forEach(cheekX => {
    const cheekG = ctx.createRadialGradient(cheekX, cheekY, 0, cheekX, cheekY, w*0.12);
    cheekG.addColorStop(0, 'rgba(255,170,195,0.85)');
    cheekG.addColorStop(1, 'rgba(255,170,195,0)');
    ctx.fillStyle = cheekG;
    ctx.beginPath(); ctx.ellipse(cheekX, cheekY, w*0.12, w*0.09, 0, 0, Math.PI*2); ctx.fill();
  });

  // eyes (symmetric, evenly spaced from center — matches the original artwork)
  const eyeY = headCYB - headRY*0.03;
  const eyeRX = Math.max(1.6, w*0.1), eyeRY = Math.max(2, w*0.13);
  const eyeDX = headRX*0.38;
  const eye1X = cx - eyeDX, eye2X = cx + eyeDX;
  [eye1X, eye2X].forEach(eyeX => {
    ctx.save();
    ctx.shadowColor = 'rgba(255,216,77,0.5)';
    ctx.shadowBlur = w*0.13;
    ctx.fillStyle = '#3a2e26';
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ffd84d';
    const spark = Math.max(0.8, w*0.05);
    ctx.beginPath(); ctx.arc(eyeX, eyeY-eyeRY*0.15, spark, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(eyeX+spark*0.5, eyeY-eyeRY*0.55, spark*0.4, 0, Math.PI*2); ctx.fill();
  });

  // smile (centered, between the eyes)
  ctx.strokeStyle = '#3a2e26';
  ctx.lineWidth = Math.max(1, w*0.045);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, headCYB+headRY*0.28, w*0.12, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  ctx.restore();
}

function drawPopups(){
  popups.forEach(p => {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1,p.life/40)})`;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x - cameraX, p.y - cameraY - (40-p.life));
  });
}

function drawGrowParticles(){
  growParticles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.fillStyle = `rgba(255,224,120,${t})`;
    ctx.beginPath();
    ctx.arc(p.x - cameraX, p.y - cameraY, 2 + t*3, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawBackground(){
  if(inSubLevel){
    ctx.fillStyle = '#1a1025';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'rgba(120,80,160,0.25)';
    for(let i=0;i<6;i++){
      let cx = (i*260 - cameraX*0.4) % (LEVEL_WIDTH+260);
      if(cx < -80) cx += LEVEL_WIDTH+260;
      ctx.beginPath();
      ctx.arc(cx, 60, 40, 0, Math.PI*2);
      ctx.fill();
    }
    return;
  }

  if(bgImage.complete && bgImage.naturalWidth > 0){
    // Scale the (square) background image to cover the canvas height, then
    // tile it horizontally with alternating mirrored copies so the edges
    // always line up seamlessly (no visible "stitched" boundary), plus a
    // slow parallax scroll so it doesn't feel static.
    const imgW = canvas.height * (bgImage.naturalWidth / bgImage.naturalHeight);
    const imgH = canvas.height;
    const worldOffset = cameraX * 0.2;
    const iMin = Math.floor((0 + worldOffset) / imgW) - 1;
    const iMax = Math.ceil((canvas.width + worldOffset) / imgW) + 1;
    for(let i = iMin; i <= iMax; i++){
      const x = i*imgW - worldOffset;
      const mirrored = (((i % 2) + 2) % 2) === 1;
      ctx.save();
      if(mirrored){
        ctx.translate(x + imgW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(bgImage, 0, 0, imgW, imgH);
      } else {
        ctx.drawImage(bgImage, x, 0, imgW, imgH);
      }
      ctx.restore();
    }
  } else {
    ctx.fillStyle = '#5c94fc';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}

function render(){
  drawBackground();
  drawLevel();
  drawBouncingBlocks();
  drawCoins();
  items.forEach(drawItem);
  enemies.forEach(drawEnemy);
  drawPlayer();
  drawGrowParticles();
  drawPopups();
}

function gameLoop(){
  if(gameState === 'playing'){
    updatePlayer();
    updateEnemies();
    updateItems();
    updateCoins();
    updateBounceBlocks();
    updatePopups();
    updateGrowParticles();
    updateCamera();
  }
  render();
  requestAnimationFrame(gameLoop);
}

function showOverlay(text, btnText){
  document.getElementById('overlayText').textContent = text;
  document.getElementById('overlayBtn').textContent = btnText;
  document.getElementById('overlay').style.display = 'flex';
}
function hideOverlay(){
  document.getElementById('overlay').style.display = 'none';
}

document.getElementById('overlayBtn').addEventListener('click', () => {
  if(gameState === 'levelComplete'){
    loadLevel(currentLevelNum + 1);
  } else {
    fullReset();
  }
  gameState = 'playing';
  hideOverlay();
});

resizeCanvas();
fullReset();
gameState = 'ready';
showOverlay('점프 어드벤처', '시작하기');
render();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
