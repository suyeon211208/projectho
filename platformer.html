<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>점프 어드벤처</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overscroll-behavior:none; }
  body {
    font-family:'Courier New', monospace; color:#fff;
    touch-action:none; overflow:hidden;
    background:#000;
  }
  #gameContainer {
    position:fixed; inset:0;
    width:100%; height:100%;
  }
  canvas {
    background:#5c94fc;
    image-rendering: pixelated;
    display:block;
    width:100%; height:100%;
  }
  #hud {
    position:absolute; top:clamp(8px,2vh,16px); left:clamp(8px,3vw,20px); right:clamp(8px,3vw,20px);
    display:flex; justify-content:space-between;
    font-size:clamp(12px,3.2vw,18px); text-shadow:2px 2px 0 #000;
    pointer-events:none; font-weight:bold;
  }
  #objective {
    position:absolute; top:clamp(34px,7vh,52px); left:50%; transform:translateX(-50%);
    font-size:clamp(11px,2.8vw,15px); text-shadow:2px 2px 0 #000;
    pointer-events:none; font-weight:bold; color:#ffe27a;
    display:none; white-space:nowrap;
  }
  #muteBtn {
    position:absolute; top:clamp(8px,2vh,16px); right:clamp(8px,3vw,20px);
    font-size:clamp(16px,4vw,22px); cursor:pointer; z-index:15;
    text-shadow:2px 2px 0 #000; user-select:none; -webkit-user-select:none;
  }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.6); text-align:center;
    padding:16px; z-index:20;
  }
  #overlay h1 { font-size:clamp(20px,5vw,32px); margin-bottom:16px; text-shadow:3px 3px 0 #000; }
  #overlay button {
    margin-top:16px; padding:10px 24px; font-size:16px; font-family:inherit;
    background:#ffcb05; border:3px solid #2b2b2b; border-radius:4px; cursor:pointer;
    font-weight:bold;
  }
  #overlay button:active { transform:scale(0.96); }

  /* Mobile joystick + jump button, overlaid on the game screen */
  #joystickBase {
    position:absolute; left:clamp(16px,4vw,32px); bottom:clamp(16px,4vh,32px);
    width:clamp(110px,30vw,160px); height:clamp(110px,30vw,160px);
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    border:3px solid rgba(255,255,255,0.35);
    touch-action:none; -webkit-user-select:none; user-select:none;
    display:flex; align-items:center; justify-content:center;
  }
  #joystickKnob {
    width:44%; height:44%;
    border-radius:50%;
    background:rgba(255,255,255,0.55);
    border:2px solid rgba(0,0,0,0.3);
    pointer-events:none;
  }
  #btnJump {
    position:absolute; right:clamp(24px,6vw,48px); bottom:clamp(28px,6vh,48px);
    width:clamp(96px,26vw,130px); height:clamp(96px,26vw,130px);
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    border:3px solid rgba(255,255,255,0.4);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(30px,8vw,40px); color:#fff;
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  #btnJump:active, #joystickBase.active { background-color:rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="hud">
    <div>❤️ <span id="lives">5</span></div>
    <div>🏁 <span id="levelNum">1</span>/100</div>
    <div>🪙 <span id="coins">0</span></div>
    <div>점수: <span id="score">0</span></div>
  </div>
  <div id="objective"></div>
  <div id="muteBtn">🔊</div>
  <div id="overlay">
    <h1 id="overlayText">점프 어드벤처</h1>
    <button id="overlayBtn">시작하기</button>
  </div>
  <div id="joystickBase">
    <div id="joystickKnob"></div>
  </div>
  <div id="btnJump">⤴</div>
</div>

<script>
const canvas = document.getElementById('game');

// ============ Audio: synthesized SFX + original chiptune BGM ============
// Everything here is generated in-browser with the Web Audio API — no
// external audio files, so there's no copyright concern with reused music.
let audioCtx = null;
let soundOn = true;
let musicTimer = null;

function initAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ audioCtx = null; }
  } else if(audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
}

function playTone(freq, startTime, duration, type, peakGain){
  if(!audioCtx || !soundOn) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}

function playJumpSound(){
  if(!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(330, t);
  osc.frequency.exponentialRampToValueAtTime(660, t + 0.12);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.18);
}

function playCoinSound(){
  if(!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  playTone(988, t, 0.08, 'square', 0.05);
  playTone(1319, t+0.07, 0.14, 'square', 0.05);
}

function playDeathSound(){
  if(!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(392, t);
  osc.frequency.setValueAtTime(330, t + 0.12);
  osc.frequency.exponentialRampToValueAtTime(110, t + 0.55);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.setValueAtTime(0.06, t + 0.35);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.62);
}

function playGrowSound(){
  if(!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const steps = [392, 494, 587, 784, 988];
  steps.forEach((f, i) => {
    playTone(f, t + i*0.045, 0.11, 'square', 0.05);
  });
}

// Original chiptune riff (not derived from any existing song) — a longer,
// bouncy "verse + chorus" tune in a cheerful platformer style, with rests
// and syncopation for a livelier, less repetitive loop.
const NOTE_FREQ = {
  C4:261.6, D4:293.7, E4:329.6, F4:349.2, G4:392.0, A4:440.0, B4:493.9,
  C5:523.3, D5:587.3, E5:659.3, F5:698.5, G5:784.0, A5:880.0, B5:987.8, C6:1046.5
};
// Each entry: [note ('REST' for silence), duration in beats]
// The tune is built from four connected parts (A→B→C→D) that play back to
// back as one longer piece before looping, instead of one short repeat.
const PART_A = [ // intro: bouncy call-and-answer
  ['C5',0.5],['E5',0.5],['G5',0.5],['C6',0.5],
  ['G5',0.5],['E5',0.5],['REST',0.25],['D5',0.25],['F5',0.5],
  ['E5',0.75],['D5',0.25],['C5',1.0],
  ['REST',0.25],['D5',0.25],['E5',0.5],['F5',0.5],['G5',0.75],['E5',0.25],
];
const PART_B = [ // chorus: brighter, higher lift
  ['A5',0.5],['G5',0.5],['F5',0.5],['E5',0.5],
  ['G5',0.5],['F5',0.5],['REST',0.25],['E5',0.25],['D5',0.5],
  ['C6',0.75],['B5',0.25],['A5',0.5],['G5',0.5],
  ['F5',0.5],['E5',0.5],['D5',0.5],['C5',1.0],
];
const PART_C = [ // bridge: softer, more spacious
  ['E5',0.75],['REST',0.25],['G5',0.75],['REST',0.25],
  ['F5',0.5],['D5',0.5],['REST',0.5],
  ['E5',0.5],['C5',0.5],['REST',0.5],['D5',1.0],
];
const PART_D = [ // outro: energetic turnaround back to the top
  ['C5',0.25],['D5',0.25],['E5',0.25],['F5',0.25],
  ['G5',0.5],['A5',0.5],['G5',0.5],['E5',0.5],
  ['F5',0.25],['E5',0.25],['D5',0.25],['C5',0.25],['C5',1.0],
];
const MELODY = [...PART_A, ...PART_B, ...PART_C, ...PART_D];
const BASS = [
  'C4','C4','F4','F4','G4','G4','C4','C4', // under A
  'F4','F4','G4','A4','F4','G4','C4','C4', // under B
  'A4','A4','F4','D4',                     // under C
  'C4','F4','G4','C4',                     // under D
];

function scheduleMusicLoop(){
  if(!audioCtx || !soundOn){ musicTimer = setTimeout(scheduleMusicLoop, 400); return; }
  const bpm = 126, beat = 60/bpm;
  let t = audioCtx.currentTime + 0.05;
  let bassIdx = 0;
  MELODY.forEach(([n, beats], i) => {
    const dur = beats * beat;
    if(n !== 'REST'){
      // soft bell-like lead: two gently detuned triangle voices for warmth
      playTone(NOTE_FREQ[n], t, dur*0.9, 'triangle', 0.045);
      playTone(NOTE_FREQ[n]*1.004, t, dur*0.8, 'sine', 0.03);
    }
    if(i % 2 === 0){
      playTone(NOTE_FREQ[BASS[bassIdx % BASS.length]]/2, t, dur*1.8, 'sine', 0.028);
      bassIdx++;
    }
    t += dur;
  });
  const totalBeats = MELODY.reduce((s,[,b]) => s+b, 0);
  const totalMs = totalBeats * beat * 1000;
  musicTimer = setTimeout(scheduleMusicLoop, totalMs);
}

function startMusic(){
  initAudio();
  if(musicTimer) return; // already running
  scheduleMusicLoop();
}

function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('muteBtn').textContent = soundOn ? '🔊' : '🔇';
  if(soundOn) initAudio();
}
document.getElementById('muteBtn').addEventListener('click', toggleSound);

// ---- Joystick (left/right movement) ----
const joyBase = document.getElementById('joystickBase');
const joyKnob = document.getElementById('joystickKnob');
const JOY_RADIUS = 55;
let joyTouchId = null;

function joyReset(){
  joyKnob.style.transform = 'translate(0px,0px)';
  joyBase.classList.remove('active');
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
}
function joyMoveTo(clientX, clientY){
  const rect = joyBase.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  let dx = clientX - cx, dy = clientY - cy;
  const dist = Math.min(JOY_RADIUS, Math.hypot(dx,dy));
  const angle = Math.atan2(dy,dx);
  const kx = Math.cos(angle)*dist, ky = Math.sin(angle)*dist;
  joyKnob.style.transform = `translate(${kx}px, ${ky}px)`;
  keys['ArrowLeft'] = dx < -19;
  keys['ArrowRight'] = dx > 19;
}
joyBase.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joyTouchId = t.identifier;
  joyBase.classList.add('active');
  joyMoveTo(t.clientX, t.clientY);
});
joyBase.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === joyTouchId) joyMoveTo(t.clientX, t.clientY);
  }
});
function joyEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier === joyTouchId){ joyTouchId = null; joyReset(); }
  }
}
joyBase.addEventListener('touchend', joyEnd);
joyBase.addEventListener('touchcancel', joyEnd);
// Mouse fallback for testing on desktop
let joyMouseDown = false;
joyBase.addEventListener('mousedown', e => { joyMouseDown = true; joyBase.classList.add('active'); joyMoveTo(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => { if(joyMouseDown) joyMoveTo(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { if(joyMouseDown){ joyMouseDown = false; joyReset(); } });

// ---- Jump button ----
function bindTouch(id, code){
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e=>{ e.preventDefault(); keys[code]=true; });
  el.addEventListener('touchend', e=>{ e.preventDefault(); keys[code]=false; });
  el.addEventListener('mousedown', ()=> keys[code]=true);
  el.addEventListener('mouseup', ()=> keys[code]=false);
  el.addEventListener('mouseleave', ()=> keys[code]=false);
}

// Level map: 0 empty, 1 ground, 2 brick, 3 question block, 4 pipe, 5 flagpole
const TOTAL_LEVELS = 100;
const LEVEL_ROWS = 13;
const GROUND_ROW = 11; // first ground row (11 & 12 are both ground)

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Builds a full level definition (tiles + enemy/coin spawns) for a given level number (1-100)
function generateLevel(levelNum){
  const rand = mulberry32(levelNum * 7919 + 12345);
  const width = 56 + Math.round(levelNum * 1.4); // steadily grows across all 100 levels
  const grid = [];
  for(let r=0; r<LEVEL_ROWS; r++) grid.push(new Array(width).fill('.'));

  // ---- Ground with jump-safe gaps ----
  const solid = new Array(width).fill(true);
  const gapChanceBase = 0.18 + Math.min(levelNum, 90) * 0.0035
    + (levelNum >= 5 ? Math.min((levelNum-4) * 0.004, 0.25) : 0); // more stepping-stone gaps from level 5+
  let col = 6; // safe starting stretch
  while(col < width - 10){
    if(rand() < gapChanceBase){
      const gapW = 2 + (rand() < 0.35 ? 1 : 0); // 2-3 tiles wide (always jumpable)
      for(let i=0; i<gapW && col+i < width-8; i++) solid[col+i] = false;
      col += gapW + 3 + Math.floor(rand()*4);
    } else {
      col += 2 + Math.floor(rand()*4);
    }
  }
  for(let c=0; c<width; c++){
    grid[GROUND_ROW][c] = solid[c] ? '1' : '.';
    grid[GROUND_ROW+1][c] = solid[c] ? '1' : '.';
  }

  // Shared column-occupancy tracker so floating blocks, hidden blocks, and
  // pipes never end up stacked in the same column (e.g. a block directly
  // above a pipe, forcing an awkward "must cross both at once" spot).
  const structureCols = [];
  function structureColFree(c, buffer){
    return !structureCols.some(u => Math.abs(u - c) < buffer);
  }

  // ---- Floating blocks (brick / question) at reachable height ----
  const blockCount = 4 + Math.floor(levelNum/6) + (levelNum >= 5 ? Math.floor((levelNum-4)/4) : 0);
  for(let i=0; i<blockCount; i++){
    const c = 8 + Math.floor(rand()*(width-18));
    if(!solid[c]) continue;
    if(!structureColFree(c, 2)) continue;
    const r = 6 + Math.floor(rand()*2); // rows 6-7, always within jump reach
    grid[r][c] = rand() < 0.55 ? '3' : '2';
    structureCols.push(c);
  }

  // ---- Hidden blocks: invisible & non-solid until jumped into from below ----
  // Kept rare and only ever placed over empty ground/air so they never block
  // movement or land somewhere the player wasn't already free to jump.
  const hiddenBlockCount = 2 + Math.floor(levelNum/25);
  for(let i=0; i<hiddenBlockCount; i++){
    let tries = 0;
    while(tries < 15){
      tries++;
      const c = 8 + Math.floor(rand()*(width-18));
      const r = 6 + Math.floor(rand()*2);
      if(!solid[c]) continue;
      if(grid[r][c] !== '.') continue; // don't overlap an existing block
      if(!structureColFree(c, 2)) continue;
      grid[r][c] = '7';
      structureCols.push(c);
      break;
    }
  }

  // ---- Pipes (2-tile tall, easy to hop over) ----
  // Level 3+: plain pipes, just an obstacle to hop over.
  // Level 10+: some (not all) pipes also get a cute "moon" that periodically
  // pops out of the opening and retreats — a Piranha-Plant-style hazard.
  const pipeCount = levelNum < 3 ? 0 : 1 + Math.floor((levelNum-3)/10);
  const pipeMoons = [];
  for(let i=0; i<pipeCount; i++){
    const c = 10 + Math.floor(rand()*(width-22));
    if(!solid[c] || grid[GROUND_ROW-1][c] !== '.') continue;
    if(!structureColFree(c, 2)) continue;
    grid[GROUND_ROW-2][c] = '4';
    grid[GROUND_ROW-1][c] = '4';
    structureCols.push(c);
    if(levelNum >= 10 && rand() < 0.5){
      pipeMoons.push({col: c, row: GROUND_ROW-2, phase: Math.floor(rand()*300)});
    }
  }

  // ---- One special pipe that warps to an underground area (level 15+) ----
  let warpPipeCol = -1;
  if(levelNum >= 15){
    let tries = 0;
    while(tries < 40){
      const c = 15 + Math.floor(rand()*Math.max(1, width-34));
      tries++;
      if(!solid[c]) continue;
      if(Math.abs(c - (width-4)) < 6) continue; // keep clear of the flag
      if(grid[GROUND_ROW-1][c] !== '.' || grid[GROUND_ROW-2][c] !== '.') continue;
      if(!structureColFree(c, 2)) continue;
      warpPipeCol = c;
      grid[GROUND_ROW-2][c] = '6';
      grid[GROUND_ROW-1][c] = '6';
      structureCols.push(c);
      break;
    }
  }

  // ---- Single flag near the end ----
  const flagCol = width - 4;
  for(let c=flagCol-3; c<width; c++){
    solid[c] = true;
    grid[GROUND_ROW][c] = '1';
    grid[GROUND_ROW+1][c] = '1';
  }
  for(let r=GROUND_ROW-6; r<GROUND_ROW; r++) grid[r][flagCol] = '5';

  // ---- Enemies ----
  const enemyCount = 3 + Math.floor(levelNum/5);
  const enemies = [];
  const usedCols = [];
  for(let i=0; i<enemyCount; i++){
    let tries = 0;
    while(tries < 25){
      const c = 10 + Math.floor(rand()*(width-24));
      tries++;
      if(!solid[c]) continue;
      if(usedCols.some(u => Math.abs(u-c) < 4)) continue;
      usedCols.push(c);
      enemies.push({
        x: c*TILE, y: GROUND_ROW*TILE - 39, w:39, h:39,
        vx: rand() < 0.5 ? -1 : 1, alive:true, type:'goomba'
      });
      break;
    }
  }

  // ---- Coins ----
  const coinCount = 6 + Math.floor(levelNum/4);
  const coins = [];
  for(let i=0; i<coinCount; i++){
    const c = 8 + Math.floor(rand()*(width-16));
    const r = 5 + Math.floor(rand()*3);
    if(grid[r][c] !== '.') continue;
    coins.push({col:c, row:r, collected:false, bob: rand()*Math.PI*2});
  }

  // ---- Quest requirements: gets more demanding at higher levels ----
  let reqCoins = 0, reqEnemies = 0;
  if(levelNum > 15) reqCoins = Math.max(1, Math.ceil(coins.length * 0.4));
  if(levelNum > 40) reqCoins = Math.max(1, Math.ceil(coins.length * 0.6));
  if(levelNum > 35) reqEnemies = Math.max(1, Math.ceil(enemies.length * 0.4));
  if(levelNum > 70) reqEnemies = Math.max(1, Math.ceil(enemies.length * 0.6));

  return {
    rows: grid.map(row => row.join('')),
    enemies,
    coins,
    requirements: { coins: reqCoins, enemies: reqEnemies },
    warpPipeCol,
    pipeMoons
  };
}

// Builds an underground bonus room reached via a warp pipe (only exists for level 15+).
// Difficulty scales with how far past level 15 we are, mirroring the surface level's growth.
// Deterministic per level so revisiting the same level gives the same room.
function generateSubLevel(levelNum){
  const rand = mulberry32(levelNum * 104729 + 555);
  const diff = Math.max(0, levelNum - 14); // 1 at level15, grows from there
  const width = 22 + Math.min(Math.round(diff * 1.1), 55);
  const grid = [];
  for(let r=0; r<LEVEL_ROWS; r++) grid.push(new Array(width).fill('.'));

  // Ceiling (row 2) is solid across the whole room
  for(let c=0; c<width; c++) grid[2][c] = '2';

  // Floor with jump-safe gaps (more/wider as difficulty rises, same safety rule as the surface)
  const solid = new Array(width).fill(true);
  const gapChanceBase = 0.15 + Math.min(diff, 70) * 0.003;
  let col = 5;
  while(col < width - 8){
    if(rand() < gapChanceBase){
      const gapW = 2 + (rand() < 0.35 ? 1 : 0); // always jumpable (2-3 tiles)
      for(let i=0; i<gapW && col+i < width-6; i++) solid[col+i] = false;
      col += gapW + 3 + Math.floor(rand()*4);
    } else {
      col += 2 + Math.floor(rand()*4);
    }
  }
  // keep the exit area solid
  for(let c=width-6; c<width; c++) solid[c] = true;
  for(let c=0; c<width; c++){
    grid[GROUND_ROW][c] = solid[c] ? '1' : '.';
    grid[GROUND_ROW+1][c] = solid[c] ? '1' : '.';
  }

  // Floating blocks with coins/power-ups
  const blockCount = 3 + Math.floor(diff/4);
  for(let i=0; i<blockCount; i++){
    const c = 5 + Math.floor(rand()*(width-14));
    if(!solid[c]) continue;
    const r = 6 + Math.floor(rand()*2);
    grid[r][c] = rand() < 0.5 ? '3' : '2';
  }

  // A rare hidden block or two, same rules as the surface: invisible & non-solid
  // until hit from below, and never placed where it could overlap anything else.
  const hiddenBlockCount = 1 + Math.floor(diff/20);
  for(let i=0; i<hiddenBlockCount; i++){
    let tries = 0;
    while(tries < 12){
      tries++;
      const c = 5 + Math.floor(rand()*(width-14));
      const r = 6 + Math.floor(rand()*2);
      if(!solid[c]) continue;
      if(grid[r][c] !== '.') continue;
      grid[r][c] = '7';
      break;
    }
  }

  // Scattered coins
  const coins = [];
  const coinCount = 6 + Math.floor(diff/2.5);
  for(let i=0; i<coinCount; i++){
    const c = 4 + Math.floor(rand()*(width-8));
    const r = 5 + Math.floor(rand()*4);
    if(grid[r][c] !== '.') continue;
    coins.push({col:c, row:r, collected:false, bob: rand()*Math.PI*2});
  }

  // Enemies, scaling with difficulty
  const enemyCount = 1 + Math.floor(diff/5);
  const enemies = [];
  const usedCols = [];
  for(let i=0; i<enemyCount; i++){
    let tries = 0;
    while(tries < 20){
      const c = 8 + Math.floor(rand()*(width-16));
      tries++;
      if(!solid[c]) continue;
      if(usedCols.some(u => Math.abs(u-c) < 4)) continue;
      usedCols.push(c);
      enemies.push({
        x: c*TILE, y: GROUND_ROW*TILE - 39, w:39, h:39,
        vx: rand() < 0.5 ? -1 : 1, alive:true, type:'goomba'
      });
      break;
    }
  }

  // Exit pipe back to the surface, near the far end
  const exitCol = width - 4;
  grid[GROUND_ROW-2][exitCol] = '6';
  grid[GROUND_ROW-1][exitCol] = '6';

  return {
    rows: grid.map(row => row.join('')),
    enemies,
    coins,
    pipeMoons: []
  };
}

let level = [];
let ROWS = LEVEL_ROWS;
let COLS = 0;
let LEVEL_WIDTH = 0;
let LEVEL_HEIGHT = LEVEL_ROWS * TILE;

function tileAt(col, row){
  if(row < 0 || row >= ROWS || col < 0 || col >= COLS) return 0;
  return level[row][col] === '.' ? 0 : parseInt(level[row][col]);
}
function setTile(col, row, val){
  if(row<0||row>=ROWS||col<0||col>=COLS) return;
  let r = level[row].split('');
  r[col] = val===0? '.' : String(val);
  level[row] = r.join('');
}

// Entities
const SMALL_W = 38, SMALL_H = 46;
const BIG_W = 49, BIG_H = 59; // same aspect ratio as SMALL, scaled ~1.3x
const player = {
  x: 60, y: 300, w: SMALL_W, h: SMALL_H,
  vx:0, vy:0, onGround:false, facing:1,
  big:false, invincible:0, alive:true, jumpHeld:false,
  walkCycle: 0, growPulse: 0
};
let growParticles = [];

function spawnGrowImpact(){
  player.growPulse = 20;
  const centerX = player.x + player.w/2, centerY = player.y + player.h/2;
  const count = 14;
  for(let i=0; i<count; i++){
    const angle = (Math.PI*2/count)*i + Math.random()*0.25;
    const speed = 2.8 + Math.random()*2.2;
    growParticles.push({
      x: centerX, y: centerY,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 26, maxLife: 26
    });
  }
}

function growBig(){
  if(player.big) return;
  player.big = true;
  let dw = BIG_W - SMALL_W, dh = BIG_H - SMALL_H;
  player.x -= dw/2;
  player.y -= dh;
  player.w = BIG_W;
  player.h = BIG_H;
  spawnGrowImpact();
  playGrowSound();
}

function shrinkSmall(){
  if(!player.big) return;
  player.big = false;
  let dw = BIG_W - SMALL_W, dh = BIG_H - SMALL_H;
  player.x += dw/2;
  player.y += dh;
  player.w = SMALL_W;
  player.h = SMALL_H;
}

let lives = 5, coins = 0, score = 0;
let currentLevelNum = 1;
let cameraX = 0;
let gameState = 'ready'; // ready, playing, levelComplete, dead, win
let bounceBlocks = []; // {col,row,timer}
let popups = []; // floating text/score
let enemies = [];
let coinList = [];
let items = []; // powerup mushrooms popped from blocks
let pipeMoons = []; // {col, row, phase, timer} moon hazards that pop out of pipes
let levelRequirements = { coins: 0, enemies: 0 };
let levelCoinsCollected = 0;
let levelEnemiesDefeated = 0;
let flagBlockedCooldown = 0;
let inSubLevel = false;
let mainSnapshot = null;
let warpCooldown = 0;
let prevOnGround = false;
let playerPrevY = 0;

function resetPlayer(){
  player.vx=0; player.vy=0;
  player.w = SMALL_W; player.h = SMALL_H;
  player.big=false; player.invincible=0; player.alive=true;
  player.walkCycle = 0;
  player.growPulse = 0;
  player.facing = 1;
  growParticles = [];
  if(inSubLevel){
    player.x = 96; player.y = GROUND_ROW*TILE - player.h;
  } else {
    player.x = 90; player.y = 450;
    // Center the camera on the player right away instead of starting at the world's left edge
    cameraX = player.x - canvas.width/2 + player.w/2;
  }
}

function loadLevel(n){
  currentLevelNum = Math.max(1, Math.min(TOTAL_LEVELS, n));
  const gen = generateLevel(currentLevelNum);
  level = gen.rows;
  ROWS = level.length;
  COLS = level[0].length;
  LEVEL_WIDTH = COLS * TILE;
  LEVEL_HEIGHT = ROWS * TILE;
  enemies = gen.enemies;
  coinList = gen.coins;
  items = [];
  bounceBlocks = [];
  popups = [];
  pipeMoons = gen.pipeMoons.map(m => ({...m, timer: m.phase}));
  levelRequirements = gen.requirements;
  levelCoinsCollected = 0;
  levelEnemiesDefeated = 0;
  flagBlockedCooldown = 0;
  inSubLevel = false;
  mainSnapshot = null;
  warpCooldown = 0;
  resetPlayer();
  updateHUD();
}

function enterSubLevel(){
  if(inSubLevel) return;
  mainSnapshot = {
    level, ROWS, COLS, LEVEL_WIDTH, LEVEL_HEIGHT,
    enemies, coinList, items, bounceBlocks, pipeMoons,
    cameraX, playerX: player.x, playerY: player.y
  };
  const sub = generateSubLevel(currentLevelNum);
  level = sub.rows;
  ROWS = level.length;
  COLS = level[0].length;
  LEVEL_WIDTH = COLS * TILE;
  LEVEL_HEIGHT = ROWS * TILE;
  enemies = sub.enemies;
  coinList = sub.coins;
  items = [];
  bounceBlocks = [];
  pipeMoons = [];
  cameraX = 0;
  inSubLevel = true;
  player.vx = 0; player.vy = 0;
  player.x = 96;
  player.y = GROUND_ROW*TILE - player.h;
  warpCooldown = 30;
  popups.push({x:player.x, y:player.y-30, text:'지하 세계 진입!', life:60});
}

function exitSubLevel(){
  if(!inSubLevel || !mainSnapshot) return;
  level = mainSnapshot.level;
  ROWS = mainSnapshot.ROWS;
  COLS = mainSnapshot.COLS;
  LEVEL_WIDTH = mainSnapshot.LEVEL_WIDTH;
  LEVEL_HEIGHT = mainSnapshot.LEVEL_HEIGHT;
  enemies = mainSnapshot.enemies;
  coinList = mainSnapshot.coinList;
  items = mainSnapshot.items;
  bounceBlocks = mainSnapshot.bounceBlocks;
  pipeMoons = mainSnapshot.pipeMoons;
  cameraX = mainSnapshot.cameraX;
  player.vx = 0; player.vy = 0;
  player.x = mainSnapshot.playerX;
  player.y = mainSnapshot.playerY - 6;
  inSubLevel = false;
  warpCooldown = 30;
  mainSnapshot = null;
  popups.push({x:player.x, y:player.y-30, text:'지상으로 복귀!', life:60});
}

function tryWarp(){
  if(warpCooldown > 0) return;
  const footCol = Math.floor((player.x + player.w/2) / TILE);
  const footRow = Math.floor((player.y + player.h) / TILE);
  if(tileAt(footCol, footRow) === 6){
    if(inSubLevel) exitSubLevel(); else enterSubLevel();
  }
}

function fullReset(){
  lives = 5; coins = 0; score = 0;
  loadLevel(1);
}

function updateHUD(){
  document.getElementById('lives').textContent = lives;
  document.getElementById('coins').textContent = coins;
  document.getElementById('score').textContent = score;
  document.getElementById('levelNum').textContent = currentLevelNum;
  const objEl = document.getElementById('objective');
  const needCoins = levelRequirements.coins > 0;
  const needEnemies = levelRequirements.enemies > 0;
  if(!needCoins && !needEnemies){
    objEl.style.display = 'none';
  } else {
    objEl.style.display = 'block';
    let parts = [];
    if(needCoins) parts.push(`🪙 ${levelCoinsCollected}/${levelRequirements.coins}`);
    if(needEnemies) parts.push(`👾 ${levelEnemiesDefeated}/${levelRequirements.enemies}`);
    objEl.textContent = '목표: ' + parts.join('  ·  ');
  }
}

function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function tileSolid(t){ return t===1 || t===2 || t===3 || t===4 || t===6; }

function collideWithTiles(entity){
  entity.onGround = false;
  // Horizontal
  entity.x += entity.vx;
  let left = Math.floor(entity.x / TILE);
  let right = Math.floor((entity.x + entity.w) / TILE);
  let top = Math.floor(entity.y / TILE);
  let bottom = Math.floor((entity.y + entity.h - 1) / TILE);
  for(let r = top; r <= bottom; r++){
    if(entity.vx > 0){
      if(tileSolid(tileAt(right, r))){
        entity.x = right * TILE - entity.w;
        entity.vx = 0;
      }
    } else if(entity.vx < 0){
      if(tileSolid(tileAt(left, r))){
        entity.x = (left+1) * TILE;
        entity.vx = 0;
      }
    }
  }
  // Vertical
  entity.y += entity.vy;
  left = Math.floor(entity.x / TILE);
  right = Math.floor((entity.x + entity.w) / TILE);
  top = Math.floor(entity.y / TILE);
  bottom = Math.floor((entity.y + entity.h) / TILE);
  for(let c = left; c <= right; c++){
    if(entity.vy > 0){
      if(tileSolid(tileAt(c, bottom))){
        entity.y = bottom * TILE - entity.h;
        entity.vy = 0;
        entity.onGround = true;
      }
    } else if(entity.vy < 0){
      let t = tileAt(c, top);
      if(tileSolid(t)){
        entity.y = (top+1) * TILE;
        entity.vy = 0;
        if(t === 3 && entity === player){
          hitBlock(c, top);
        } else if(t === 2 && entity === player && player.big){
          setTile(c, top, 0);
          score += 20;
          popups.push({x:c*TILE, y:top*TILE, text:'+20', life:40});
        }
      } else if(t === 7 && entity === player){
        // Hidden block: invisible & non-solid until jumped into from below.
        // First hit just reveals it as a solid box; a second hit (handled by
        // the normal case-3 branch above, next time) actually breaks it.
        entity.y = (top+1) * TILE;
        entity.vy = 0;
        setTile(c, top, 3);
        bounceBlocks.push({col:c, row:top, timer:8});
        popups.push({x:c*TILE, y:top*TILE, text:'?!', life:40});
      }
    }
  }
}

function hitBlock(col, row){
  setTile(col, row, 0);
  bounceBlocks.push({col, row, timer:8});
  const mushroomChance = Math.min(0.4 + currentLevelNum * 0.004, 0.75);
  if(Math.random() < mushroomChance){
    items.push({x:col*TILE, y:row*TILE - TILE, w:39, h:39, vx: 1.8, vy:-4.5, type:'mushroom', landed:false});
  } else {
    coins++;
    levelCoinsCollected++;
    score += 50;
    popups.push({x:col*TILE, y:row*TILE, text:'+50', life:40});
    playCoinSound();
    updateHUD();
  }
}

function updatePlayer(){
  if(!player.alive) return;

  playerPrevY = player.y;

  if(keys['ArrowLeft']){ player.vx -= 0.9; player.facing = -1; }
  if(keys['ArrowRight']){ player.vx += 0.9; player.facing = 1; }
  player.vx *= FRICTION;
  if(Math.abs(player.vx) > MOVE_SPEED) player.vx = MOVE_SPEED * Math.sign(player.vx);
  if(Math.abs(player.vx) < 0.05) player.vx = 0;

  if((keys['Space'] || keys['ArrowUp'])){
    if(player.onGround && !player.jumpHeld){
      player.vy = JUMP_FORCE;
      player.jumpHeld = true;
      playJumpSound();
    } else if(!player.onGround && player.jumpHeld && player.vy < -4.5){
      player.vy -= 0.225; // slight boost while held for variable jump feel
    }
  } else {
    player.jumpHeld = false;
    if(player.vy < -6) player.vy = -6; // cut jump short
  }
  if(player.onGround) player.jumpHeld = keys['Space']||keys['ArrowUp'] ? player.jumpHeld : false;

  player.vy += GRAVITY;
  if(player.vy > 21) player.vy = 21;

  collideWithTiles(player);

  // Running animation cycle: advances while moving on the ground,
  // eases back to a neutral pose (nearest full cycle) when idle.
  if(player.onGround && Math.abs(player.vx) > 0.3){
    player.walkCycle += Math.abs(player.vx) * 0.3;
  } else if(player.onGround){
    const target = Math.round(player.walkCycle / (Math.PI*2)) * Math.PI*2;
    player.walkCycle += (target - player.walkCycle) * 0.2;
  }

  if(player.x < 0) player.x = 0;
  if(player.x + player.w > LEVEL_WIDTH) player.x = LEVEL_WIDTH - player.w;
  if(player.invincible > 0) player.invincible--;

  // Fall off world
  if(player.y > LEVEL_HEIGHT + 100){
    die();
  }

  if(flagBlockedCooldown > 0) flagBlockedCooldown--;
  if(warpCooldown > 0) warpCooldown--;
  if(player.growPulse > 0) player.growPulse--;

  if(player.onGround && !prevOnGround){
    tryWarp();
  }
  prevOnGround = player.onGround;

  // Reach flag
  let col = Math.floor((player.x+player.w/2)/TILE);
  let row = Math.floor((player.y+player.h/2)/TILE);
  if(level[row] && level[row][col] === '5'){
    const coinsOk = levelCoinsCollected >= levelRequirements.coins;
    const enemiesOk = levelEnemiesDefeated >= levelRequirements.enemies;
    if(coinsOk && enemiesOk){
      winGame();
    } else if(flagBlockedCooldown <= 0){
      flagBlockedCooldown = 90;
      let msg = [];
      if(!coinsOk) msg.push(`코인 ${levelCoinsCollected}/${levelRequirements.coins}`);
      if(!enemiesOk) msg.push(`적 처치 ${levelEnemiesDefeated}/${levelRequirements.enemies}`);
      popups.push({x:player.x, y:player.y-24, text:msg.join(' · ')+' 필요!', life:70});
      player.vx = -Math.abs(player.vx) - 1; // gentle push back from the pole
    }
  }
}

function die(){
  if(!player.alive) return;
  player.alive = false;
  lives--;
  playDeathSound();
  updateHUD();
  setTimeout(()=>{
    if(lives <= 0){
      gameState = 'dead';
      showOverlay('게임 오버', '다시 시작');
    } else {
      loadLevel(currentLevelNum); // fresh level: enemies, coins, blocks all reset
    }
  }, 700);
}

function winGame(){
  if(gameState !== 'playing') return;
  score += 500;
  updateHUD();
  if(currentLevelNum >= TOTAL_LEVELS){
    gameState = 'win';
    showOverlay('🎉 100개 레벨 모두 클리어! 🎉', '처음부터 다시');
  } else {
    gameState = 'levelComplete';
    showOverlay(`레벨 ${currentLevelNum} 클리어!`, `레벨 ${currentLevelNum+1} 시작`);
  }
}

function updateEnemies(){
  enemies.forEach(en => {
    if(!en.alive) return;
    en.vy = (en.vy||0) + GRAVITY;
    if(en.vy > 21) en.vy = 21;
    let prevVx = en.vx;
    collideWithTiles(en);
    if(en.vx === 0) en.vx = -prevVx || -1; // bounced off wall, reverse
    // Check ledge ahead to avoid walking off (simple check)
    let aheadCol = Math.floor((en.x + (en.vx>0? en.w+2 : -2)) / TILE);
    let belowRow = Math.floor((en.y + en.h + 2) / TILE);
    if(!tileSolid(tileAt(aheadCol, belowRow))){
      en.vx *= -1;
    }

    // collide with player
    if(player.alive && rectsOverlap(player, en)){
      const wasAbove = playerPrevY + player.h <= en.y + en.h*0.5;
      if(player.vy > 0 && wasAbove){
        en.alive = false;
        levelEnemiesDefeated++;
        player.vy = JUMP_FORCE * 0.6;
        score += 100;
        popups.push({x:en.x, y:en.y, text:'+100', life:40});
        updateHUD();
      } else if(player.invincible <= 0){
        if(player.big){
          shrinkSmall();
          player.invincible = 90;
        } else {
          die();
        }
      }
    }
  });
}

function updateItems(){
  items.forEach(it => {
    if(it.type !== 'mushroom') return;
    it.vy += GRAVITY;
    if(it.vy > 10) it.vy = 10;
    let tempEntity = {x:it.x, y:it.y, w:it.w, h:it.h, vx:it.vx, vy:it.vy, onGround:false};
    collideWithTiles(tempEntity);
    if(tempEntity.vx === 0) it.vx *= -1; else it.vx = tempEntity.vx;
    it.x = tempEntity.x; it.y = tempEntity.y; it.vy = tempEntity.vy;

    if(rectsOverlap(player, it) && !it.collected){
      it.collected = true;
      growBig();
      score += 200;
      popups.push({x:it.x, y:it.y, text:'+200', life:40});
      updateHUD();
    }
  });
  items = items.filter(it => !it.collected);
}

function updateCoins(){
  coinList.forEach(c => {
    if(c.collected) return;
    c.bob += 0.1;
    let cx = c.col*TILE + TILE/2;
    let cy = c.row*TILE + TILE/2 + Math.sin(c.bob)*3;
    let coinRect = {x:cx-17, y:cy-17, w:34, h:34};
    if(rectsOverlap(player, coinRect)){
      c.collected = true;
      coins++;
      levelCoinsCollected++;
      score += 10;
      playCoinSound();
      updateHUD();
    }
  });
}

function updateBounceBlocks(){
  bounceBlocks.forEach(b => b.timer--);
  bounceBlocks = bounceBlocks.filter(b => b.timer > 0);
}

function updatePopups(){
  popups.forEach(p => p.life--);
  popups = popups.filter(p => p.life > 0);
}

function updateGrowParticles(){
  growParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.93;
    p.vy *= 0.93;
    p.life--;
  });
  growParticles = growParticles.filter(p => p.life > 0);
}

const MOON_CYCLE = 150, MOON_HIDDEN_DUR = 90, MOON_FLIGHT_DUR = 60;
// Returns how high above the pipe's hidden resting spot the moon should be,
// as a 0..1 fraction of its max jump height (a smooth parabolic hop: 0 at
// launch/landing, 1 at the peak of the "boing").
function moonFlightFraction(timer){
  let t = timer % MOON_CYCLE;
  if(t < MOON_HIDDEN_DUR) return 0;
  t -= MOON_HIDDEN_DUR;
  const frac = t / MOON_FLIGHT_DUR; // 0..1 across the whole hop
  return 4 * frac * (1 - frac); // parabola: 0 -> 1 (peak) -> 0
}

function updatePipeMoons(){
  const moonRadius = TILE*0.42;
  const maxJumpHeight = TILE*2.1;
  pipeMoons.forEach(m => {
    m.timer++;
    const flight = moonFlightFraction(m.timer);
    m.progress = flight;
    const centerX = m.col*TILE + TILE/2;
    const hiddenCY = m.row*TILE + moonRadius*0.9; // resting spot, tucked inside the pipe
    m.worldX = centerX;
    m.worldY = hiddenCY - maxJumpHeight * flight;

    if(player.alive && player.invincible <= 0 && gameState === 'playing'){
      const moonRect = {x: m.worldX-moonRadius, y: m.worldY-moonRadius, w: moonRadius*2, h: moonRadius*2};
      if(rectsOverlap(player, moonRect)){
        if(player.big){
          shrinkSmall();
          player.invincible = 90;
        } else {
          die();
        }
      }
    }
  });
}

function updateCamera(){
  let target = player.x - canvas.width/2 + player.w/2;
  cameraX += (target - cameraX) * 0.12;
  const maxCameraX = Math.max(0, LEVEL_WIDTH - canvas.width);
  if(cameraX > maxCameraX) cameraX = maxCameraX;
}

// ---------- DRAWING ----------
function tileDepthShade(x, y){
  const shade = ctx.createLinearGradient(x, y, x, y+TILE);
  shade.addColorStop(0, 'rgba(255,255,255,0.22)');
  shade.addColorStop(0.18, 'rgba(255,255,255,0.06)');
  shade.addColorStop(0.75, 'rgba(0,0,0,0)');
  shade.addColorStop(1, 'rgba(0,0,0,0.22)');
  ctx.fillStyle = shade;
  ctx.fillRect(x, y, TILE, TILE);
}

function drawTile(t, x, y, isPipeTop){
  switch(t){
    case 1:
      // Ground tiles are drawn via drawGroundStrip() in drawLevel now;
      // this branch only serves as a fallback and is not normally reached.
      if(groundTexture.complete && groundTexture.naturalWidth > 0){
        const cropSize = Math.min(groundTexture.naturalWidth, groundTexture.naturalHeight);
        const maxOff = groundTexture.naturalWidth - cropSize;
        const col = Math.round((x+cameraX)/TILE);
        const srcX = maxOff > 0 ? Math.abs(col*53) % maxOff : 0;
        ctx.drawImage(groundTexture, srcX, 0, cropSize, cropSize, x, y, TILE, TILE);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.strokeRect(x,y,TILE,TILE);
      } else {
        ctx.fillStyle = '#8b5a2b';
        ctx.fillRect(x,y,TILE,TILE);
        ctx.fillStyle = '#6b4423';
        ctx.fillRect(x,y,TILE,4);
        tileDepthShade(x, y);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.strokeRect(x,y,TILE,TILE);
      }
      break;
    case 2:
      if(groundTexture.complete && groundTexture.naturalWidth > 0){
        const cropSize = Math.min(groundTexture.naturalWidth, groundTexture.naturalHeight);
        const maxOff = groundTexture.naturalWidth - cropSize;
        const col = Math.round((x+cameraX)/TILE), row = Math.round((y+cameraY)/TILE);
        const srcX = maxOff > 0 ? Math.abs(col*53 + row*29) % maxOff : 0;
        ctx.drawImage(groundTexture, srcX, 0, cropSize, cropSize, x, y, TILE, TILE);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.strokeRect(x,y,TILE,TILE);
      } else {
        ctx.fillStyle = '#c0522d';
        ctx.fillRect(x,y,TILE,TILE);
        ctx.strokeStyle = '#8a3a1f';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1,y+1,TILE-2,TILE-2);
        ctx.beginPath();
        ctx.moveTo(x,y+TILE/2); ctx.lineTo(x+TILE,y+TILE/2);
        ctx.moveTo(x+TILE/2,y); ctx.lineTo(x+TILE/2,y+TILE/2);
        ctx.stroke();
        tileDepthShade(x, y);
      }
      break;
    case 3:
      if(giftBoxTexture.complete && giftBoxTexture.naturalWidth > 0){
        const iw = giftBoxTexture.naturalWidth, ih = giftBoxTexture.naturalHeight;
        const scale = Math.min(TILE/iw, TILE/ih);
        const dw = iw*scale, dh = ih*scale;
        ctx.drawImage(giftBoxTexture, x+(TILE-dw)/2, y+(TILE-dh)/2, dw, dh);
      } else {
        ctx.fillStyle = '#ffcb05';
        ctx.fillRect(x,y,TILE,TILE);
        ctx.strokeStyle = '#c99a00';
        ctx.lineWidth = 2;
        ctx.strokeRect(x+1,y+1,TILE-2,TILE-2);
        ctx.fillStyle = '#c99a00';
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('?', x+TILE/2, y+TILE/2+7);
      }
      break;
    case 4:
    case 6: {
      if(!isPipeTop) break; // bottom tile is covered by the top tile's image
      if(pipeTexture.complete && pipeTexture.naturalWidth > 0){
        const iw = pipeTexture.naturalWidth, ih = pipeTexture.naturalHeight;
        const dh = TILE*2;
        const dw = dh * (iw/ih);
        ctx.drawImage(pipeTexture, x + TILE/2 - dw/2, y, dw, dh);
      } else {
        ctx.fillStyle = '#e8ad14';
        ctx.fillRect(x, y, TILE, TILE*2);
      }
      break;
    }
    case 5: {
      const poleG = ctx.createLinearGradient(x+TILE/2-3, 0, x+TILE/2+3, 0);
      poleG.addColorStop(0, '#f2f2f2');
      poleG.addColorStop(0.5, '#9a9a9a');
      poleG.addColorStop(1, '#4d4d4d');
      ctx.fillStyle = poleG;
      ctx.fillRect(x+TILE/2-3, y, 6, TILE);
      break;
    }
    case 7:
      // Hidden block: intentionally invisible until jumped into from below
      break;
  }
}

function drawGroundStrip(col, x, y){
  if(groundTexture.complete && groundTexture.naturalWidth > 0){
    const imgW = groundTexture.naturalWidth, imgH = groundTexture.naturalHeight;
    const srcWindowW = imgW * 0.2;
    const step = imgW * 0.06;
    const srcX = (col * step) % (imgW - srcWindowW);
    ctx.drawImage(groundTexture, srcX, 0, srcWindowW, imgH, x, y, TILE, TILE*2);
  } else {
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(x, y, TILE, TILE*2);
    ctx.fillStyle = '#6b4423';
    ctx.fillRect(x, y, TILE, 4);
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.strokeRect(x, y, TILE, TILE);
  ctx.strokeRect(x, y+TILE, TILE, TILE);
}

function drawLevel(){
  let startCol = Math.floor(cameraX / TILE) - 2;
  let endCol = Math.ceil((cameraX + canvas.width) / TILE) + 2;
  for(let row=0; row<ROWS; row++){
    for(let col=startCol; col<=endCol; col++){
      let t = tileAt(col,row);
      if(t === 0) continue;
      if(row === GROUND_ROW+1 && t === 1) continue; // drawn together with the row above
      let skip = bounceBlocks.some(b => b.col===col && b.row===row);
      if(skip) continue;
      if(row === GROUND_ROW && t === 1){
        drawGroundStrip(col, col*TILE - cameraX, row*TILE - cameraY);
        continue;
      }
      let isPipeTop = (t===4 || t===6) && tileAt(col,row-1) !== t;
      if((t===4 || t===6) && !isPipeTop) continue; // drawn together with the tile above
      drawTile(t, col*TILE - cameraX, row*TILE - cameraY, isPipeTop);
    }
  }
  // Flag banner (drawn once at the top of the pole)
  for(let row=0; row<ROWS; row++){
    for(let col=startCol; col<=endCol; col++){
      if(level[row][col] === '5' && (row===0 || level[row-1][col] !== '5')){
        let x = col*TILE - cameraX;
        let y = row*TILE - cameraY;
        if(flagBannerTexture.complete && flagBannerTexture.naturalWidth > 0){
          const iw = flagBannerTexture.naturalWidth, ih = flagBannerTexture.naturalHeight;
          const bh = TILE*5.7;
          const bw = bh * (iw/ih);
          const bx = x + TILE/2 - bw/2;
          const by = y - TILE*0.3;
          ctx.drawImage(flagBannerTexture, bx, by, bw, bh);
        } else {
          const flagG = ctx.createLinearGradient(x+TILE/2-16, y, x+TILE/2+2, y+20);
          flagG.addColorStop(0, '#7be89a');
          flagG.addColorStop(0.5, '#2ecc71');
          flagG.addColorStop(1, '#1f9a56');
          ctx.fillStyle = flagG;
          ctx.beginPath();
          ctx.moveTo(x+TILE/2+2, y);
          ctx.lineTo(x+TILE/2+2, y+20);
          ctx.lineTo(x+TILE/2-16, y+10);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.15)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }
  }
}

function drawBouncingBlocks(){
  bounceBlocks.forEach(b => {
    let offset = Math.sin((8-b.timer)/8*Math.PI) * 12;
    drawTile(3, b.col*TILE - cameraX, b.row*TILE - cameraY - offset);
  });
}

function starPath(cx, cy, points, outerR, innerR, rotation){
  ctx.beginPath();
  for(let i=0; i<points*2; i++){
    const r = i%2===0 ? outerR : innerR;
    const a = (Math.PI/points)*i - Math.PI/2 + rotation;
    const px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

function drawCoin(x, y){
  const r = 16;
  if(coinTexture.complete && coinTexture.naturalWidth > 0){
    const iw = coinTexture.naturalWidth, ih = coinTexture.naturalHeight;
    const scale = (r*2.1) / Math.max(iw, ih);
    const dw = iw*scale, dh = ih*scale;
    ctx.drawImage(coinTexture, x-dw/2, y-dh/2, dw, dh);
  } else {
    ctx.fillStyle = '#ffd84d';
    ctx.beginPath(); ctx.ellipse(x, y, r, r*1.06, 0, 0, Math.PI*2); ctx.fill();
  }
}

function drawCoins(){
  coinList.forEach(c => {
    if(c.collected) return;
    let cx = c.col*TILE + TILE/2 - cameraX;
    let cy = c.row*TILE + TILE/2 + Math.sin(c.bob)*3 - cameraY;
    drawCoin(cx, cy);
  });
}

function drawEnemy(en){
  if(!en.alive) return;
  let x = en.x - cameraX, y = en.y - cameraY;
  const w = en.w, h = en.h;
  const cx = x + w/2;

  // Soft contact shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx, y+h+2, w*0.4, w*0.12, 0, 0, Math.PI*2);
  ctx.fill();

  if(enemyTexture.complete && enemyTexture.naturalWidth > 0){
    const iw = enemyTexture.naturalWidth, ih = enemyTexture.naturalHeight;
    const scale = Math.min(w/iw, h/ih) * 1.3;
    const dw = iw*scale, dh = ih*scale;
    ctx.save();
    if(en.vx < 0){
      ctx.translate(cx + dw/2, y+h - dh + h*0.06);
      ctx.scale(-1,1);
      ctx.drawImage(enemyTexture, 0, 0, dw, dh);
    } else {
      ctx.drawImage(enemyTexture, cx - dw/2, y+h - dh + h*0.06, dw, dh);
    }
    ctx.restore();
  } else {
    ctx.fillStyle = '#5ecdc4';
    ctx.beginPath();
    ctx.ellipse(cx, y+h/2, w*0.45, h*0.45, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawItem(it){
  let x = it.x - cameraX, y = it.y - cameraY;
  const w = it.w, h = it.h;
  const cx = x + w/2, cy = y + h/2;

  if(mushroomItemTexture.complete && mushroomItemTexture.naturalWidth > 0){
    const iw = mushroomItemTexture.naturalWidth, ih = mushroomItemTexture.naturalHeight;
    const scale = Math.min(w/iw, h/ih) * 1.15;
    const dw = iw*scale, dh = ih*scale;
    ctx.drawImage(mushroomItemTexture, cx-dw/2, cy-dh/2, dw, dh);
  } else {
    ctx.fillStyle = '#e8c04a';
    ctx.beginPath(); ctx.arc(cx, cy, w*0.45, 0, Math.PI*2); ctx.fill();
  }
}

function drawPlayer(){
  if(!player.alive) return;
  if(player.invincible > 0 && Math.floor(player.invincible/4)%2===0) return;
  let x = player.x - cameraX, y = player.y - cameraY;
  const w = player.w, h = player.h;

  // Soft contact shadow on the ground beneath the character
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(w/2, h+2, w*0.42, w*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Expanding flash ring when the growth impact triggers
  if(player.growPulse > 0){
    const t = player.growPulse / 20;
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.strokeStyle = `rgba(255,240,150,${t*0.85})`;
    ctx.lineWidth = Math.max(1.5, w*0.06) * t;
    ctx.beginPath();
    ctx.ellipse(0, 0, w*(1.1 - t*0.3) + (1-t)*w*0.9, h*(0.6 - t*0.15) + (1-t)*h*0.6, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  if(player.facing < 0){
    ctx.translate(x+w, y);
    ctx.scale(-1,1);
  } else {
    ctx.translate(x,y);
  }

  // Pop/impact scale: overshoots bigger on growth, then eases back to normal
  if(player.growPulse > 0){
    const t = player.growPulse / 20;
    const pop = 1 + t*t*0.35;
    ctx.translate(w/2, h/2);
    ctx.scale(pop, pop);
    ctx.translate(-w/2, -h/2);
  }

  const cx = w/2;

  // Whole-sprite "life": bounce while running, and a touch of
  // squash-and-stretch — no rotation, so the head doesn't wobble.
  const cyc = player.walkCycle;
  const bounce = player.onGround ? Math.abs(Math.sin(cyc)) * h*0.08 : 0;
  const sway = player.onGround ? Math.sin(cyc) * w*0.05 : 0;
  const squashX = player.onGround ? 1 + Math.abs(Math.sin(cyc))*0.05 : 1 - Math.min(0.08, Math.abs(player.vy)*0.006);
  const squashY = player.onGround ? 1 - Math.abs(Math.sin(cyc))*0.07 : 1 + Math.min(0.1, Math.abs(player.vy)*0.007);

  const activeFrame = !player.onGround
    ? playerTextureJump
    : (Math.sin(cyc) > 0 ? playerTextureB : playerTextureA);

  if(activeFrame.complete && activeFrame.naturalWidth > 0){
    const iw = activeFrame.naturalWidth, ih = activeFrame.naturalHeight;
    const scale = Math.min(w/iw, h/ih) * 1.4; // fill the hitbox generously (the art has a dynamic running pose with flailing limbs)
    const dw = iw*scale, dh = ih*scale;
    ctx.save();
    ctx.translate(cx + sway, h - bounce);
    ctx.scale(squashX, squashY);
    ctx.drawImage(activeFrame, -dw/2, -dh + h*0.08, dw, dh);
    ctx.restore();
  } else {
    ctx.fillStyle = '#fdf1c9';
    ctx.beginPath();
    ctx.ellipse(cx, h/2, w*0.45, h*0.45, 0, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

function drawPopups(){
  popups.forEach(p => {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1,p.life/40)})`;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x - cameraX, p.y - cameraY - (40-p.life));
  });
}

function drawGrowParticles(){
  growParticles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.fillStyle = `rgba(255,224,120,${t})`;
    ctx.beginPath();
    ctx.arc(p.x - cameraX, p.y - cameraY, 2 + t*3, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawBackground(){
  if(inSubLevel){
    ctx.fillStyle = '#1a1025';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'rgba(120,80,160,0.25)';
    for(let i=0;i<6;i++){
      let cx = (i*260 - cameraX*0.4) % (LEVEL_WIDTH+260);
      if(cx < -80) cx += LEVEL_WIDTH+260;
      ctx.beginPath();
      ctx.arc(cx, 60, 40, 0, Math.PI*2);
      ctx.fill();
    }
    return;
  }

  if(bgImage.complete && bgImage.naturalWidth > 0){
    // Scale the (square) background image to cover the canvas height, then
    // tile it horizontally with alternating mirrored copies so the edges
    // always line up seamlessly (no visible "stitched" boundary), plus a
    // slow parallax scroll so it doesn't feel static.
    const imgW = canvas.height * (bgImage.naturalWidth / bgImage.naturalHeight);
    const imgH = canvas.height;
    const worldOffset = cameraX * 0.2;
    const iMin = Math.floor((0 + worldOffset) / imgW) - 1;
    const iMax = Math.ceil((canvas.width + worldOffset) / imgW) + 1;
    for(let i = iMin; i <= iMax; i++){
      const x = i*imgW - worldOffset;
      const mirrored = (((i % 2) + 2) % 2) === 1;
      ctx.save();
      if(mirrored){
        ctx.translate(x + imgW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(bgImage, 0, 0, imgW, imgH);
      } else {
        ctx.drawImage(bgImage, x, 0, imgW, imgH);
      }
      ctx.restore();
    }
  } else {
    ctx.fillStyle = '#5c94fc';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}

function drawPipeMoons(){
  const moonRadius = TILE*0.42;
  pipeMoons.forEach(m => {
    if(!m.progress || m.progress <= 0) return; // fully retracted, nothing to draw
    const sx = m.worldX - cameraX, sy = m.worldY - cameraY;
    const clipY = m.row*TILE - cameraY; // pipe opening's top edge, in screen space
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx - moonRadius - 4, -4000, moonRadius*2 + 8, clipY + 4000);
    ctx.clip();
    if(moonTexture.complete && moonTexture.naturalWidth > 0){
      const iw = moonTexture.naturalWidth, ih = moonTexture.naturalHeight;
      const scale = (moonRadius*2) / Math.max(iw, ih);
      const dw = iw*scale, dh = ih*scale;
      ctx.drawImage(moonTexture, sx-dw/2, sy-dh/2, dw, dh);
    } else {
      ctx.fillStyle = '#c7c9e0';
      ctx.beginPath(); ctx.arc(sx, sy, moonRadius, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function render(){
  drawBackground();
  drawLevel();
  drawBouncingBlocks();
  drawPipeMoons();
  drawCoins();
  items.forEach(drawItem);
  enemies.forEach(drawEnemy);
  drawPlayer();
  drawGrowParticles();
  drawPopups();
}

function gameLoop(){
  if(gameState === 'playing'){
    updatePlayer();
    updateEnemies();
    updateItems();
    updateCoins();
    updateBounceBlocks();
    updatePopups();
    updateGrowParticles();
    updatePipeMoons();
    updateCamera();
  }
  render();
  requestAnimationFrame(gameLoop);
}

function showOverlay(text, btnText){
  document.getElementById('overlayText').textContent = text;
  document.getElementById('overlayBtn').textContent = btnText;
  document.getElementById('overlay').style.display = 'flex';
}
function hideOverlay(){
  document.getElementById('overlay').style.display = 'none';
}

document.getElementById('overlayBtn').addEventListener('click', () => {
  if(gameState === 'levelComplete'){
    loadLevel(currentLevelNum + 1);
  } else {
    fullReset();
  }
  gameState = 'playing';
  hideOverlay();
  startMusic();
});

resizeCanvas();
fullReset();
gameState = 'ready';
showOverlay('점프 어드벤처', '시작하기');
render();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
