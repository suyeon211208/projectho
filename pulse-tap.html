<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PULSE TAP — 리듬 클리커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================
   PULSE TAP — style.css
   팔레트: 딥 인디고 배경 + 네온 레인(최대 9색)
   ================================ */

:root{
  --bg-0: #06070f;
  --bg-1: #0b0e1f;
  --ink: #eef1ff;
  --ink-dim: #8b90b3;
  --danger: #ff3b5c;
  --panel: rgba(255,255,255,0.04);
  --panel-border: rgba(255,255,255,0.09);
}

*{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body{
  margin:0; padding:0;
  width:100%; height:100%;
  overflow:hidden;
  background: var(--bg-0);
  font-family:'Rajdhani', sans-serif;
  color: var(--ink);
  user-select:none;
  -webkit-user-select:none;
  touch-action: manipulation;
}

#app{
  position:relative;
  width:100vw; height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  background:
    radial-gradient(60% 45% at 50% 8%, rgba(0,229,255,0.10), transparent 70%),
    radial-gradient(55% 40% at 85% 90%, rgba(255,45,149,0.08), transparent 70%),
    radial-gradient(55% 40% at 10% 90%, rgba(255,212,0,0.06), transparent 70%),
    linear-gradient(180deg, var(--bg-1), var(--bg-0));
  overflow:hidden;
}

/* ---------- 배경 펄스 링 (시그니처 요소) ---------- */
.bg-rings{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
  z-index:0;
}
.ring{
  position:absolute;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:50%;
  width:120px; height:120px;
  opacity:0;
}
.ring.pulse{
  animation: ringPulse 1s cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes ringPulse{
  0%   { width:80px; height:80px; opacity:0.55; border-color: rgba(255,255,255,0.35); }
  100% { width:900px; height:900px; opacity:0; border-color: rgba(255,255,255,0); }
}

/* ---------- HUD ---------- */
#hud{
  position:relative; z-index:2;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding: max(16px, env(safe-area-inset-top)) 16px 0;
  gap:6px;
}
.hud-block{ display:flex; flex-direction:column; align-items:flex-start; min-width:56px; }
.level-block, .score-block{ align-items:center; }
.combo-block{ align-items:flex-end; }
.hud-label{
  font-family:'Orbitron', sans-serif;
  font-size:9px;
  letter-spacing:2px;
  color: var(--ink-dim);
  margin-bottom:4px;
  white-space:nowrap;
}
#score, #combo, #level{
  font-family:'Orbitron', sans-serif;
  font-size:20px;
  font-weight:700;
  color:#fff;
  text-shadow:0 0 12px rgba(0,229,255,0.5);
  display:inline-block;
}
#combo{ color:#ffd400; text-shadow:0 0 12px rgba(255,212,0,0.6); }
#level{ color:#ff2d95; text-shadow:0 0 12px rgba(255,45,149,0.6); }
#level.level-pulse{ animation: levelPulse .5s ease-out; }
@keyframes levelPulse{
  0%{ transform: scale(1); color:#ff2d95; }
  35%{ transform: scale(1.5); color:#7cff5e; text-shadow:0 0 20px rgba(124,255,94,0.9); }
  100%{ transform: scale(1); color:#ff2d95; }
}

.lives{ display:flex; gap:5px; }
.life{
  width:14px; height:14px;
  border-radius:4px;
  background: linear-gradient(145deg,#00e5ff,#0077ff);
  box-shadow: 0 0 8px rgba(0,229,255,0.7);
  transform: rotate(45deg);
  transition: opacity .25s ease, transform .25s ease, background .25s ease, box-shadow .25s ease;
}
.life.lost{
  background: rgba(255,255,255,0.06);
  box-shadow:none;
  opacity:0.5;
  transform: rotate(45deg) scale(0.7);
}
.life.hit-flash{ animation: lifeLost .4s ease; }
@keyframes lifeLost{
  0%{ background:var(--danger); box-shadow:0 0 20px var(--danger); transform:rotate(45deg) scale(1.3);}
  100%{ transform:rotate(45deg) scale(0.7); }
}

/* ---------- 판정 팝업 ---------- */
.judge-popup{
  position:absolute;
  top:26%;
  left:50%;
  transform: translate(-50%, -50%) scale(0.8);
  z-index:5;
  font-family:'Orbitron', sans-serif;
  font-weight:900;
  font-size:26px;
  letter-spacing:2px;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
}
.judge-popup.show{
  animation: judgePop .55s cubic-bezier(.2,.8,.3,1) forwards;
}
@keyframes judgePop{
  0%   { opacity:0; transform:translate(-50%,-40%) scale(0.6); }
  25%  { opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  70%  { opacity:1; transform:translate(-50%,-55%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-70%) scale(0.95); }
}
.judge-popup.perfect{ color:#00e5ff; text-shadow:0 0 18px rgba(0,229,255,0.9); }
.judge-popup.good{ color:#ffd400; text-shadow:0 0 18px rgba(255,212,0,0.9); }
.judge-popup.miss{ color:var(--danger); text-shadow:0 0 18px rgba(255,59,92,0.9); font-size:20px; }
.judge-popup.levelup{ color:#7cff5e; text-shadow:0 0 18px rgba(124,255,94,0.9); font-size:22px; }
.judge-popup.combo{ color:#ffd400; text-shadow:0 0 22px rgba(255,212,0,1); font-size:30px; }

/* ---------- 레벨업 대형 배너 (누구나 놓치지 않게 화면 중앙을 가로지름) ---------- */
.levelup-banner{
  position:absolute;
  top:38%;
  left:50%;
  transform: translate(-50%, -50%) scaleX(0);
  z-index:8;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  pointer-events:none;
  padding: 10px 0;
  width:100%;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.16), rgba(255,45,149,0.16), transparent);
}
.levelup-banner.show{
  animation: levelBannerSweep 1s cubic-bezier(.2,.8,.2,1);
}
@keyframes levelBannerSweep{
  0%   { transform: translate(-50%, -50%) scaleX(0);   opacity:0; }
  15%  { transform: translate(-50%, -50%) scaleX(1);   opacity:1; }
  75%  { transform: translate(-50%, -50%) scaleX(1);   opacity:1; }
  100% { transform: translate(-50%, -50%) scaleX(1);   opacity:0; }
}
.levelup-title{
  font-family:'Orbitron', sans-serif;
  font-weight:900;
  font-size: clamp(26px, 8vw, 44px);
  letter-spacing:6px;
  color:#fff;
  text-shadow: 0 0 24px rgba(0,229,255,0.9), 0 0 48px rgba(255,45,149,0.7);
}
.levelup-num{
  font-family:'Orbitron', sans-serif;
  font-weight:700;
  font-size: clamp(14px, 3.6vw, 18px);
  letter-spacing:3px;
  color:#7cff5e;
  text-shadow:0 0 14px rgba(124,255,94,0.8);
}

/* ---------- 레인 (클리커 버튼) — 총 6개: A S D / J K L ---------- */
#lanes{
  position:relative; z-index:2;
  display:flex;
  flex-wrap:wrap;
  gap: 5vw 6vw;
  align-items:center;
  justify-content:center;
  align-content:center;
  flex:1;
  width:100%;
  padding: 8px 16px;
}

/* PC(넓은 화면)에서는 한 줄로 배치 */
@media (min-width: 680px){
  #lanes{
    flex-wrap:nowrap;
    gap: 28px;
  }
}

.lane{
  --lane-color: #00e5ff;
  position:relative;
  width: clamp(58px, 20vw, 96px);
  height: clamp(58px, 20vw, 96px);
  flex: 0 0 auto;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,0.06), rgba(255,255,255,0.01) 60%),
    var(--bg-1);
  border: 3px solid rgba(255,255,255,0.10);
  box-shadow: inset 0 0 14px rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
  transition: border-color .12s ease, box-shadow .12s ease, transform .08s ease, opacity .3s ease, filter .3s ease;
  -webkit-appearance:none;
  appearance:none;
}

/* 잠긴 키: 처음부터 보이지만 흐리게 비활성 표시 (해금 전까지 탭 불가) */
.lane.locked{
  opacity:0.32;
  filter: grayscale(0.75);
  pointer-events:none;
  border-color: rgba(255,255,255,0.08);
}
.lock-badge{
  position:absolute;
  top:-8px; right:-4px;
  font-size:13px;
  opacity:0;
  transition: opacity .2s ease;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.8));
}
.lane.locked .lock-badge{ opacity:1; }

/* 예측 효과: 활성화되기 직전, 바깥에서 안으로 좁혀지는 점선 링으로 미리 신호 */
.lane.incoming{
  border-color: rgba(255,255,255,0.3);
}
.lane.incoming::before{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:2px dashed var(--lane-color);
  opacity:0;
  animation: incomingRing 0.45s ease-out forwards;
  pointer-events:none;
}
@keyframes incomingRing{
  0%{ opacity:0; transform:scale(1.6); }
  20%{ opacity:0.85; }
  100%{ opacity:0.9; transform:scale(1.02); }
}

/* 해금되는 순간: 확실하게 인지되는 팝+플래시 애니메이션 */
.lane.unlocked{
  animation: laneUnlock .6s cubic-bezier(.2,.8,.3,1);
}
@keyframes laneUnlock{
  0%{ opacity:0.32; filter:grayscale(0.75); transform:scale(0.85); }
  40%{ opacity:1; filter:grayscale(0); transform:scale(1.35); box-shadow:0 0 10px #fff, 0 0 60px var(--lane-color); }
  100%{ opacity:1; filter:grayscale(0); transform:scale(1); }
}

.lane-core{
  width:34%;
  height:34%;
  border-radius:50%;
  background: rgba(255,255,255,0.08);
  transition: background .12s ease, box-shadow .12s ease, transform .12s ease;
}

.lane-key{
  position:absolute;
  bottom:-22px;
  font-family:'Orbitron', sans-serif;
  font-size:10px;
  letter-spacing:1px;
  color: var(--ink-dim);
}

/* 활성(비트 도달) 상태: 테두리에 빛이 들어옴 */
.lane.active{
  border-color: var(--lane-color);
  box-shadow:
    0 0 16px var(--lane-color),
    0 0 36px var(--lane-color),
    inset 0 0 18px rgba(255,255,255,0.08);
  animation: laneBeat 0.5s ease-in-out;
}
.lane.active .lane-core{
  background: var(--lane-color);
  box-shadow: 0 0 18px var(--lane-color);
  transform: scale(1.15);
}
@keyframes laneBeat{
  0%   { transform: scale(1); }
  30%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}

.lane.hit{
  animation: laneHit .3s ease-out;
}
@keyframes laneHit{
  0%{ box-shadow:0 0 4px #fff, 0 0 50px var(--lane-color); transform:scale(0.9); }
  100%{ box-shadow:0 0 16px var(--lane-color); transform:scale(1); }
}

/* 실제 비트가 정확히 도달하는 순간의 플래시 (사운드와 타이밍을 맞추기 위한 시각 기준) */
.lane.beat-pulse::after{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.9), transparent 70%);
  animation: beatFlash .14s ease-out forwards;
  pointer-events:none;
}
@keyframes beatFlash{
  0%{ opacity:1; transform:scale(0.8); }
  100%{ opacity:0; transform:scale(1.3); }
}

.lane.missed{
  animation: laneMiss .35s ease;
}
@keyframes laneMiss{
  0%{ border-color: var(--danger); box-shadow:0 0 20px var(--danger); }
  100%{ border-color: rgba(255,255,255,0.10); box-shadow:inset 0 0 14px rgba(0,0,0,0.6); }
}

/* ---------- 오버레이 공통 ---------- */
.overlay{
  position:absolute; inset:0;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding: 20px;
  text-align:center;
  background: radial-gradient(60% 50% at 50% 40%, rgba(11,14,31,0.96), rgba(6,7,15,0.98));
  backdrop-filter: blur(2px);
  overflow-y:auto;
}
.overlay.hidden{ display:none; }

.logo{
  font-family:'Orbitron', sans-serif;
  font-weight:900;
  font-size: clamp(30px, 9vw, 50px);
  letter-spacing:3px;
  margin:0;
  color:#fff;
  text-shadow: 0 0 22px rgba(0,229,255,0.55);
}
.logo span{ color:#ff2d95; text-shadow:0 0 22px rgba(255,45,149,0.6); }

.tagline{
  color: var(--ink-dim);
  font-size:15px;
  margin:0 0 4px;
  letter-spacing:0.5px;
}

/* 노래 선택 영역 */
.section-label{
  font-family:'Orbitron', sans-serif;
  font-size:11px;
  letter-spacing:1.5px;
  color:#8b90b3;
}

.preset-picker{
  width:100%;
  max-width:320px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.preset-list{
  width:100%;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:8px;
}
.preset-btn{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:2px;
  background: var(--panel);
  border:1px solid var(--panel-border);
  border-radius:10px;
  padding:9px 12px;
  color:#c9cdea;
  cursor:pointer;
  transition: border-color .15s ease, background .15s ease, transform .1s ease;
}
.preset-btn:active{ transform: scale(0.96); }
.preset-btn.active-preset{
  border-color:#00e5ff;
  background: rgba(0,229,255,0.10);
  box-shadow: 0 0 14px rgba(0,229,255,0.25);
}
.preset-name{
  font-size:13px;
  font-weight:600;
}
.preset-bpm{
  font-family:'Orbitron', sans-serif;
  font-size:10px;
  color: var(--ink-dim);
  letter-spacing:1px;
}
.preset-btn.active-preset .preset-bpm{ color:#00e5ff; }

.preset-btn.upload-btn{
  border-style:dashed;
  border-color: rgba(255,255,255,0.25);
  align-items:center;
  text-align:center;
}
.preset-btn.upload-btn .preset-name{ color:#ff2d95; }
.preset-btn.upload-btn.active-preset{
  border-style:solid;
  border-color:#ff2d95;
  background: rgba(255,45,149,0.10);
  box-shadow: 0 0 14px rgba(255,45,149,0.25);
}
.preset-btn.upload-btn.active-preset .preset-bpm{ color:#ff2d95; }

.hidden-file-input{
  position:absolute;
  width:1px; height:1px;
  opacity:0;
  overflow:hidden;
}
.song-status{
  font-size:12px;
  color: var(--ink-dim);
  margin:0;
  min-height:16px;
  text-align:center;
}
.song-status.ready{ color:#7cff5e; }
.song-status.busy{ color:#ffd400; }
.song-status.error{ color:var(--danger); }

/* 점수표 */
.score-table{
  width:100%;
  max-width:320px;
  background: var(--panel);
  border:1px solid var(--panel-border);
  border-radius:14px;
  padding:12px 16px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.score-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  color:#c9cdea;
}
.score-row .pt{
  font-family:'Orbitron', sans-serif;
  font-size:12px;
  font-weight:700;
}
.pt.perfect{ color:#00e5ff; }
.pt.good{ color:#ffd400; }
.pt.miss{ color: var(--danger); }
.pt.combo{ color:#7cff5e; font-size:11px; }
.combo-row{ border-top:1px dashed rgba(255,255,255,0.12); padding-top:6px; margin-top:2px; }

.howto{
  list-style:none;
  padding:0; margin:0 0 8px;
  display:flex; flex-direction:column; gap:7px;
  font-size:13px;
  color:#c9cdea;
  max-width:320px;
}
.howto li{
  background: var(--panel);
  border:1px solid var(--panel-border);
  border-radius:10px;
  padding:9px 13px;
}
.howto b{ color:#00e5ff; }

.primary-btn{
  font-family:'Orbitron', sans-serif;
  font-weight:700;
  font-size:17px;
  letter-spacing:3px;
  color:#06070f;
  background: linear-gradient(135deg, #00e5ff, #ff2d95);
  border:none;
  border-radius:999px;
  padding:15px 44px;
  cursor:pointer;
  box-shadow: 0 0 28px rgba(0,229,255,0.45);
  transition: transform .12s ease, box-shadow .12s ease, opacity .15s ease;
}
.primary-btn:active{ transform: scale(0.95); box-shadow:0 0 14px rgba(0,229,255,0.4); }
.primary-btn:disabled{
  opacity:0.4;
  cursor:not-allowed;
  box-shadow:none;
}

.secondary-btn{
  font-family:'Orbitron', sans-serif;
  font-weight:600;
  font-size:12px;
  letter-spacing:1.5px;
  color:#8b90b3;
  background: transparent;
  border:1px solid rgba(255,255,255,0.18);
  border-radius:999px;
  padding:8px 20px;
  cursor:pointer;
  transition: color .15s ease, border-color .15s ease, transform .1s ease;
}
.secondary-btn:active{ transform: scale(0.95); color:#00e5ff; border-color:#00e5ff; }

.hint{ font-size:11px; color: var(--ink-dim); max-width:280px; }

.audio-debug{
  font-size:11px;
  font-family:'Orbitron', sans-serif;
  color:#7cff5e;
  min-height:14px;
  margin:0;
}
.audio-debug.error{ color: var(--danger); }

.over-title{
  font-family:'Orbitron', sans-serif;
  font-size:30px;
  letter-spacing:4px;
  color: var(--danger);
  text-shadow:0 0 22px rgba(255,59,92,0.6);
  margin:0 0 4px;
}
.final-score, .final-combo, .final-level{
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.final-stats-row{
  display:flex; gap:28px;
}
#finalScore{
  font-family:'Orbitron', sans-serif;
  font-size:34px; font-weight:900; color:#fff;
}
#maxCombo{
  font-family:'Orbitron', sans-serif;
  font-size:19px; font-weight:700; color:#ffd400;
}
#finalLevel{
  font-family:'Orbitron', sans-serif;
  font-size:19px; font-weight:700; color:#ff2d95;
}

@media (prefers-reduced-motion: reduce){
  .ring.pulse, .lane.active, .lane.hit, .lane.missed, .lane.unlocked, .lane.incoming::before, .life.hit-flash, .judge-popup.show{
    animation: none !important;
  }
}

</style>
</head>
<body>

<div id="app">

  <!-- 배경 링 이펙트 -->
  <div class="bg-rings"></div>

  <!-- 상단 HUD -->
  <header id="hud">
    <div class="hud-block lives-block">
      <span class="hud-label">LIVES</span>
      <div id="lives" class="lives">
        <span class="life"></span>
        <span class="life"></span>
        <span class="life"></span>
        <span class="life"></span>
        <span class="life"></span>
      </div>
    </div>
    <div class="hud-block level-block">
      <span class="hud-label">LEVEL</span>
      <span id="level">01</span>
    </div>
    <div class="hud-block score-block">
      <span class="hud-label">SCORE</span>
      <span id="score">0</span>
    </div>
    <div class="hud-block combo-block">
      <span class="hud-label">COMBO</span>
      <span id="combo">0</span>
    </div>
  </header>

  <!-- 판정 팝업 -->
  <div id="judgePopup" class="judge-popup"></div>

  <!-- 게임 레인 (총 6개: A S D / J K L, 처음부터 모두 보이고 레벨에 따라 순차 활성화) -->
  <main id="lanes">
    <button class="lane locked" data-lane="0" style="--lane-color:#00e5ff;">
      <span class="lock-badge">🔒</span>
      <span class="lane-core"></span><span class="lane-key">A</span>
    </button>
    <button class="lane locked" data-lane="1" style="--lane-color:#ff2d95;">
      <span class="lock-badge">🔒</span>
      <span class="lane-core"></span><span class="lane-key">S</span>
    </button>

  <!-- 레벨업 전용 대형 배너 (판정 팝업과 분리, 화면 전체에 확실하게 표시) -->

        </button>
        <button class="preset-btn" data-preset="1">
          <span class="preset-name">환희의 송가</span><span class="preset-bpm">Beethoven</span>
        </button>
        <button class="preset-btn" data-preset="2">
          <span class="preset-name">미뉴에트 in G</span><span class="preset-bpm">Bach</span>
        </button>
        <button class="preset-btn" data-preset="3">
          <span class="preset-name">카논 in D</span><span class="preset-bpm">Pachelbel</span>
        </button>
        <button class="preset-btn" data-preset="4">
          <span class="preset-name">운명 교향곡</span><span class="preset-bpm">Beethoven</span>
        </button>
        <button class="preset-btn upload-btn" id="uploadPresetBtn" type="button">
          <span class="preset-name">📁 내 파일 업로드</span><span class="preset-bpm">MP3 · 영상</span>
        </button>
      </div>
      <input type="file" id="songInput" accept="audio/*,video/*,.mp3,.wav,.m4a,.ogg,.aac,.mp4,.mov,.webm,.m4v,audio/mpeg,audio/mp3" multiple="false" class="hidden-file-input">
      <p id="songStatus" class="song-status">기본 음악 "엘리제를 위하여"로 진행됩니다</p>

  <!-- 게임 오버 화면 -->
  <section id="overScreen" class="overlay hidden">

<script>
/* ================================
   PULSE TAP — script.js
   - 노래 파일 업로드 → 실제 곡 리듬(비트)에 맞춰 버튼 활성화
   - 곡을 넣지 않으면 기본 신스 비트로 대체 플레이
   - 1~100 레벨: 레벨이 오를수록 클리커 버튼 개수 증가 + 판정 타이밍 촘촘해짐
   ================================ */

(() => {
  "use strict";

  // ---------- DOM ----------
  const laneEls   = Array.from(document.querySelectorAll(".lane"));
  const livesEls  = Array.from(document.querySelectorAll(".life"));
  const scoreEl   = document.getElementById("score");
  const comboEl   = document.getElementById("combo");
  const levelEl   = document.getElementById("level");
  const judgeEl   = document.getElementById("judgePopup");
  const startScr  = document.getElementById("startScreen");
  const overScr   = document.getElementById("overScreen");
  const startBtn  = document.getElementById("startBtn");
  const retryBtn  = document.getElementById("retryBtn");
  const finalScoreEl = document.getElementById("finalScore");
  const maxComboEl   = document.getElementById("maxCombo");
  const finalLevelEl = document.getElementById("finalLevel");
  const bgRings   = document.querySelector(".bg-rings");
  const songInput = document.getElementById("songInput");
  const songStatus = document.getElementById("songStatus");

  // ---------- 난이도 상수 (레벨 1~100) ----------
  const MAX_LEVEL = 100;
  const MAX_LANES = 6; // A S D / J K L
  const MIN_LANES = 3; // 시작은 A S D 만 활성

  function laneCountForLevel(level) {
    // A S D는 처음부터, J는 레벨6, K는 레벨18, L은 레벨35부터 활성화
    if (level >= 35) return 6;
    if (level >= 18) return 5;
    if (level >= 6) return 4;
    return MIN_LANES;
  }
  function levelProgress(level) {
    const p = (level - 1) / (MAX_LEVEL - 1); // 0..1 선형
    return Math.pow(p, 1.7); // 초반은 완만하게, 후반은 급격하게 어려워짐
  }
  function windowHalfForLevel(level) {
    // 판정 구간: 레벨1 0.34s(널널) -> 레벨100 0.13s(빡빡)
    const t = levelProgress(level);
    return 0.34 - 0.21 * t;
  }
  function spawnChanceForLevel(level) {
    // 노트(클리커) 등장 빈도: 레벨1도 80%로 시작 -> 레벨3부터는 항상 100%
    // 전체적으로 공백을 줄이기 위해 시작부터 촘촘하게 등장함
    if (level >= CONTINUOUS_LEVEL) return 1;
    const t = levelProgress(level);
    return 0.8 + 0.2 * t;
  }

  const CONTINUOUS_LEVEL = 3;  // 이 레벨부터 매 비트마다 클리커가 끊김없이 활성화
  const DUAL_NOTE_LEVEL = 20;  // 이 레벨부터 버튼 2개가 동시에 켜질 수 있음

  function dualNoteChanceForLevel(level) {
    if (level < DUAL_NOTE_LEVEL) return 0;
    const p = (level - DUAL_NOTE_LEVEL) / (MAX_LEVEL - DUAL_NOTE_LEVEL);
    return Math.min(0.65, 0.15 + 0.5 * p); // 레벨20: 15% -> 레벨100: 65%
  }

  // 레벨3부터는 판정 구간이 다음 비트까지 이어지도록 최소폭을 보장 (버튼이 계속 켜져있게)
  function effectiveWindowHalf(level, beatInterval) {
    const base = windowHalfForLevel(level);
    if (level >= CONTINUOUS_LEVEL && beatInterval) {
      const gaplessFloor = beatInterval / 2 + 0.05;
      return Math.max(base, gaplessFloor);
    }
    return base;
  }

  // 한 박자(비트) 시점에 노트 1~2개를 생성 (레벨20부터 확률적으로 동시 2개)
  function spawnNotesForBeat(level, hitTime, windowHalf) {
    const chance = spawnChanceForLevel(level);
    if (Math.random() >= chance) return;

    const laneCount = laneCountForLevel(level);
    const lane1 = Math.floor(Math.random() * laneCount);
    notes.push({ lane: lane1, hitTime, windowHalf, judged: false });

    if (laneCount >= 2) {
      const dualChance = dualNoteChanceForLevel(level);
      if (Math.random() < dualChance) {
        let lane2 = Math.floor(Math.random() * laneCount);
        if (lane2 === lane1) lane2 = (lane2 + 1) % laneCount;
        notes.push({ lane: lane2, hitTime, windowHalf, judged: false });
      }
    }
  }
  const SPEED_RAMP_START_LEVEL = 15;
  function speedMultiplierForLevel(level) {
    // 레벨1~15까지는 0.7배로 느리게 유지, 레벨15부터 점차적으로 빨라져서 레벨100엔 1.45배
    if (level <= SPEED_RAMP_START_LEVEL) return 0.7;
    const p = (level - SPEED_RAMP_START_LEVEL) / (MAX_LEVEL - SPEED_RAMP_START_LEVEL);
    const t = Math.pow(p, 1.3); // 초반은 완만하게, 후반은 더 가파르게
    return 0.7 + 0.75 * t;
  }

  // ---------- 기본 비트(곡 미선택 시) 상수 ----------
  const FALLBACK_BPM = 96;
  const LOOKAHEAD_MS = 25;
  const SCHEDULE_AHEAD_SEC = 0.6;

  const PERFECT_RATIO = 0.32; // windowHalf 대비 이 비율 안이면 PERFECT
  const PREVIEW_LEAD_SEC = 0.45; // 활성화되기 이 시간 전부터 "곧 켜짐" 예측 신호 표시

  // ---------- 레벨업 조건: 성공 판정(GOOD/PERFECT) 누적 기반 ----------
  // MISS는 레벨에 영향 없음(생명만 차감) — 잘 맞출수록 레벨이 오름
  const HITS_PER_LEVEL = 4;
  let successfulHits = 0;

  // ---------- 점수 규칙 ----------
  const GOOD_SCORE = 3;
  const PERFECT_SCORE = 5;
  const COMBO_THRESHOLD = 3; // PERFECT 연속 3회부터 콤보 카운트 시작

  // ---------- 기본 제공 음악 5종 (업로드 없이 바로 플레이 가능) ----------
  // 실제 음원 대신 자체 신스로 생성되는 오리지널 루프 (저작권 이슈 없음)
  // 저작권 없는(저작권 만료) 클래식 명곡 5곡 — 실제 녹음이 아닌, 유명 멜로디를 자체 신스로 연주
  const PRESET_SONGS = [
    { name: "엘리제를 위하여", bpm: 100, wave: "sine",
      scale: [659.25, 622.25, 659.25, 622.25, 659.25, 493.88, 587.33, 523.25, 440.00,
              261.63, 329.63, 440.00, 493.88, 329.63, 415.30, 493.88, 523.25] }, // Beethoven
    { name: "환희의 송가", bpm: 120, wave: "square",
      scale: [329.63, 329.63, 349.23, 392.00, 392.00, 349.23, 329.63, 293.66,
              261.63, 261.63, 293.66, 329.63, 329.63, 293.66, 293.66] }, // Beethoven 9번 교향곡
    { name: "미뉴에트 in G", bpm: 92, wave: "triangle",
      scale: [587.33, 392.00, 440.00, 493.88, 523.25, 587.33, 392.00, 392.00,
              392.00, 369.99, 329.63, 293.66, 261.63, 246.94, 220.00, 196.00] }, // Bach(Petzold)
    { name: "카논 in D", bpm: 108, wave: "triangle",
      scale: [293.66, 220.00, 246.94, 185.00, 196.00, 146.83, 196.00, 220.00] }, // Pachelbel
    { name: "운명 교향곡", bpm: 150, wave: "sawtooth",
      scale: [392.00, 392.00, 392.00, 311.13, 349.23, 349.23, 349.23, 293.66] }, // Beethoven 5번 교향곡
  ];
  let selectedPresetIndex = 0;
  let baseBeatSec = 60 / PRESET_SONGS[0].bpm;

  // ---------- 상태 ----------
  let audioCtx = null;
  let running = false;

  // 기본 비트 모드 스케줄러 상태
  let nextBeatTime = 0;
  let beatCount = 0;
  let schedulerTimer = null;

  let rafId = null;
  let notes = [];        // { lane, hitTime, windowHalf, level, judged }
  let lives = 5;
  let score = 0;
  let combo = 0;          // COMBO_THRESHOLD 이상 연속 PERFECT일 때만 0보다 큼
  let perfectStreak = 0;  // 연속 PERFECT 횟수 (GOOD/MISS 시 초기화)
  let maxCombo = 0;
  let currentLevel = 1;
  let visibleLaneCount = MIN_LANES;

  // 곡 관련
  let songBuffer = null;     // 디코딩된 AudioBuffer
  let songBeatTimes = null;  // 감지된 비트 시간(초, 버퍼 기준)
  let songSource = null;     // 현재 재생 중인 AudioBufferSourceNode
  let songStartTimeRef = 0;  // 곡 재생이 시작된 절대 audioCtx 시간
  let songNextBeatIndex = 0; // 다음에 스케줄링할 비트 인덱스
  let songGain = null;
  let usingSong = false;
  let analyzing = false;

  // ================================================================
  //  오디오 신스 (효과음 / 기본 비트용)
  // ================================================================
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
      return audioCtx.resume().catch(() => {});
    }
    return Promise.resolve();
  }

  function playTestTone() {
    const dbg = document.getElementById("audioDebug");
    try {
      if (!(window.AudioContext || window.webkitAudioContext)) {
        if (dbg) { dbg.textContent = "이 브라우저는 Web Audio를 지원하지 않습니다."; dbg.classList.add("error"); }
        return;
      }
      ensureAudio().then(() => {
        if (dbg) {
          dbg.classList.remove("error");
          dbg.textContent = "오디오 상태: " + audioCtx.state + " — 소리가 재생되었어야 해요";
        }
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.32);
      }).catch((err) => {
        if (dbg) { dbg.textContent = "오디오 재개 실패: " + err; dbg.classList.add("error"); }
      });
    } catch (err) {
      if (dbg) { dbg.textContent = "오디오 오류: " + err; dbg.classList.add("error"); }
    }
  }

  function playKick(time) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(120, time);
    osc.frequency.exponentialRampToValueAtTime(38, time + 0.12);
    gain.gain.setValueAtTime(0.9, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + 0.2);
  }

  function playHat(time) {
    const bufferSize = audioCtx.sampleRate * 0.03;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const hp = audioCtx.createBiquadFilter();
    hp.type = "highpass";
    hp.frequency.value = 6000;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
    src.connect(hp).connect(gain).connect(audioCtx.destination);
    src.start(time);
  }

  function playMelodyNote(freq, time, wave) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = wave || "triangle";
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.16, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + 0.36);
  }

  function playMissTone(time) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(160, time);
    osc.frequency.exponentialRampToValueAtTime(60, time + 0.25);
    gain.gain.setValueAtTime(0.28, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.28);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + 0.3);
  }

  // ================================================================
  //  간단한 비트(온셋) 감지 — 저역 에너지 기반 적응형 임계값 방식
  // ================================================================
  function detectBeats(buffer) {
    const sampleRate = buffer.sampleRate;
    const length = buffer.length;
    const channels = buffer.numberOfChannels;

    // 모노 다운믹스
    const mono = new Float32Array(length);
    for (let c = 0; c < channels; c++) {
      const chan = buffer.getChannelData(c);
      for (let i = 0; i < length; i++) mono[i] += chan[i] / channels;
    }

    const windowSize = Math.max(1, Math.floor(sampleRate * 0.05)); // 50ms 창
    const numWindows = Math.floor(length / windowSize);
    if (numWindows < 4) return [];

    const energies = new Float32Array(numWindows);
    for (let w = 0; w < numWindows; w++) {
      let sum = 0;
      const start = w * windowSize;
      const end = start + windowSize;
      for (let i = start; i < end; i++) {
        const s = mono[i];
        sum += s * s;
      }
      energies[w] = sum;
    }

    let maxEnergy = 0;
    for (let w = 0; w < numWindows; w++) if (energies[w] > maxEnergy) maxEnergy = energies[w];
    if (maxEnergy <= 0) return [];
    const floorThreshold = maxEnergy * 0.015;

    const historyWindows = 43;       // 약 2.15초 이력
    const minGapWindows = 5;         // 최소 250ms 간격
    let lastBeatWindow = -minGapWindows;
    const beatTimes = [];

    let histSum = 0;
    for (let w = 0; w < numWindows; w++) {
      const histStart = Math.max(0, w - historyWindows);
      if (w > 0) {
        histSum += energies[w - 1];
        if (w - historyWindows - 1 >= 0) histSum -= energies[w - historyWindows - 1];
      }
      const histCount = w - histStart;
      const avg = histCount > 0 ? histSum / histCount : 0;

      const isPeak = energies[w] > avg * 1.35 && energies[w] > floorThreshold;
      if (isPeak && (w - lastBeatWindow) >= minGapWindows) {
        beatTimes.push(w * windowSize / sampleRate);
        lastBeatWindow = w;
      }
    }
    return beatTimes;
  }

  function buildFallbackGrid(duration, bpm) {
    const beatSec = 60 / bpm;
    const times = [];
    for (let t = 1.0; t < duration - 0.2; t += beatSec) times.push(t);
    return times;
  }

  // ================================================================
  //  파일 업로드 → 디코딩 → 비트 분석
  // ================================================================
  songInput.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    ensureAudio();
    analyzing = true;
    startBtn.disabled = true;
    setSongStatus(`"${file.name}" 분석 중...`, "busy");

    try {
      const arrayBuffer = await file.arrayBuffer();
      // 살짝 지연을 줘서 "분석 중" 문구가 먼저 화면에 그려지게 함
      await new Promise(r => setTimeout(r, 30));
      const decoded = await decodeAudioDataCompat(arrayBuffer);

      let beats = detectBeats(decoded);
      if (beats.length < 8) {
        // 감지 실패 시 균등 그리드로 대체
        beats = buildFallbackGrid(decoded.duration, FALLBACK_BPM);
      }

      songBuffer = decoded;
      songBeatTimes = beats;
      usingSong = true;
      clearPresetActiveStates();
      const uploadBtn = document.getElementById("uploadPresetBtn");
      if (uploadBtn) uploadBtn.classList.add("active-preset");
      setSongStatus(`"${file.name}" 분석 완료 — 비트 ${beats.length}개 감지됨 · ${decoded.duration.toFixed(0)}초`, "ready");
    } catch (err) {
      songBuffer = null;
      songBeatTimes = null;
      usingSong = false;
      const isVideo = file.type.startsWith("video/") || /\.(mp4|mov|webm|m4v|mkv)$/i.test(file.name);
      const msg = isVideo
        ? "이 영상의 오디오 코덱을 읽지 못했어요. 다른 영상이나 mp3 파일로 시도해보세요 — 기본 비트로 진행됩니다"
        : "분석 실패 — 기본 비트로 진행됩니다";
      setSongStatus(msg, "error");
    } finally {
      analyzing = false;
      startBtn.disabled = false;
    }
  });

  // 구형 Safari 등 콜백 기반 decodeAudioData만 지원하는 브라우저까지 호환
  function decodeAudioDataCompat(arrayBuffer) {
    return new Promise((resolve, reject) => {
      const maybePromise = audioCtx.decodeAudioData(
        arrayBuffer,
        (buf) => resolve(buf),
        (err) => reject(err || new Error("decodeAudioData failed"))
      );
      if (maybePromise && typeof maybePromise.then === "function") {
        maybePromise.then(resolve, reject);
      }
    });
  }

  function setSongStatus(text, cls) {
    songStatus.textContent = text;
    songStatus.className = "song-status " + (cls || "");
  }

  // ================================================================
  //  레인(버튼) 해금 처리
  // ================================================================
  function revealLanesUpTo(count) {
    if (count <= visibleLaneCount) return;
    for (let i = visibleLaneCount; i < count; i++) {
      const el = laneEls[i];
      if (!el) continue;
      el.classList.remove("locked");
      el.classList.add("unlocked");
      spawnRing();
      setTimeout(() => el.classList.remove("unlocked"), 620);
    }
    visibleLaneCount = count;
  }

  function setLevel(level) {
    if (level === currentLevel && level !== 1) return;
    const isIncrease = level > currentLevel;
    currentLevel = level;
    levelEl.textContent = String(currentLevel).padStart(2, "0");

    if (isIncrease) {
      pulseLevelHud();
      triggerLevelUpBanner(currentLevel);
      const newLaneCount = laneCountForLevel(currentLevel);
      if (newLaneCount > visibleLaneCount) revealLanesUpTo(newLaneCount);
    }
  }

  function pulseLevelHud() {
    levelEl.classList.remove("level-pulse");
    void levelEl.offsetWidth;
    levelEl.classList.add("level-pulse");
  }

  let levelUpBannerTimer = null;
  function triggerLevelUpBanner(level) {
    const banner = document.getElementById("levelUpBanner");
    const num = document.getElementById("levelUpNum");
    if (!banner || !num) return;
    num.textContent = "LV." + String(level).padStart(2, "0");
    banner.classList.remove("show");
    void banner.offsetWidth;
    banner.classList.add("show");
    clearTimeout(levelUpBannerTimer);
    levelUpBannerTimer = setTimeout(() => banner.classList.remove("show"), 1000);
  }

  // ================================================================
  //  라이브 스케줄러 — 프리셋/기본 음악 & 업로드 곡 공통
  //  난이도(레인 수·판정폭·템포·등장확률)는 항상 "현재 레벨"을 기준으로 실시간 계산
  //  → 레벨은 시간이 아니라 성공 판정 누적으로만 올라가므로, 잘할수록 난이도가 빨리 올라감
  // ================================================================
  function scheduler() {
    if (usingSong) {
      schedulerSong();
    } else {
      schedulerPreset();
    }
    schedulerTimer = setTimeout(scheduler, LOOKAHEAD_MS);
  }

  function schedulerSong() {
    while (songNextBeatIndex < songBeatTimes.length) {
      const absTime = songStartTimeRef + songBeatTimes[songNextBeatIndex];
      if (absTime >= audioCtx.currentTime + SCHEDULE_AHEAD_SEC) break;

      const level = currentLevel;
      const nextBeatTimeInSong = songBeatTimes[songNextBeatIndex + 1];
      const beatInterval = nextBeatTimeInSong != null
        ? nextBeatTimeInSong - songBeatTimes[songNextBeatIndex]
        : 0.5;
      const windowHalf = effectiveWindowHalf(level, beatInterval);
      spawnNotesForBeat(level, absTime, windowHalf);

      songNextBeatIndex++;
    }
  }

  function schedulerPreset() {
    const preset = PRESET_SONGS[selectedPresetIndex];
    while (nextBeatTime < audioCtx.currentTime + SCHEDULE_AHEAD_SEC) {
      const level = currentLevel;
      const beatSec = baseBeatSec / speedMultiplierForLevel(level);

      playKick(nextBeatTime);
      if (beatCount % 2 === 1) playHat(nextBeatTime + beatSec / 2);
      playMelodyNote(preset.scale[beatCount % preset.scale.length], nextBeatTime, preset.wave);

      const windowHalf = effectiveWindowHalf(level, beatSec);
      spawnNotesForBeat(level, nextBeatTime, windowHalf);

      beatCount++;
      nextBeatTime += beatSec;
    }
  }


  // ================================================================
  //  비주얼 루프 (rAF) — 오디오 시간 기준으로 레인 활성/미스 판정
  // ================================================================
  function visualLoop() {
    if (!running) return;
    const now = audioCtx.currentTime;

    for (const note of notes) {
      const activeStart = note.hitTime - note.windowHalf;
      const activeEnd   = note.hitTime + note.windowHalf;
      const laneEl = laneEls[note.lane];
      if (!laneEl) continue;

      // 예측 효과: 활성화되기 PREVIEW_LEAD_SEC 전부터 옅게 신호를 줌
      if (!note.judged && now < activeStart && activeStart - now <= PREVIEW_LEAD_SEC) {
        if (!laneEl.classList.contains("incoming") && !laneEl.classList.contains("active")) {
          laneEl.classList.add("incoming");
          laneEl.dataset.incomingNoteTime = note.hitTime;
        }
      }

      if (!note.judged && now >= activeStart && now <= activeEnd) {
        if (laneEl.dataset.incomingNoteTime == note.hitTime) {
          laneEl.classList.remove("incoming");
        }
        if (!laneEl.classList.contains("active")) {
          laneEl.classList.add("active");
          laneEl.dataset.activeNoteTime = note.hitTime;
          spawnRing();
        }
        if (!note.peaked && now >= note.hitTime) {
          note.peaked = true;
          laneEl.classList.add("beat-pulse");
          setTimeout(() => laneEl.classList.remove("beat-pulse"), 140);
        }
      } else if (!note.judged && now > activeEnd) {
        note.judged = true;
        laneEl.classList.remove("active");
        if (laneEl.dataset.incomingNoteTime == note.hitTime) {
          laneEl.classList.remove("incoming");
        }
        registerMiss(note.lane);
      }

      if (note.judged && laneEl.dataset.activeNoteTime == note.hitTime) {
        laneEl.classList.remove("active");
      }
    }

    notes = notes.filter(n => audioCtx.currentTime - n.hitTime < 2);

    // 곡 모드에서 노트가 모두 소진되고 재생도 끝났으면 클리어 처리
    if (usingSong && running && notes.length === 0 && songSource && songSource._ended) {
      finishSongClear();
      return;
    }

    rafId = requestAnimationFrame(visualLoop);
  }

  function spawnRing() {
    const ring = document.createElement("div");
    ring.className = "ring pulse";
    bgRings.appendChild(ring);
    setTimeout(() => ring.remove(), 1050);
  }

  // ================================================================
  //  입력 처리
  // ================================================================
  function handleLaneInput(laneIdx) {
    if (!running) return;
    ensureAudio();

    const now = audioCtx.currentTime;
    const laneEl = laneEls[laneIdx];
    if (!laneEl || laneEl.classList.contains("locked")) return;

    let target = null;
    for (const note of notes) {
      if (note.judged || note.lane !== laneIdx) continue;
      const activeStart = note.hitTime - note.windowHalf;
      const activeEnd   = note.hitTime + note.windowHalf;
      if (now >= activeStart && now <= activeEnd) { target = note; break; }
    }

    if (!target) return;

    target.judged = true;
    laneEl.classList.remove("active");
    laneEl.classList.add("hit");
    setTimeout(() => laneEl.classList.remove("hit"), 300);

    const diff = Math.abs(now - target.hitTime);
    const isPerfect = diff <= target.windowHalf * PERFECT_RATIO;

    vibrate(isPerfect ? [15] : [10]);

    if (isPerfect) {
      perfectStreak++;
      if (perfectStreak >= COMBO_THRESHOLD) {
        combo = perfectStreak;
        score += PERFECT_SCORE * combo;
        maxCombo = Math.max(maxCombo, combo);
        showJudge(`PERFECT ×${combo}`, "combo");
      } else {
        combo = 0;
        score += PERFECT_SCORE;
        showJudge("PERFECT", "perfect");
      }
    } else {
      perfectStreak = 0;
      combo = 0;
      score += GOOD_SCORE;
      showJudge("GOOD", "good");
    }

    registerSuccessfulHit();

    updateHud();
  }

  function registerSuccessfulHit() {
    successfulHits++;
    const newLevel = Math.min(MAX_LEVEL, 1 + Math.floor(successfulHits / HITS_PER_LEVEL));
    if (newLevel > currentLevel) setLevel(newLevel);
  }

  function registerMiss(laneIdx) {
    perfectStreak = 0;
    combo = 0;
    lives = Math.max(0, lives - 1);
    updateHud();
    updateLives();
    showJudge("MISS", "miss");
    playMissTone(audioCtx.currentTime);
    vibrate([40, 30, 40]);

    const laneEl = laneEls[laneIdx];
    laneEl.classList.add("missed");
    setTimeout(() => laneEl.classList.remove("missed"), 350);

    if (lives <= 0) endGame(false);
  }

  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  function showJudge(text, cls) {
    judgeEl.textContent = text;
    judgeEl.className = "judge-popup " + cls;
    void judgeEl.offsetWidth;
    judgeEl.classList.add("show");
  }

  function updateHud() {
    scoreEl.textContent = score;
    comboEl.textContent = combo;
  }

  function updateLives() {
    livesEls.forEach((el, i) => {
      el.classList.toggle("lost", i >= lives);
    });
    const lostIdx = lives;
    if (livesEls[lostIdx]) {
      livesEls[lostIdx].classList.add("hit-flash");
      setTimeout(() => livesEls[lostIdx].classList.remove("hit-flash"), 400);
    }
  }

  // ================================================================
  //  게임 흐름 제어
  // ================================================================
  async function startGame() {
    if (analyzing) return;
    await ensureAudio();
    stopSongSource();
    resetState();
    startScr.classList.add("hidden");
    overScr.classList.add("hidden");
    running = true;

    if (usingSong && songBuffer && songBeatTimes && songBeatTimes.length > 0) {
      songStartTimeRef = audioCtx.currentTime + 0.8;
      songNextBeatIndex = 0;

      songSource = audioCtx.createBufferSource();
      songSource.buffer = songBuffer;
      songGain = audioCtx.createGain();
      songGain.gain.value = 0.8;
      songSource.connect(songGain).connect(audioCtx.destination);
      songSource._ended = false;
      songSource.onended = () => { songSource._ended = true; };
      songSource.start(songStartTimeRef);
      scheduler();
    } else {
      baseBeatSec = 60 / PRESET_SONGS[selectedPresetIndex].bpm;
      nextBeatTime = audioCtx.currentTime + 0.8;
      beatCount = 0;
      scheduler();
    }

    rafId = requestAnimationFrame(visualLoop);
  }

  function stopSongSource() {
    if (songSource) {
      try { songSource.onended = null; songSource.stop(); } catch (e) { /* already stopped */ }
      songSource = null;
    }
    clearTimeout(schedulerTimer);
  }

  function finishSongClear() {
    endGame(true);
  }

  function endGame(cleared) {
    running = false;
    clearTimeout(schedulerTimer);
    cancelAnimationFrame(rafId);
    stopSongSource();
    laneEls.forEach(el => el.classList.remove("active", "hit", "missed"));

    finalScoreEl.textContent = score;
    maxComboEl.textContent = maxCombo;
    finalLevelEl.textContent = String(currentLevel).padStart(2, "0");
    document.querySelector(".over-title").textContent = cleared ? "SONG CLEAR!" : "GAME OVER";
    overScr.classList.remove("hidden");
  }

  function resetState() {
    notes = [];
    lives = 5;
    score = 0;
    combo = 0;
    perfectStreak = 0;
    maxCombo = 0;
    currentLevel = 1;
    beatCount = 0;
    successfulHits = 0;
    songNextBeatIndex = 0;

    levelEl.textContent = "01";
    updateHud();
    livesEls.forEach(el => el.classList.remove("lost", "hit-flash"));
    const banner = document.getElementById("levelUpBanner");
    if (banner) banner.classList.remove("show");
    clearTimeout(levelUpBannerTimer);
    laneEls.forEach((el, i) => {
      el.classList.remove("active", "hit", "missed", "unlocked", "incoming");
      if (i < MIN_LANES) el.classList.remove("locked");
      else el.classList.add("locked");
    });
    visibleLaneCount = MIN_LANES;
  }

  // ================================================================
  //  이벤트 바인딩
  // ================================================================
  laneEls.forEach(el => {
    const laneIdx = Number(el.dataset.lane);
    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      handleLaneInput(laneIdx);
    });
  });

  window.addEventListener("keydown", (e) => {
    const map = { a:0, s:1, d:2, j:3, k:4, l:5 };
    const k = e.key.toLowerCase();
    if (k in map && running) handleLaneInput(map[k]);
  });

  startBtn.addEventListener("click", startGame);
  retryBtn.addEventListener("click", startGame);

  const testSoundBtn = document.getElementById("testSoundBtn");
  if (testSoundBtn) testSoundBtn.addEventListener("click", playTestTone);

  const presetBtns = Array.from(document.querySelectorAll(".preset-btn[data-preset]"));
  const uploadPresetBtn = document.getElementById("uploadPresetBtn");

  function clearPresetActiveStates() {
    presetBtns.forEach(b => b.classList.remove("active-preset"));
    if (uploadPresetBtn) uploadPresetBtn.classList.remove("active-preset");
  }

  presetBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      selectedPresetIndex = Number(btn.dataset.preset);
      usingSong = false; // 프리셋 선택 시 업로드된 곡 대신 프리셋 사용
      clearPresetActiveStates();
      btn.classList.add("active-preset");
      setSongStatus(`기본 음악 "${PRESET_SONGS[selectedPresetIndex].name}"로 진행됩니다`, "");
    });
  });

  if (uploadPresetBtn) {
    uploadPresetBtn.addEventListener("click", () => {
      songInput.click(); // 실제 활성화 표시는 분석 성공 시 change 핸들러에서 처리
    });
  }

  // 초기 레인 상태: 3개만 보이도록
  laneEls.forEach((el, i) => {
    if (i >= MIN_LANES) el.classList.add("locked");
  });

})();

</script>
</body>
</html>
