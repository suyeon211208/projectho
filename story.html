\n - 블록의 낙하 목표 지점은 매 프레임 버튼의 실제 위치(offsetTop/높이)로 동적 계산 → 버튼 위치·크기가 바뀌어도 항상 정확히 겹쳐서 도착 (박자 어긋남 방지)
<storong>레인 구성 & 난이도 진행</strong>
\n - A·S·D 3개 레인으로 시작, 레벨 6에서 J, 레벨 18에서 K, 레벨 35에서 L이 순차적으로 열려 최대 6레인까지 확장

\n - 블록 낙하 시간 1.1초, 레벨이 오를수록 점점 빨라짐(스피드 램프)

\n - 목숨(하트) 5개 보유, MISS 시 차감되며 0이 되면 게임오버 / 곡이 끝나면 클리어 처리
