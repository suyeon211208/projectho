            data-title="체험 중심 AI 교육의 한계" 
            data-date="2026.07.07" 
            data-content='
            [{"type": "text", "value": "AI 교육이 학교와 다양한 교육 현장에 빠르게 들어오면서 가장 흔하게 볼 수 있는 방식 중 하나는 이른바 “한번 써보는 수업”이다. 생성형 AI에게 질문을 던져 답을 받아보고, 이미지를 만들어보고, 간단한 기능을 체험해보는 형태의 수업은 분명 학생들의 관심을 끌기 쉽다. 처음 AI를 접하는 학생들에게는 특히 효과적이다. 눈앞에서 결과가 즉각적으로 나타나고, 복잡한 설명 없이도 신기함을 경험할 수 있기 때문이다. 그래서 많은 수업이 이 체험의 순간에 집중한다. 학생들은 재미를 느끼고, 교사는 새로운 기술을 소개했다는 성취를 얻으며, 수업은 비교적 짧은 시간 안에 눈에 보이는 반응을 만들어낸다.
\n하지만 문제는 바로 그다음에 드러난다. 수업이 끝난 뒤 학생들에게 무엇이 남았는지를 돌아보면, 생각보다 오래 지속되는 것이 많지 않다. 그날의 흥미로운 경험은 기억에 남을 수 있지만, 그것이 곧 역량으로 이어지지는 않는다. 한 번 질문을 입력해보고 결과를 확인하는 경험만으로는, 왜 그런 결과가 나왔는지, 원하는 결과를 얻기 위해 무엇을 조정해야 하는지, 그 도구를 자신의 생각과 목적에 맞게 어떻게 활용할 수 있는지를 배우기 어렵다. 체험은 가능하지만 축적은 일어나지 않는 것이다. 재미는 있었지만, 다음에 혼자 다시 해보라고 하면 막막해지는 이유가 여기에 있다.
\n이러한 수업이 오래 남지 않는 가장 큰 이유는 학생이 수업의 주체가 아니라 경험의 소비자에 머무르기 쉽기 때문이다. 많은 체험형 수업에서는 이미 준비된 도구와 예시가 제시되고, 학생은 그것을 따라 해보는 방식으로 참여한다. 물론 처음에는 이런 접근이 필요할 수 있다. 그러나 계속해서 같은 방식이 반복되면 학생은 AI를 스스로 탐색하고 활용하는 사람이 아니라, 보여주는 기능을 잠깐 구경하는 사람으로 남게 된다. 수업의 중심이 학생의 질문이나 아이디어가 아니라 도구의 기능 시연에 맞추어져 있기 때문에, 학생은 자신의 필요와 목적 속에서 AI를 이해하기보다 “이런 것도 되는구나” 수준에서 멈추기 쉽다.
\n또한 “한번 써보는 수업”은 결과를 빠르게 보여주는 데 유리한 반면, 사고의 과정을 충분히 다루지 못한다. 학생이 어떤 생각을 가지고 있었는지, 왜 그런 요청을 했는지, 결과를 보고 무엇을 수정해야 하는지, 그 결과가 적절한지 아닌지를 어떻게 판단할지와 같은 과정은 대개 짧게 지나가거나 생략된다. 하지만 실제로 AI를 제대로 활용하는 힘은 바로 이 과정에서 길러진다. 질문을 만드는 힘, 맥락을 설명하는 힘, 결과를 해석하는 힘, 다시 다듬는 힘은 단순한 체험으로는 얻어지지 않는다. 몇 번 눌러보고 결과를 확인하는 것으로는 익숙해질 수는 있어도, 깊어지기는 어렵다.
\n더 큰 문제는 이런 수업이 학생들에게 AI에 대한 왜곡된 인식을 심어줄 수 있다는 점이다. AI는 무엇이든 빠르게 대신해주는 편리한 도구라는 인상만 남게 되면, 학생들은 자신이 직접 생각하고 구성하는 과정의 중요성을 놓치기 쉽다. 반대로 결과가 기대에 미치지 못했을 때는 “별로 쓸모없다”는 판단으로 쉽게 돌아설 수도 있다. 둘 다 위험하다. AI를 과신하는 태도도, 단편적 경험만으로 무가치하다고 판단하는 태도도 모두 피상적인 이해에서 비롯된다. 체험만으로는 AI의 가능성과 한계를 균형 있게 이해하기 어렵기 때문이다.
\n무엇보다 교육이 지향해야 하는 것은 일회성 반응이 아니라 지속 가능한 활용 능력이다. 학생이 수업 시간에 잠깐 흥미를 느끼는 것보다 더 중요한 것은, 이후에도 자신의 필요에 따라 AI를 불러와 쓰고, 원하는 방향으로 수정하고, 비판적으로 점검하며, 자신의 작업에 자연스럽게 연결할 수 있는가이다. 그러려면 수업은 단순한 사용 경험을 넘어서 학생의 생각과 목적을 중심에 두어야 한다. “이 도구를 써봤다”가 아니라 “이 도구를 활용해 내 생각을 더 분명하게 만들었다”는 경험이 남아야 한다. 그래야 그 수업은 한 번의 이벤트가 아니라 다음 활동으로 이어지는 학습이 된다.
\n결국 “한번 써보는 수업”이 오래 남지 않는 이유는, 그것이 기술의 표면은 보여주지만 활용의 구조까지 가르치지는 못하기 때문이다. 학생에게 필요한 것은 놀라운 결과를 한 번 보는 경험이 아니라, 자신의 아이디어를 바탕으로 AI를 반복적으로 조정하고 해석하며 활용하는 힘이다. 교육은 신기함을 제공하는 데서 멈추지 않고, 그 신기함이 사고와 표현의 능력으로 이어지도록 설계되어야 한다. AI 교육이 진정으로 학생 안에 남으려면, 체험의 순간보다 그 이후의 사용 가능성을 남겨야 한다. 그리고 바로 그 지점에서 우리는 체험 중심 수업의 한계를 넘는 새로운 방향을 고민해야 한다.
"},
