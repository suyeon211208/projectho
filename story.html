            data-content='
            [{"type": "text", "value": "AI 교육이 학교와 다양한 교육 현장에 빠르게 들어오면서 가장 흔하게 볼 수 있는 방식 중 하나는 이른바 “한번 써보는 수업”이다. 생성형 AI에게 질문을 던져 답을 받아보고, 이미지를 만들어보고, 간단한 기능을 체험해보는 형태의 수업은 분명 학생들의 관심을 끌기 쉽다. 처음 AI를 접하는 학생들에게는 특히 효과적이다. 눈앞에서 결과가 즉각적으로 나타나고, 복잡한 설명 없이도 신기함을 경험할 수 있기 때문이다. 그래서 많은 수업이 이 체험의 순간에 집중한다. 학생들은 재미를 느끼고, 교사는 새로운 기술을 소개했다는 성취를 얻으며, 수업은 비교적 짧은 시간 안에 눈에 보이는 반응을 만들어낸다.
하지만 문제는 바로 그다음에 드러난다. 수업이 끝난 뒤 학생들에게 무엇이 남았는지를 돌아보면, 생각보다 오래 지속되는 것이 많지 않다. 그날의 흥미로운 경험은 기억에 남을 수 있지만, 그것이 곧 역량으로 이어지지는 않는다. 한 번 질문을 입력해보고 결과를 확인하는 경험만으로는, 왜 그런 결과가 나왔는지, 원하는 결과를 얻기 위해 무엇을 조정해야 하는지, 그 도구를 자신의 생각과 목적에 맞게 어떻게 활용할 수 있는지를 배우기 어렵다. 체험은 가능하지만 축적은 일어나지 않는 것이다. 재미는 있었지만, 다음에 혼자 다시 해보라고 하면 막막해지는 이유가 여기에 있다.
이러한 수업이 오래 남지 않는 가장 큰 이유는 학생이 수업의 주체가 아니라 경험의 소비자에 머무르기 쉽기 때문이다. 많은 체험형 수업에서는 이미 준비된 도구와 예시가 제시되고, 학생은 그것을 따라 해보는 방식으로 참여한다. 물론 처음에는 이런 접근이 필요할 수 있다. 그러나 계속해서 같은 방식이 반복되면 학생은 AI를 스스로 탐색하고 활용하는 사람이 아니라, 보여주는 기능을 잠깐 구경하는 사람으로 남게 된다. 수업의 중심이 학생의 질문이나 아이디어가 아니라 도구의 기능 시연에 맞추어져 있기 때문에, 학생은 자신의 필요와 목적 속에서 AI를 이해하기보다 “이런 것도 되는구나” 수준에서 멈추기 쉽다.
또한 “한번 써보는 수업”은 결과를 빠르게 보여주는 데 유리한 반면, 사고의 과정을 충분히 다루지 못한다. 학생이 어떤 생각을 가지고 있었는지, 왜 그런 요청을 했는지, 결과를 보고 무엇을 수정해야 하는지, 그 결과가 적절한지 아닌지를 어떻게 판단할지와 같은 과정은 대개 짧게 지나가거나 생략된다. 하지만 실제로 AI를 제대로 활용하는 힘은 바로 이 과정에서 길러진다. 질문을 만드는 힘, 맥락을 설명하는 힘, 결과를 해석하는 힘, 다시 다듬는 힘은 단순한 체험으로는 얻어지지 않는다. 몇 번 눌러보고 결과를 확인하는 것으로는 익숙해질 수는 있어도, 깊어지기는 어렵다.
더 큰 문제는 이런 수업이 학생들에게 AI에 대한 왜곡된 인식을 심어줄 수 있다는 점이다. AI는 무엇이든 빠르게 대신해주는 편리한 도구라는 인상만 남게 되면, 학생들은 자신이 직접 생각하고 구성하는 과정의 중요성을 놓치기 쉽다. 반대로 결과가 기대에 미치지 못했을 때는 “별로 쓸모없다”는 판단으로 쉽게 돌아설 수도 있다. 둘 다 위험하다. AI를 과신하는 태도도, 단편적 경험만으로 무가치하다고 판단하는 태도도 모두 피상적인 이해에서 비롯된다. 체험만으로는 AI의 가능성과 한계를 균형 있게 이해하기 어렵기 때문이다.
무엇보다 교육이 지향해야 하는 것은 일회성 반응이 아니라 지속 가능한 활용 능력이다. 학생이 수업 시간에 잠깐 흥미를 느끼는 것보다 더 중요한 것은, 이후에도 자신의 필요에 따라 AI를 불러와 쓰고, 원하는 방향으로 수정하고, 비판적으로 점검하며, 자신의 작업에 자연스럽게 연결할 수 있는가이다. 그러려면 수업은 단순한 사용 경험을 넘어서 학생의 생각과 목적을 중심에 두어야 한다. “이 도구를 써봤다”가 아니라 “이 도구를 활용해 내 생각을 더 분명하게 만들었다”는 경험이 남아야 한다. 그래야 그 수업은 한 번의 이벤트가 아니라 다음 활동으로 이어지는 학습이 된다.
결국 “한번 써보는 수업”이 오래 남지 않는 이유는, 그것이 기술의 표면은 보여주지만 활용의 구조까지 가르치지는 못하기 때문이다. 학생에게 필요한 것은 놀라운 결과를 한 번 보는 경험이 아니라, 자신의 아이디어를 바탕으로 AI를 반복적으로 조정하고 해석하며 활용하는 힘이다. 교육은 신기함을 제공하는 데서 멈추지 않고, 그 신기함이 사고와 표현의 능력으로 이어지도록 설계되어야 한다. AI 교육이 진정으로 학생 안에 남으려면, 체험의 순간보다 그 이후의 사용 가능성을 남겨야 한다. 그리고 바로 그 지점에서 우리는 체험 중심 수업의 한계를 넘는 새로운 방향을 고민해야 한다.

               {"type": "text", "value": "AI를 처음 접하는 수업에서 학생들이 보이는 반응은 대체로 비슷하다. 질문을 입력하자 곧바로 답이 나오고, 몇 개의 문장을 적었을 뿐인데 그림이 생성되며, 짧은 명령만으로도 예상보다 정교한 결과물이 등장하는 순간 학생들은 쉽게 놀란다. 이러한 놀라움은 분명 교육적으로 의미가 있다. 새로운 도구에 대한 흥미를 불러일으키고, 기술에 대한 심리적 거리감을 줄이며, 학습의 시작점에 에너지를 만들어주기 때문이다. 문제는 이 신기함이 곧바로 실력으로 이어지지는 않는다는 데 있다. 오히려 많은 경우 학생들은 재미있었다는 감각만 남긴 채, 실제로 무엇을 배웠는지는 분명히 설명하지 못한다.
그 이유는 간단하다. 신기함은 대개 결과에서 오지만, 실력은 과정에서 쌓이기 때문이다. 학생들은 AI가 만들어낸 결과를 보며 놀라지만, 그 결과가 어떤 질문과 맥락, 어떤 선택과 수정의 과정을 거쳐 나왔는지까지 깊이 들여다보는 경험은 상대적으로 적다. 단순히 입력하고 출력받는 경험만 반복하면, 학생은 도구의 반응을 경험할 수는 있어도 자신의 사고를 정교하게 다듬는 훈련까지 나아가기는 어렵다. 결국 눈앞에 결과는 생기지만, 그 결과를 만들어내는 힘은 학생 안에 충분히 축적되지 않는다.
실력이 쌓이려면 학생이 시행착오를 통해 차이를 체감해야 한다. 같은 도구를 사용하더라도 질문을 어떻게 바꾸느냐에 따라 결과가 달라지고, 조건을 얼마나 구체적으로 제시하느냐에 따라 완성도가 달라진다는 사실을 반복적으로 경험해야 한다. 또한 원하는 결과가 나오지 않았을 때 왜 그런지 추론하고, 다시 표현을 바꾸어 시도하며, 비교하고 수정하는 과정이 필요하다. 그러나 체험 중심 수업에서는 이 반복과 수정의 시간이 충분히 확보되지 않는 경우가 많다. 짧은 시간 안에 도구를 보여주고 결과를 확인하는 데 집중하다 보니, 정작 실력을 만드는 핵심 과정은 뒤로 밀려나게 된다.
또 하나의 이유는 학생들이 결과를 만드는 주체로 서기보다 결과를 받는 사용자로 머무르기 쉽기 때문이다. AI 도구는 겉으로 보기에는 매우 쉽게 작동한다. 그래서 학생들은 종종 “입력하면 알아서 만들어주는 것”처럼 받아들인다. 물론 이러한 편리함은 AI의 큰 장점 중 하나다. 그러나 교육적으로 보면, 지나치게 쉬워 보이는 경험은 오히려 사고를 생략하게 만들 수 있다. 결과가 빠르게 주어질수록 학생은 왜 이런 결과가 나왔는지 따져보기보다, 그 결과를 소비하고 다음 기능으로 넘어가기 쉽다. 실력은 손쉽게 얻어진 결과물의 개수로 쌓이지 않는다. 자신이 의도한 바와 실제 결과 사이의 간격을 인식하고, 그 간격을 줄이기 위해 조정하는 경험 속에서 비로소 쌓인다.
특히 생성형 AI를 활용한 창작에서는 이러한 문제가 더욱 두드러진다. 학생들은 “예쁜 그림을 만들어보자”, “멋진 영상을 만들어보자”, “글을 써보자”라는 활동에는 쉽게 참여한다. 하지만 막상 자신이 원하는 스타일이 무엇인지, 어떤 분위기를 만들고 싶은지, 누구를 위해 어떤 메시지를 담고 싶은지 묻기 시작하면 답이 흐려지는 경우가 많다. 다시 말해 결과에 대한 기대는 있지만, 그 결과를 뒷받침할 기획과 설계는 충분히 형성되어 있지 않은 것이다. 이런 상태에서는 AI가 만들어준 첫 결과에 만족하거나 실망하는 수준에서 머무르게 된다. 무엇을 바꿔야 더 나아질지 판단하기 어렵기 때문에, 경험은 반복되어도 실력은 깊어지지 않는다.
실력이 쌓이지 않는 또 다른 이유는 학습의 기준이 기능 경험에 맞추어져 있기 때문이다. 무엇을 눌렀는지, 어떤 서비스를 써봤는지, 무엇이 가능한지 아는 것과 실제로 잘 활용하는 것은 전혀 다른 문제다. 지금의 AI 교육은 종종 “이런 기능이 있다”는 소개에 머물고, 학생이 그 기능을 자신의 목적에 맞게 재구성하는 단계까지는 충분히 다루지 못한다. 그러나 진짜 실력은 기능 목록을 많이 아는 데서 생기지 않는다. 어떤 상황에서 어떤 도구를 선택할지, 어떤 결과가 적절한지, 부족한 결과를 어떻게 개선할지를 판단하는 힘에서 나온다. 즉, 실력은 기능의 암기가 아니라 맥락 속 선택과 조정의 능력이다.
교육이 놓치지 말아야 할 점은, 신기함은 학습의 입구가 될 수는 있지만 학습 그 자체는 아니라는 사실이다. 처음의 놀라움은 학생을 수업 안으로 끌어들이는 힘이 될 수 있다. 하지만 그 감탄이 오래 남는 배움이 되려면, 학생이 스스로 생각하고, 비교하고, 수정하고, 다시 시도하는 시간이 반드시 뒤따라야 한다. 결국 교육은 “와, 신기하다”에서 끝나서는 안 되고, “왜 이렇게 되었지”, “어떻게 바꾸면 더 좋아질까”, “내가 원하는 결과에 더 가까워지려면 무엇을 설계해야 할까”라는 질문으로 이어져야 한다. 이 전환이 일어나지 않으면, 수업은 재미있는 경험으로는 남을 수 있어도 역량 형성으로 이어지지는 않는다.
그래서 앞으로의 AI 교육은 신기함을 보여주는 데 만족하지 말고, 실력이 쌓이는 구조를 만들어야 한다. 한 번 써보는 경험보다 중요한 것은 반복해서 다뤄보는 경험이고, 정답 같은 결과를 얻는 것보다 중요한 것은 원하는 결과를 향해 조정해가는 과정이다. 학생이 AI를 통해 무엇이 가능한지 아는 것만으로는 부족하다. 왜 어떤 결과가 나왔는지 이해하고, 더 나은 결과를 위해 스스로 질문을 바꾸고 구조를 다듬을 수 있어야 한다. 바로 그때 비로소 신기함은 일회성 체험을 넘어, 학생 안에 남는 실력으로 전환될 수 있다.

               {"type": "text", "value": "기능 경험과 학습 전이는 다르다"},
               {"type": "text", "value": "AI 교육에서 자주 혼동되는 것 중 하나는 기능을 경험하는 것과 학습이 실제로 전이되는 것을 같은 것으로 여기는 태도다. 학생이 어떤 도구를 한 번 사용해보았다고 해서, 곧바로 그 도구를 자신의 맥락에서 활용할 수 있게 되는 것은 아니다. 이미지 생성 기능을 체험했다고 해서 창작 과정에서 그것을 적절히 사용할 수 있는 것은 아니고, 글쓰기 보조 기능을 써보았다고 해서 자신의 생각을 더 정교하게 표현하는 능력이 자동으로 생기는 것도 아니다. 기능 경험은 시작일 수는 있지만, 그것만으로 학습이 일어났다고 보기는 어렵다.
기능 경험은 대개 도구의 가능성을 보여주는 데 초점이 맞춰져 있다. 무엇을 입력하면 어떤 결과가 나오는지, 어떤 버튼을 누르면 어떤 기능이 실행되는지, 지금 이 기술이 어디까지 가능한지를 짧은 시간 안에 확인하게 한다. 이런 경험은 새로운 기술에 대한 거리감을 줄여주고, 흥미를 유발하며, “나도 해볼 수 있겠다”는 초기 자신감을 줄 수 있다. 그러나 학습 전이는 그보다 훨씬 더 깊은 차원의 문제다. 학습 전이란 한 상황에서 배운 것을 다른 상황에서도 꺼내어 적용할 수 있는 능력이다. 다시 말해, 수업 시간에 본 기능을 자신의 과제, 프로젝트, 문제 해결, 창작 활동 속에서 스스로 선택하고 조정하여 사용할 수 있어야 비로소 학습이 전이되었다고 말할 수 있다.
이 차이는 실제 수업 현장에서 분명하게 드러난다. 예를 들어 학생이 AI 이미지 생성 도구를 활용해 멋진 그림을 한 번 만들어보았다고 하자. 그 순간에는 분명 흥미를 느끼고 만족할 수 있다. 하지만 며칠 뒤 다른 수업에서 자신이 기획한 주제를 시각화해야 하는 상황이 되었을 때, 어떤 장면을 구성해야 하는지, 어떤 분위기를 설명해야 하는지, 어떤 스타일을 선택해야 하는지, 원하는 결과가 나오지 않으면 어떻게 수정해야 하는지를 스스로 판단하지 못한다면, 그 이전 경험은 기능 체험에 머문 것이다. 도구를 본 적은 있지만, 도구를 자신의 사고와 작업 속으로 가져오는 데는 아직 이르지 못한 상태다.
학습 전이가 일어나기 위해서는 기능을 ‘보는 경험’이 아니라 ‘맥락 속에서 사용하는 경험’이 필요하다. 학생은 단지 기능이 있다는 사실을 아는 데서 그치지 않고, 자신이 해결하려는 문제와 연결해보아야 한다. 왜 이 도구를 써야 하는지, 지금 이 과제에서 어떤 도움을 받을 수 있는지, 결과가 내 목적에 맞는지, 부족하다면 무엇을 바꾸어야 하는지를 고민해야 한다. 바로 이 과정에서 도구는 단순한 신기한 기술이 아니라 실제 문제 해결과 창작을 위한 수단이 된다. 그리고 이때 비로소 학생은 기능을 기억하는 사람이 아니라, 기능을 활용하는 사람으로 성장한다.
문제는 많은 AI 수업이 기능 소개와 즉각적인 결과 확인에 집중한 나머지, 이 전이의 과정을 충분히 설계하지 못한다는 데 있다. 수업 안에서는 교사가 준비한 예시를 따라 잘 작동했던 기능이, 학생의 실제 과제나 일상 속에서는 제대로 이어지지 않는 경우가 많다. 이는 학생이 배움을 얻지 못해서라기보다, 그 배움을 자기 맥락으로 옮겨가는 연습이 부족했기 때문이다. 교육은 도구를 보여주는 데서 끝나지 않고, 학생이 그 도구를 언제, 왜, 어떻게 다시 불러와 사용할지를 생각하게 해야 한다. 그렇지 않으면 수업 안의 경험은 수업 안에서만 머물고, 실제 삶과 학습의 장면으로 건너가지 못한다.
특히 AI 시대에는 이 전이의 중요성이 더욱 커진다. AI 도구는 매우 빠르게 결과를 제공하기 때문에, 겉으로 보기에는 학습이 쉽게 이루어진 것처럼 보일 수 있다. 하지만 빠른 결과와 깊은 학습은 같은 것이 아니다. 오히려 결과가 너무 쉽게 나올수록 학생이 스스로 사고하고 조정하는 과정은 생략되기 쉽다. 그래서 교육은 더더욱 결과물의 화려함보다 그 과정에서 무엇을 판단하고 어떻게 수정했는지를 보아야 한다. 학습 전이는 결과를 많이 만들어본 경험에서 생기는 것이 아니라, 결과를 자신의 목적에 맞게 다루어본 경험에서 생긴다.
또한 학습 전이는 반복과 변형을 통해 강화된다. 같은 기능을 한 번 써보는 것으로는 충분하지 않다. 비슷하지만 조금씩 다른 과제 속에서 다시 적용해보고, 예상과 다른 결과를 만나보고, 새로운 문제에 맞게 조정해보는 경험이 쌓여야 한다. 그래야 학생은 단순히 “이 기능을 안다”는 수준을 넘어 “이럴 때는 이렇게 활용할 수 있다”는 감각을 갖게 된다. 즉, 전이는 암기보다 응용에서, 소개보다 실천에서, 일회성 경험보다 누적된 사용에서 만들어진다.
결국 기능 경험과 학습 전이는 분명히 다르다. 기능 경험이 기술의 가능성을 보여주는 입구라면, 학습 전이는 그 기술이 학생의 사고와 표현, 문제 해결 방식 속에 실제로 자리 잡는 과정이다. 교육이 진정으로 목표해야 하는 것은 학생이 AI를 ‘한 번 써본 사람’이 되는 것이 아니라, 필요할 때 자신의 생각과 목적에 맞게 ‘다시 꺼내 쓸 수 있는 사람’이 되는 것이다. 그러기 위해서는 수업이 기능 소개에 머무르지 않고, 맥락 적용과 반복 활용, 자기 주도적 조정의 기회를 충분히 제공해야 한다. AI 교육이 오래 남는 배움이 되려면, 체험의 순간을 넘어 전이의 구조를 설계해야 한다.
